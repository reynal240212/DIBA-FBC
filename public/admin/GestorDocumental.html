<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo | DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 
                        dibaGold: 'var(--gold)', 
                        dibaBlue: 'var(--blue)', 
                        dibaDark: 'var(--bg-main)',
                        dibaDark2: 'var(--bg-panel)',
                        dibaDark3: 'var(--bg-input)',
                        dibaText: 'var(--text-main)',
                        dibaMuted: 'var(--text-muted)'
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">
    <script src="../scripts/theme-switcher.js"></script>
    <style>
        /* Gestor Documental specific styles */
        .content {
            padding: 2rem;
            flex: 1;
        }
    </style>
</head>
<body class="bg-[#06090e] text-fcfcfc font-['Inter']">
    <!-- Loader -->
    <div id="app-loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-[#06090e]">
        <div class="text-center animate-fade-up">
            <div class="relative w-16 h-16 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-gold/10 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-gold rounded-full animate-spin"></div>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gold italic opacity-80">Gestor Documental — Sistema</p>
        </div>
    </div>
    <div id="admin-nav"></div>
    <main class="lg:ml-[280px] pt-[70px] min-h-screen transition-all duration-300">
        <div class="p-8 max-w-[1600px] mx-auto">
            <!-- Título fallback para gestor.js selector si es necesario -->
            <h1 id="main-title" class="hidden">Gestor Documental</h1>

            <div id="filter-container" class="flex items-center gap-3 mb-8 overflow-x-auto pb-2 no-scrollbar">
                <button id="filter-docs-btn"
                    class="px-6 py-2 rounded-full bg-dibaGold text-blue-900 text-[10px] font-black uppercase italic border border-dibaGold transition-all whitespace-nowrap">Documentos</button>
                <button id="filter-club-btn"
                    class="px-6 py-2 rounded-full bg-white/5 text-slate-400 text-[10px] font-black uppercase italic border border-white/10 hover:border-dibaGold transition-all whitespace-nowrap">Explorador de Storage</button>
                <button id="filter-asistencias-btn"
                    class="px-6 py-2 rounded-full bg-white/5 text-slate-400 text-[10px] font-black uppercase italic border border-white/10 hover:border-dibaGold transition-all whitespace-nowrap">Asistencias</button>
                <button id="view-players-btn"
                    class="px-6 py-2 rounded-full bg-white/5 text-slate-400 text-[10px] font-black uppercase italic border border-white/10 hover:border-dibaGold transition-all whitespace-nowrap">Jugadores</button>
            </div>

            <div id="dynamic-content" class="animate__animated animate__fadeIn panel glass" style="border-radius: 24px; min-height: 400px;">
                <div class="flex flex-col items-center justify-center py-20 text-slate-500">
                    <i class="fas fa-circle-notch animate-spin text-4xl mb-4 text-gold"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest text-gold opacity-60">Sincronizando base de datos...</p>
                </div>
            </div>
            </div>
        </div>
    </main>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        initAdminLayout();
    </script>

    <script type="module" src="../src/features/gestor/main.js"></script>
</body>

</html>
