<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Documental — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white pb-20">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 animate-fade-up">
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Gestor <span class="text-diba-red">Documental</span></h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Administración de Expedientes y Archivos Cloud · DIBA FBC</p>
                </div>
                <div class="relative w-full md:w-64">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input type="text" id="searchInput" placeholder="Buscar archivos..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-[10px] font-black uppercase text-diba-blue focus:ring-4 focus:ring-diba-blue/5 outline-none transition-all">
                </div>
            </div>

            <!-- Navigation / Filters -->
            <div id="filter-container" class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar animate-fade-up" style="animation-delay: 0.1s">
                <button id="filter-docs-btn" class="px-8 py-3 rounded-2xl bg-white text-slate-400 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-diba-blue hover:text-diba-blue transition-all whitespace-nowrap shadow-sm">Documentos</button>
                <button id="view-players-btn" class="px-8 py-3 rounded-2xl bg-white text-slate-400 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-diba-blue hover:text-diba-blue transition-all whitespace-nowrap shadow-sm">Jugadores</button>
                <button id="filter-club-btn" class="px-8 py-3 rounded-2xl bg-white text-slate-400 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-diba-blue hover:text-diba-blue transition-all whitespace-nowrap shadow-sm">Storage Cloud</button>
            </div>

            <!-- Dynamic Content -->
            <div id="dynamic-content" class="min-h-[400px] animate-fade-up" style="animation-delay: 0.2s">
                <div class="flex flex-col items-center justify-center py-32 gap-6 opacity-30 text-diba-blue">
                    <i class="fas fa-circle-notch fa-spin text-4xl"></i>
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] italic">Sincronizando Archivos...</p>
                </div>
            </div>

        </div>
    </main>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
        }
        init();
    </script>
    <script type="module" src="../src/features/gestor/main.js"></script>
</body>

</html>
