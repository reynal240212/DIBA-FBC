<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo | DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 
                        dibaGold: 'var(--gold)', 
                        dibaBlue: 'var(--blue)', 
                        dibaDark: 'var(--bg-main)',
                        dibaDark2: 'var(--bg-panel)',
                        dibaDark3: 'var(--bg-input)',
                        dibaText: 'var(--text-main)',
                        dibaMuted: 'var(--text-muted)'
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <!-- Bootstrap 5.3.3 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">
    <script src="../scripts/theme-switcher.js"></script>
    <style>
        /* Gestor Documental specific styles */
        .content {
            padding: 2rem;
            flex: 1;
        }
    </style>
</head>

<body class="bg-[#F4F7FA] text-slate-900 font-sans min-h-screen selection:bg-[#FFD700]/30" id="admin-body" style="display: none;">

    <!-- ══ NAVIGATION (Sidebar + Header) ══ -->
    <div id="admin-nav"></div>

    <div class="lg:ml-[280px] min-h-screen transition-all duration-500">
        <div class="content p-8">
            <div class="max-w-7xl mx-auto w-full">
                
                <!-- Filter Tabs -->
                <div id="filter-container" class="flex items-center gap-3 mb-8 overflow-x-auto pb-4 custom-scrollbar">
                    <button id="filter-docs-btn"
                        class="px-8 py-3 rounded-xl bg-[#003366] text-[#FFD700] text-[10px] font-black uppercase tracking-widest border border-[#003366] transition-all whitespace-nowrap shadow-lg hover:shadow-xl hover:scale-[1.02]">
                        <i class="fas fa-file-alt mr-2"></i> Documentos
                    </button>
                    <button id="filter-club-btn"
                        class="px-8 py-3 rounded-xl bg-white text-slate-500 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-[#FFD700] hover:text-[#003366] transition-all whitespace-nowrap shadow-sm">
                        <i class="fas fa-folder-open mr-2"></i> Explorador de Storage
                    </button>
                    <button id="filter-asistencias-btn"
                        class="px-8 py-3 rounded-xl bg-white text-slate-500 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-[#FFD700] hover:text-[#003366] transition-all whitespace-nowrap shadow-sm">
                        <i class="fas fa-calendar-check mr-2"></i> Asistencias
                    </button>
                    <button id="view-players-btn"
                        class="px-8 py-3 rounded-xl bg-white text-slate-500 text-[10px] font-black uppercase tracking-widest border border-slate-100 hover:border-[#FFD700] hover:text-[#003366] transition-all whitespace-nowrap shadow-sm">
                        <i class="fas fa-users mr-2"></i> Jugadores
                    </button>
                </div>

                <!-- Main Content Area -->
                <div id="dynamic-content" class="bg-white shadow-premium rounded-elite border border-slate-100 min-h-[500px] transition-all duration-500 overflow-hidden">
                    <div class="flex flex-col items-center justify-center py-40 opacity-30">
                        <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-[#003366]"></i>
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-[#003366]">Sincronizando base de datos...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ══ SCRIPTS ══ -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '/src/components/layout/admin-layout.js';
        import '/src/core/aiWidget.js';

        async function init() {
            try {
                // Unified Layout Injection
                await initAdminLayout();
                
                // Show Body
                document.getElementById('admin-body').style.display = 'block';
            } catch (error) {
                console.error("Init error:", error);
            }
        }
        init();
    </script>
    <script type="module" src="/src/features/gestor/main.js"></script>
</body>

</html>
