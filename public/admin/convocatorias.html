<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Convocatorias Oficiales — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .player-item-conv {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
        }

        .player-item-conv:hover {
            background: rgba(var(--gold-rgb), 0.05);
            border-color: rgba(var(--gold-rgb), 0.2);
            transform: translateX(4px);
        }

        .player-item-conv.selected {
            background: rgba(var(--gold-rgb), 0.1);
            border-color: rgba(var(--gold-rgb), 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .player-item-conv input[type=checkbox] {
            accent-color: var(--gold);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .cat-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            background: rgba(var(--gold-rgb), 0.05);
            border: 1px solid rgba(var(--gold-rgb), 0.1);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-group-header:hover {
            background: rgba(var(--gold-rgb), 0.1);
        }

        .cat-group-body {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding: 0.5rem;
        }

        .conv-history-card {
            padding: 1.25rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .conv-history-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(var(--gold-rgb), 0.2);
        }

        .sticky-form {
            position: sticky;
            top: 100px;
        }
    </style>
</head>

<body class="bg-[#06090e] text-white font-['Outfit']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300">
        <div class="p-6 lg:p-10 max-w-[1600px] mx-auto overflow-x-hidden">
            
            <div id="alert-bar" class="hidden mb-10 p-5 rounded-3xl bg-red-500/10 border border-red-500/20 text-red-500 text-[0.65rem] font-black uppercase tracking-widest items-center gap-4 animate-fade-in shadow-2xl">
                <i class="fas fa-triangle-exclamation"></i>
                <span id="alert-text"></span>
            </div>

            <!-- Page Header -->
            <div class="mb-12 animate-fade-up">
                <div class="flex items-center justify-between flex-wrap gap-8">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span class="w-8 h-1 bg-gold rounded-full"></span>
                            <p class="text-white/40 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Comunicación Oficial Club</p>
                        </div>
                        <h2 class="text-4xl lg:text-5xl font-black italic text-white uppercase tracking-tighter">Gestión de <span class="text-gold">Convocatorias</span></h2>
                    </div>
                </div>
            </div>

            <div class="diba-grid">
                <!-- Left Column: Players & History -->
                <div class="col-12 lg:col-8 space-y-12">
                    
                    <!-- Selection Panel -->
                    <div class="panel p-8 animate-fade-up" style="animation-delay: 0.1s">
                        <div class="premium-p-header mb-8">
                            <span class="premium-p-title"><i class="fas fa-users text-gold"></i>Selección de Jugadores</span>
                            <span id="selected-count-badge" class="premium-p-badge italic">0 convocados</span>
                        </div>

                        <div class="mb-8">
                            <div class="relative group">
                                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/20"></i>
                                <input type="text" id="searchPlayers" placeholder="FILTRAR POR NOMBRE O CATEGORÍA..." 
                                    class="premium-input pl-14 uppercase tracking-widest text-[0.7rem] font-black">
                            </div>
                        </div>

                        <div id="playersList" class="space-y-4 max-h-[1200px] overflow-y-auto custom-scrollbar pr-2">
                            <div class="text-center py-20 opacity-30 animate-pulse">
                                <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                                <p class="text-[0.7rem] font-black uppercase tracking-widest">Sincronizando boveda de jugadores...</p>
                            </div>
                        </div>
                    </div>

                    <!-- History Panel -->
                    <div class="panel p-8 animate-fade-up" style="animation-delay: 0.2s">
                        <div class="premium-p-header mb-8">
                            <span class="premium-p-title"><i class="fas fa-history text-gold"></i>Historial Reciente</span>
                        </div>
                        <div id="historialList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- History items list -->
                        </div>
                    </div>
                </div>

                <!-- Right Column: Form -->
                <div class="col-12 lg:col-4">
                    <div class="sticky-form">
                        <div class="panel p-8 animate-fade-up border-gold/20 shadow-[0_20px_50px_rgba(255,215,0,0.05)]" style="animation-delay: 0.3s">
                            <div class="premium-p-header mb-8">
                                <span class="premium-p-title text-gold italic"><i class="fas fa-bullhorn"></i>Nuevo Comunicado</span>
                            </div>
                            
                            <form id="formConvocatoria" class="space-y-6">
                                <div class="premium-form-group">
                                    <label class="premium-label">Título de Convocatoria</label>
                                    <input type="text" id="convTitulo" placeholder="EJ: PARTIDO VS ATLETICO REAL" class="premium-input uppercase" required>
                                </div>

                                <div class="premium-form-group">
                                    <label class="premium-label">Fecha y Hora</label>
                                    <div class="relative">
                                        <i class="fas fa-calendar-star absolute left-5 top-1/2 -translate-y-1/2 text-gold/50"></i>
                                        <input type="datetime-local" id="convFecha" class="premium-input pl-14" required>
                                    </div>
                                </div>

                                <div class="premium-form-group">
                                    <label class="premium-label">Lugar de Encuentro</label>
                                    <div class="relative">
                                        <i class="fas fa-map-marker-alt absolute left-5 top-1/2 -translate-y-1/2 text-gold/50"></i>
                                        <input type="text" id="convLugar" placeholder="EJ: CANCHA LA PRADERA" class="premium-input pl-14 uppercase">
                                    </div>
                                </div>

                                <div class="premium-form-group">
                                    <label class="premium-label">Instrucciones Adicionales</label>
                                    <textarea id="convDescripcion" class="premium-input min-h-[120px] py-4" placeholder="INDICACIONES, UNIFORMES, PUNTO DE ENCUENTRO..."></textarea>
                                </div>

                                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex items-start gap-4 mb-6">
                                    <div class="w-10 h-10 rounded-xl bg-gold/10 flex items-center justify-center text-gold flex-none">
                                        <i class="fas fa-bell animate-bounce"></i>
                                    </div>
                                    <p class="text-[0.6rem] font-bold text-white/40 uppercase leading-relaxed tracking-wider">
                                        Se enviará una <span class="text-gold">Notificación Push</span> automática a los dispositivos vinculados de los jugadores seleccionados.
                                    </p>
                                </div>

                                <button type="submit" id="btnConvocar" class="w-full py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase text-[0.75rem] tracking-widest shadow-xl shadow-gold/20 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3">
                                    <i class="fas fa-paper-plane"></i> Convocar y Notificar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        let allJugadores = [];
        let selectedDNIs = new Set();

        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;
                await initAdminLayout();
                await loadJugadores();
                await loadHistorial();
            } catch (err) {
                console.error("Init Error:", err);
            }
        }
        init();

        const showToast = (message, type = 'info') => {
            const bar = document.getElementById('alert-bar');
            const txt = document.getElementById('alert-text');
            txt.textContent = message;
            bar.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-green-500/10', 'text-green-500');
            const isError = type === 'error';
            bar.classList.add('flex', isError ? 'bg-red-500/10' : 'bg-green-500/10', isError ? 'text-red-500' : 'text-green-500');
            setTimeout(() => bar.classList.add('hidden'), 5000);
        };

        async function loadJugadores() {
            const listContainer = document.getElementById('playersList');
            try {
                const { data, error } = await supabase.from('identificacion').select('numero, nombre, apellidos, categoria').order('apellidos');
                if (error) throw error;
                allJugadores = data || [];
                renderJugadores(allJugadores);
            } catch (e) {
                listContainer.innerHTML = `<p class="text-center text-red-500 font-black text-[0.7rem] uppercase">Error loading players: ${e.message}</p>`;
            }
        }

        function renderJugadores(jugadores) {
            const list = document.getElementById('playersList');
            if (jugadores.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-white/20 font-black text-[0.7rem] uppercase tracking-widest">No hay jugadores disponibles</div>';
                return;
            }
            list.innerHTML = '';

            const groupedObj = {};
            jugadores.forEach(j => {
                const cat = j.categoria || 'GENERAL';
                if (!groupedObj[cat]) groupedObj[cat] = [];
                groupedObj[cat].push(j);
            });

            Object.entries(groupedObj).sort().forEach(([cat, players]) => {
                const groupCount = players.length;
                const catHeaderId = `cat-h-${cat.replace(/\s+/g, '-')}`;

                const header = document.createElement('div');
                header.className = 'cat-group-header';
                header.innerHTML = `
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="cat-master-check w-4 h-4 accent-gold cursor-pointer">
                        <span class="text-[0.65rem] font-black uppercase tracking-[0.2em] text-gold italic">${cat}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="cat-sel-count text-[0.6rem] font-black text-white/20 uppercase">0 / ${groupCount}</span>
                        <i class="fas fa-chevron-down text-[0.6rem] text-white/20 transition-transform duration-300"></i>
                    </div>
                `;

                const body = document.createElement('div');
                body.className = 'cat-group-body';
                body.id = `body-${catHeaderId}`;

                players.forEach(j => {
                    const item = document.createElement('div');
                    item.className = 'player-item-conv' + (selectedDNIs.has(j.numero) ? ' selected' : '');
                    item.innerHTML = `
                        <input type="checkbox" ${selectedDNIs.has(j.numero) ? 'checked' : ''} class="pointer-events-none">
                        <div class="flex-1">
                            <div class="text-[0.75rem] font-bold text-white uppercase">${j.nombre} ${j.apellidos}</div>
                            <div class="text-[0.55rem] font-black text-white/20 uppercase tracking-widest mt-1">DNI: ${j.numero}</div>
                        </div>
                    `;
                    item.addEventListener('click', (e) => {
                        const chk = item.querySelector('input');
                        if (selectedDNIs.has(j.numero)) {
                            selectedDNIs.delete(j.numero);
                            item.classList.remove('selected');
                            chk.checked = false;
                        } else {
                            selectedDNIs.add(j.numero);
                            item.classList.add('selected');
                            chk.checked = true;
                        }
                        updateCategoryUI(cat, players, header);
                    });
                    body.appendChild(item);
                });

                header.querySelector('.cat-master-check').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const checkState = e.target.checked;
                    players.forEach(p => {
                        if (checkState) selectedDNIs.add(p.numero);
                        else selectedDNIs.delete(p.numero);
                    });
                    renderJugadores(allJugadores); // Re-render simple for sync
                });

                list.appendChild(header);
                list.appendChild(body);
                updateCategoryUI(cat, players, header);
            });
        }

        function updateCategoryUI(catName, players, headerEl) {
            const countInCat = players.filter(p => selectedDNIs.has(p.numero)).length;
            const badge = headerEl.querySelector('.cat-sel-count');
            const mCheck = headerEl.querySelector('.cat-master-check');
            
            badge.textContent = `${countInCat} / ${players.length}`;
            badge.className = `text-[0.6rem] font-black uppercase ${countInCat > 0 ? 'text-gold' : 'text-white/20'}`;
            
            mCheck.checked = countInCat === players.length;
            mCheck.indeterminate = countInCat > 0 && countInCat < players.length;

            document.getElementById('selected-count-badge').textContent = `${selectedDNIs.size} convocados`;
        }

        async function loadHistorial() {
            const cont = document.getElementById('historialList');
            try {
                const { data, error } = await supabase.from('convocatorias').select('*, convocatoria_jugadores(count)').order('fecha', { ascending: false }).limit(10);
                if (error) throw error;
                if (!data) return;

                cont.innerHTML = data.map(c => {
                    const d = new Date(c.fecha);
                    const dateStr = d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short' }).toUpperCase();
                    const timeStr = d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
                    const pCount = c.convocatoria_jugadores?.[0]?.count || 0;

                    return `
                        <div class="conv-history-card">
                            <div class="flex justify-between items-start mb-4">
                                <div class="text-[0.8rem] font-black italic uppercase tracking-tighter text-white truncate max-w-[70%]">${c.titulo}</div>
                                <span class="text-[0.5rem] font-black text-gold border border-gold/20 px-2 py-1 rounded bg-gold/5 italic uppercase">${pCount} JUGS</span>
                            </div>
                            <div class="flex flex-col gap-2 opacity-30">
                                <div class="flex items-center gap-2 text-[0.6rem] font-bold">
                                    <i class="fas fa-calendar-star text-gold"></i>
                                    <span>${dateStr} @ ${timeStr}</span>
                                </div>
                                ${c.lugar ? `
                                <div class="flex items-center gap-2 text-[0.6rem] font-bold">
                                    <i class="fas fa-map-marker-alt text-gold"></i>
                                    <span class="truncate">${c.lugar}</span>
                                </div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("Historial error:", e);
            }
        }

        // Search Filter
        document.getElementById('searchPlayers').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderJugadores(allJugadores.filter(j => 
                `${j.nombre} ${j.apellidos}`.toLowerCase().includes(q) || 
                j.categoria?.toLowerCase().includes(q) || 
                j.numero.toString().includes(q)
            ));
        });

        // Form Submission
        document.getElementById('formConvocatoria').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnConvocar');
            
            if (selectedDNIs.size === 0) {
                showToast('Debe seleccionar al menos un jugador para convocar.', 'error');
                return;
            }

            const titulo = document.getElementById('convTitulo').value.trim();
            const fecha = document.getElementById('convFecha').value;
            const lugar = document.getElementById('convLugar').value.trim();
            const descripcion = document.getElementById('convDescripcion').value.trim();

            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Procesando...';
            btn.disabled = true;

            try {
                const { data: { user } } = await supabase.auth.getUser();

                // 1. Create Convocatoria
                const { data: conv, error: convErr } = await supabase.from('convocatorias').insert({ 
                    titulo, fecha, lugar: lugar || null, descripcion: descripcion || null, created_by: user.id 
                }).select().single();

                if (convErr) throw convErr;

                // 2. Insert players
                const batch = allJugadores.filter(j => selectedDNIs.has(j.numero)).map(j => ({
                    convocatoria_id: conv.id,
                    identificacion_numero: j.numero,
                    nombre_jugador: `${j.nombre} ${j.apellidos}`,
                    categoria: j.categoria || 'GENERAL',
                    estado: 'convocado'
                }));

                const { error: batchErr } = await supabase.from('convocatoria_jugadores').insert(batch);
                if (batchErr) throw batchErr;

                // 3. Trigger Notification (Edge Function)
                try {
                    await supabase.functions.invoke('send-push-notification', {
                        body: {
                            title: `📣 Convocatoria: ${titulo}`,
                            body: `${lugar ? lugar + ' — ' : ''}${new Date(fecha).toLocaleString('es-CO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}`,
                            url: '/partidos.html'
                        }
                    });
                } catch(_) {}

                showToast(`¡Convocatoria enviada a ${selectedDNIs.size} jugadores!`, 'success');

                // Reset
                e.target.reset();
                selectedDNIs.clear();
                renderJugadores(allJugadores);
                loadHistorial();

            } catch (err) {
                console.error(err);
                showToast("Error al procesar convocatoria: " + err.message, "error");
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
