<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocatorias — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .cat-chevron.closed { transform: rotate(-90deg); }
        .player-item.selected { border-color: #004d98; background-color: #f8fafc; }
        .player-item.selected .player-name-text { color: #004d98; }
    </style>
</head>

<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white pb-20">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 animate-fade-up">
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Gestión de <span class="text-diba-red">Convocatorias</span></h2>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-1">Selecciona, Convoca y Notifica en Tiempo Real · DIBA FBC</p>
                </div>
                <div id="selected-badge" class="px-5 py-2.5 rounded-2xl bg-diba-blue/5 border border-diba-blue/10 text-[10px] font-black text-diba-blue uppercase tracking-widest shadow-sm">0 SELECCIONADOS</div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <!-- Left Column: Selection & History (lg:8) -->
                <div class="lg:col-span-7 space-y-8">
                    
                    <!-- Selection Panel -->
                    <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden animate-fade-up">
                        <div class="p-8 border-b border-slate-50 bg-slate-50/50 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-users text-diba-gold"></i>
                                <span class="text-[10px] font-black text-diba-blue uppercase tracking-widest">Nómina de Jugadores</span>
                            </div>
                            <div class="relative w-48">
                                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[10px]"></i>
                                <input type="text" id="searchPlayers" placeholder="Filtrar..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-100 rounded-xl text-[10px] font-bold text-diba-blue focus:ring-4 focus:ring-diba-blue/5 outline-none transition-all">
                            </div>
                        </div>
                        <div class="p-6">
                            <div id="playersList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                <!-- Populated by JS -->
                                <div class="py-20 text-center opacity-20"><i class="fas fa-circle-notch fa-spin text-3xl"></i></div>
                            </div>
                        </div>
                    </div>

                    <!-- History Panel -->
                    <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden animate-fade-up" style="animation-delay: 0.1s">
                        <div class="p-8 border-b border-slate-50">
                            <div class="flex items-center gap-3 text-diba-blue">
                                <i class="fas fa-history text-diba-red"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">Historial Reciente</span>
                            </div>
                        </div>
                        <div id="historialList" class="divide-y divide-slate-50">
                            <!-- Populated by JS -->
                            <div class="p-12 text-center opacity-10 text-[10px] font-black uppercase tracking-widest italic">Cargando bitácora...</div>
                        </div>
                    </div>

                </div>

                <!-- Right Column: Form (lg:5) -->
                <div class="lg:col-span-5 sticky top-28">
                    <div class="bg-white rounded-[3rem] border border-slate-50 shadow-premium overflow-hidden animate-fade-up" style="animation-delay: 0.2s">
                        <div class="p-8 lg:p-10">
                            <h3 class="text-xl font-black text-diba-blue italic uppercase tracking-tighter mb-8 flex items-center gap-3">
                                <i class="fas fa-paper-plane text-diba-gold animate-bounce"></i> Nueva Convocatoria
                            </h3>
                            
                            <form id="formConvocatoria" class="space-y-6">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Título del Encuentro</label>
                                    <input type="text" id="convTitulo" placeholder="Ej: Octavos de Final vs Real" required class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm text-diba-blue focus:bg-white focus:ring-4 focus:ring-diba-blue/5 outline-none transition-all">
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha y Hora</label>
                                        <input type="datetime-local" id="convFecha" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-xs text-diba-blue focus:bg-white outline-none transition-all">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Lugar</label>
                                        <input type="text" id="convLugar" placeholder="Cancha 1..." class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-xs text-diba-blue focus:bg-white outline-none transition-all">
                                    </div>
                                </div>

                                <div class="space-y-2">
                                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Indicaciones Técnicas</label>
                                    <textarea id="convDescripcion" placeholder="Uniforme, hora de llegada, citación..." class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm text-diba-blue focus:bg-white focus:ring-4 focus:ring-diba-blue/5 outline-none transition-all h-32"></textarea>
                                </div>

                                <div class="p-4 rounded-2xl bg-diba-blue/5 border border-diba-blue/10 flex items-start gap-3">
                                    <i class="fas fa-info-circle text-diba-blue mt-1"></i>
                                    <p class="text-[9px] font-bold text-diba-blue/60 leading-relaxed uppercase">Se enviará una notificación push inmediata a todos los jugadores seleccionados que cuenten con la app instalada.</p>
                                </div>

                                <button type="submit" id="btnConvocar" class="w-full py-5 rounded-[2rem] bg-diba-blue text-white font-black italic uppercase tracking-widest hover:bg-diba-red transition-all shadow-xl shadow-blue-900/10 flex items-center justify-center gap-3">
                                    <i class="fas fa-bullhorn text-diba-gold"></i> Emitir Convocatoria
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toastBar" class="fixed bottom-10 right-10 z-[200] space-y-3 pointer-events-none"></div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        let allJugadores = [];
        let selectedDNIs = new Set();

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            loadJugadores();
            loadHistorial();
        }

        function showToast(msg, type = 'info') {
            const bar = document.getElementById('toastBar');
            const t = document.createElement('div');
            t.className = `px-6 py-4 rounded-xl shadow-2xl border bg-white flex items-center gap-4 animate-fade-left pointer-events-auto min-w-[300px]`;
            const color = type === 'success' ? 'emerald' : (type === 'error' ? 'rose' : 'diba-blue');
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-triangle' : 'info-circle');
            
            t.innerHTML = `
                <div class="w-8 h-8 rounded-full flex items-center justify-center bg-${color}-50 text-${color}-500"><i class="fas fa-${icon}"></i></div>
                <div class="text-[10px] font-black uppercase text-diba-blue tracking-widest">${msg}</div>
            `;
            bar.appendChild(t);
            setTimeout(() => { t.classList.add('animate-fade-out'); setTimeout(() => t.remove(), 500); }, 4000);
        }

        async function loadJugadores() {
            const list = document.getElementById('playersList');
            try {
                const { data, error } = await supabase.from('identificacion').select('numero, nombre, apellidos, categoria').order('apellidos');
                if (error) throw error;
                allJugadores = data || [];
                renderJugadores(allJugadores);
            } catch (e) {
                list.innerHTML = `<p class="text-rose-500 text-[10px] font-black text-center">Error: ${e.message}</p>`;
            }
        }

        function renderJugadores(jugadores) {
            const list = document.getElementById('playersList');
            if (!jugadores.length) {
                list.innerHTML = '<p class="text-slate-300 text-[10px] font-black text-center py-10 uppercase italic">Sin resultados</p>';
                return;
            }
            list.innerHTML = '';
            const grouped = {};
            jugadores.forEach(j => { 
                const cat = j.categoria || 'General'; 
                if (!grouped[cat]) grouped[cat] = []; 
                grouped[cat].push(j); 
            });

            Object.entries(grouped)
                .sort(([a], [b]) => a.localeCompare(b))
                .forEach(([catName, players]) => {
                    const selInCat = () => players.filter(p => selectedDNIs.has(p.numero)).length;
                    const catId = `cat-${catName.replace(/\s+/g, '-')}`;

                    const header = document.createElement('div');
                    header.className = 'flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-2 cursor-pointer group hover:bg-slate-100 transition-all';
                    header.innerHTML = `
                        <div class="flex items-center gap-4">
                            <input type="checkbox" class="w-4 h-4 rounded-md border-slate-300 text-diba-blue focus:ring-diba-blue/20 cat-check">
                            <span class="text-[10px] font-black uppercase italic tracking-tighter text-diba-blue group-hover:text-diba-red transition-all">${catName}</span>
                            <span class="text-[8px] font-bold text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-100 cat-badge">${selInCat()} / ${players.length}</span>
                        </div>
                        <i class="fas fa-chevron-down text-slate-300 text-xs transition-transform cat-chevron"></i>
                    `;

                    const body = document.createElement('div');
                    body.className = 'grid grid-cols-1 md:grid-cols-2 gap-2 mb-4 animate-fade-down';
                    body.id = `body-${catId}`;

                    const updateUI = () => {
                        const count = selInCat();
                        header.querySelector('.cat-badge').textContent = `${count} / ${players.length}`;
                        header.querySelector('.cat-check').checked = count === players.length;
                        header.querySelector('.cat-check').indeterminate = count > 0 && count < players.length;
                        document.getElementById('selected-badge').textContent = `${selectedDNIs.size} SELECCIONADOS`;
                        document.getElementById('selected-badge').classList.toggle('bg-diba-red/10', selectedDNIs.size > 0);
                        document.getElementById('selected-badge').classList.toggle('text-diba-red', selectedDNIs.size > 0);
                    };

                    players.forEach(j => {
                        const item = document.createElement('label');
                        item.className = `flex items-center gap-3 p-3 rounded-xl border border-slate-50 hover:border-diba-blue/20 transition-all cursor-pointer player-item ${selectedDNIs.has(j.numero) ? 'selected' : ''}`;
                        item.innerHTML = `
                            <input type="checkbox" class="w-3.5 h-3.5 rounded border-slate-200 text-diba-blue" ${selectedDNIs.has(j.numero) ? 'checked' : ''}>
                            <div class="overflow-hidden">
                                <div class="text-[10px] font-bold text-slate-600 truncate player-name-text group-hover:text-diba-blue">${j.nombre} ${j.apellidos}</div>
                                <div class="text-[7px] font-black text-slate-300 uppercase italic">DNI ${j.numero}</div>
                            </div>
                        `;
                        item.querySelector('input').addEventListener('change', e => {
                            if (e.target.checked) { selectedDNIs.add(j.numero); item.classList.add('selected'); }
                            else { selectedDNIs.delete(j.numero); item.classList.remove('selected'); }
                            updateUI();
                        });
                        body.appendChild(item);
                    });

                    header.addEventListener('click', e => {
                        if (e.target.type === 'checkbox') return;
                        const isH = body.classList.contains('hidden');
                        body.classList.toggle('hidden');
                        header.querySelector('.cat-chevron').classList.toggle('closed', !isH);
                    });

                    header.querySelector('.cat-check').addEventListener('change', e => {
                        const chk = e.target.checked;
                        body.querySelectorAll('input[type=checkbox]').forEach((c, idx) => {
                            c.checked = chk;
                            if (chk) { selectedDNIs.add(players[idx].numero); c.closest('.player-item').classList.add('selected'); }
                            else { selectedDNIs.delete(players[idx].numero); c.closest('.player-item').classList.remove('selected'); }
                        });
                        updateUI();
                    });

                    updateUI();
                    list.appendChild(header);
                    list.appendChild(body);
                });
        }

        document.getElementById('searchPlayers').oninput = e => {
            const q = e.target.value.toLowerCase();
            renderJugadores(allJugadores.filter(j => `${j.nombre} ${j.apellidos}`.toLowerCase().includes(q) || (j.categoria||'').toLowerCase().includes(q)));
        };

        async function loadHistorial() {
            const cont = document.getElementById('historialList');
            try {
                const { data, error } = await supabase.from('convocatorias').select(`*, convocatoria_jugadores(count)`).order('fecha', { ascending: false }).limit(10);
                if (error) throw error;
                if (!data.length) { cont.innerHTML = '<p class="p-10 text-center text-slate-300 italic text-[10px] font-black uppercase">Sin registros históricos</p>'; return; }
                
                cont.innerHTML = data.map(c => `
                    <div class="p-6 hover:bg-slate-50 transition-all flex items-center justify-between group">
                        <div class="space-y-1">
                            <div class="text-[11px] font-black text-diba-blue uppercase italic tracking-tighter group-hover:text-diba-red transition-all">${c.titulo}</div>
                            <div class="flex items-center gap-4 text-[8px] font-bold text-slate-400 uppercase tracking-widest">
                                <span><i class="fas fa-calendar-alt text-diba-gold mr-1.5"></i>${new Date(c.fecha).toLocaleDateString()}</span>
                                <span><i class="fas fa-map-marker-alt text-diba-red mr-1.5"></i>${c.lugar || '--'}</span>
                            </div>
                        </div>
                        <span class="px-3 py-1 bg-white border border-slate-100 rounded-full text-[8px] font-black text-diba-blue opacity-40 italic tracking-tighter group-hover:opacity-100 transition-all">${c.convocatoria_jugadores?.[0]?.count || 0} JUGADORES</span>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('formConvocatoria').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnConvocar');
            if (selectedDNIs.size === 0) { showToast('Selecciona al menos un jugador', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> PROCESANDO...';

            try {
                const { data: { user } } = await supabase.auth.getUser();
                const { data: conv, error: cErr } = await supabase.from('convocatorias').insert({
                    titulo: document.getElementById('convTitulo').value,
                    fecha: document.getElementById('convFecha').value,
                    lugar: document.getElementById('convLugar').value || null,
                    descripcion: document.getElementById('convDescripcion').value || null,
                    created_by: user.id
                }).select().single();

                if (cErr) throw cErr;

                const jcs = allJugadores.filter(j => selectedDNIs.has(j.numero)).map(j => ({
                    convocatoria_id: conv.id,
                    identificacion_numero: j.numero,
                    nombre_jugador: `${j.nombre} ${j.apellidos}`,
                    categoria: j.categoria || 'General',
                    estado: 'convocado'
                }));

                const { error: jErr } = await supabase.from('convocatoria_jugadores').insert(jcs);
                if (jErr) throw jErr;

                try {
                    await supabase.functions.invoke('send-push-notification', {
                        body: {
                            title: `📣 DIBA FBC: ${conv.titulo}`,
                            body: `${conv.lugar ? conv.lugar + ' · ' : ''}${new Date(conv.fecha).toLocaleString()}`,
                            url: '/partidos.html'
                        }
                    });
                } catch (_) {}

                showToast('✅ Convocatoria emitida con éxito', 'success');
                e.target.reset();
                selectedDNIs.clear();
                renderJugadores(allJugadores);
                loadHistorial();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerHTML = '<i class="fas fa-bullhorn text-diba-gold"></i> Emitir Convocatoria';
                btn.disabled = false;
            }
        };

        init();
    </script>
</body>
</html>
