<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Jugador — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-4xl mx-auto flex items-center justify-center min-h-[80vh]">
            
            <div class="w-full bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden animate-fade-up">
                <!-- Header Secundario -->
                <div class="p-8 border-b border-slate-50 bg-slate-50/30 flex items-center gap-5">
                    <div class="w-14 h-14 bg-gradient-to-br from-diba-blue to-diba-red text-white rounded-2xl flex items-center justify-center shadow-lg text-2xl">
                        <i class="fas fa-id-card text-diba-gold"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black italic uppercase text-diba-blue leading-tight flex items-center gap-2">
                            Nuevo <span class="text-diba-red">Jugador</span>
                        </h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Registro oficial DIBA FBC</p>
                    </div>
                </div>

                <div class="p-8 lg:p-10">
                    <form id="createPlayerForm" class="space-y-6">
                        <div id="form-alert" class="hidden p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-rose-50 text-rose-500 border border-rose-100"></div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre Completo</label>
                                <div class="relative">
                                    <input type="text" name="nombre" id="nombre" required placeholder="ej. Alexander Hernández" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm">
                                    <i class="fas fa-signature absolute left-4 top-1/2 -translate-y-1/2 text-slate-200"></i>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">DNI / Identificación</label>
                                <div class="relative">
                                    <input type="text" name="dni" id="dni" placeholder="ej. 1042345678" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm">
                                    <i class="fas fa-address-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-200"></i>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nacimiento</label>
                                <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Categoría</label>
                                <select name="categoria" id="categoria" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm appearance-none cursor-pointer">
                                    <option value="Teteros">Teteros</option>
                                    <option value="Babys">Babys</option>
                                    <option value="Pre-Infantil">Pre-Infantil</option>
                                    <option value="Infantil">Infantil</option>
                                    <option value="Pre-Juvenil">Pre-Juvenil</option>
                                    <option value="Juvenil">Juvenil</option>
                                    <option value="Libre">Libre</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Posición</label>
                                <input type="text" name="posicion" id="posicion" placeholder="ej. Delantero" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm">
                            </div>
                        </div>

                        <div class="flex items-center gap-4 pt-6">
                            <a href="dashboard.html" class="flex-1 bg-white border border-slate-100 text-slate-400 rounded-2xl py-4 text-center text-[10px] font-black uppercase tracking-[0.2em] italic hover:bg-slate-50 transition-all">
                                <i class="fas fa-times mr-2"></i> Cancelar
                            </a>
                            <button type="submit" id="submit-btn" class="flex-[2] bg-diba-gold text-diba-blue rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:scale-105 transition-all flex items-center justify-center gap-3 group shadow-lg shadow-yellow-500/20">
                                <i class="fas fa-save group-hover:scale-110 transition-transform text-diba-red"></i>
                                <span id="btn-text">Registrar Jugador</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            
            document.getElementById('createPlayerForm').addEventListener('submit', handleCreate);
        }

        async function handleCreate(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const player = Object.fromEntries(formData.entries());
            
            const { error } = await supabase.from('jugadores').insert([player]);
            if (error) alert('Error: ' + error.message);
            else window.location.href = 'dashboard.html';
        }

        init();
    </script>
</body>
</html>
