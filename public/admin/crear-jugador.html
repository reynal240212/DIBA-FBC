<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Jugador — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Bootstrap 5.3.3 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Player creation refinements */
        .creation-card {
            max-width: 650px;
            width: 100%;
            padding: 3rem;
        }

        .icon-box {
            width: 56px;
            height: 56px;
            background: rgba(var(--gold-rgb), 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.5rem;
            border: 1px solid rgba(var(--gold-rgb), 0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .creation-card:hover .icon-box {
            transform: scale(1.1) rotate(-5deg);
            background: rgba(var(--gold-rgb), 0.2);
            box-shadow: 0 0 20px rgba(var(--gold-rgb), 0.2);
        }
    </style>
</head>

<body class="bg-[#F4F7FA] text-slate-900 font-sans min-h-screen" id="admin-body" style="display: none;">

    <!-- ══ NAVIGATION (Sidebar + Header) ══ -->
    <div id="admin-nav"></div>

    <div class="lg:ml-[280px] min-h-screen transition-all duration-500">
        <div class="content flex justify-center py-12 px-8">
            <div class="bg-white shadow-premium rounded-elite creation-card animate-fade-up border border-slate-100 p-12 max-w-[650px] w-full">
                <div class="mb-10 flex items-center gap-5">
                    <div class="w-14 h-14 bg-slate-50 text-[#003366] rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm text-2xl">
                        <i class="fas fa-running"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black italic uppercase text-[#003366] leading-tight">Ficha del <span class="text-[#FFD700]">Deportista</span></h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Registro oficial DIBA FBC</p>
                    </div>
                </div>

                <div class="p-0">
                    <form id="createPlayerForm" class="space-y-6">
                        <div class="form-group">
                            <label class="text-[10px] font-black uppercase tracking-widest text-[#003366] mb-2 block">Nombre Completo</label>
                            <input type="text" name="nombre" required placeholder="ej. Juan Pérez" class="form-control w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-[#003366] mb-2 block">Documento (DNI/TI)</label>
                                <input type="text" name="dni" placeholder="ej. 1029384756" class="form-control w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all">
                            </div>
                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-[#003366] mb-2 block">Categoría</label>
                                <input type="text" name="categoria" placeholder="ej. 2012-2013" class="form-control w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="text-[10px] font-black uppercase tracking-widest text-[#003366] mb-2 block">Estado en el Club</label>
                            <select name="status" required class="form-control w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all appearance-none">
                                <option value="Activo" selected>Activo (Habilitado)</option>
                                <option value="Inactivo">Inactivo (Suspendido)</option>
                                <option value="Pendiente">Pendiente (Revisión)</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-4 mt-10">
                            <a href="planilla.html" class="flex-1 px-6 py-4 bg-slate-100 text-slate-500 rounded-xl font-black uppercase text-[10px] tracking-widest text-center hover:bg-slate-200 transition-all border border-slate-200">
                                <i class="fas fa-arrow-left mr-2"></i> Volver
                            </a>
                            <button type="submit" class="flex-[2] px-8 py-4 bg-[#FFD700] text-[#003366] rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all" id="submitBtn">
                                <i class="fas fa-save mr-2"></i> Registrar Jugador
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '/src/components/layout/admin-layout.js';
        import { hookCreatePlayerForm } from '/src/features/players/admin.js';
        import '/src/core/aiWidget.js';
        
        async function init() {
            await initAdminLayout();
            hookCreatePlayerForm();
            document.getElementById('admin-body').style.display = 'block';
        }
        init();
    </script>
</body>
</html>
