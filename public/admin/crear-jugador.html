<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Jugador — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dibaGold: '#f59e0b',
                        dibaBlue: '#0f172a', // deep navy
                        dibaDark: '#020617',
                        dibaDark2: '#0f172a',
                        dibaText: '#f8fafc',
                        dibaMuted: '#94a3b8'
                    }
                },
            },
        }
    </script>
</head>

<body style="display: none;" id="admin-body" class="bg-dibaDark text-dibaText font-sans transition-all duration-300">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-[38px] h-[38px]">
            <div>
                <div class="text-[1.05rem] font-black italic uppercase tracking-wider text-dibaGold leading-none">DIBA FBC</div>
                <div class="text-[0.55rem] text-slate-500 uppercase tracking-widest font-bold mt-1">Panel de Control</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            
            <div class="text-[0.55rem] font-black uppercase text-slate-500 tracking-[0.2em] px-4 mt-6 mb-2">Equipo</div>
            <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list w-5"></i> Planilla</a>
            <a href="crear-jugador.html" class="nav-link active"><i class="fas fa-user-plus w-5"></i> Crear Jugador</a>
            
            <div class="text-[0.55rem] font-black uppercase text-slate-500 tracking-[0.2em] px-4 mt-6 mb-2">Administración</div>
            <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog w-5"></i> Usuarios</a>
            <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus w-5"></i> Crear Usuario</a>
            <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt w-5"></i> Rifas</a>
        </nav>

        <div class="sidebar-footer">
            <button class="w-full flex items-center justify-center gap-2 p-3 bg-red-500/10 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <div class="main">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu-btn" id="menu-btn">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
            <div>
                <h1 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter text-dibaText">Nuevo <span class="text-dibaGold">Jugador</span></h1>
                <p class="text-[10px] font-bold text-dibaMuted uppercase tracking-widest mt-1">Registro oficial de deportistas DIBA FBC</p>
            </div>
            <div class="topbar-right">
                <button id="theme-toggle" class="mobile-menu-btn" style="display: flex; margin-right: 0.5rem;" title="Cambiar Tema">
                  <i id="theme-icon" class="fas fa-sun"></i>
                </button>
                <div class="topbar-time" id="clock">00:00</div>
            </div>
        </header>

        <div class="p-4 md:p-8 flex justify-center">
            <div class="w-full max-w-xl bg-dibaDark2 border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl animate-fade-up">
                <div class="p-8 border-b border-white/5 bg-white/[0.02]">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-dibaGold/10 rounded-2xl flex items-center justify-center text-dibaGold">
                            <i class="fas fa-running text-xl"></i>
                        </div>
                        <div>
                            <h2 class="text-lg font-black italic uppercase text-dibaText">Ficha del Deportista</h2>
                            <p class="text-[10px] text-dibaMuted font-bold uppercase tracking-widest">Información básica y deportiva</p>
                        </div>
                    </div>
                </div>

                <div class="p-8">
                    <form id="createPlayerForm" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Nombre Completo</label>
                            <div class="relative">
                                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-dibaGold"></i>
                                <input type="text" name="nombre" required placeholder="ej. Juan Pérez" 
                                       class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold transition-all">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Documento (DNI/TI)</label>
                                <div class="relative">
                                    <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-dibaGold"></i>
                                    <input type="text" name="dni" placeholder="ej. 1029384756" 
                                           class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold transition-all">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Categoría</label>
                                <div class="relative">
                                    <i class="fas fa-layer-group absolute left-4 top-1/2 -translate-y-1/2 text-dibaGold"></i>
                                    <input type="text" name="categoria" placeholder="ej. 2012-2013" 
                                           class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold transition-all">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Estado en el Club</label>
                            <select name="status" required 
                                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold appearance-none cursor-pointer">
                                <option value="Activo" selected>Activo (Habilitado)</option>
                                <option value="Inactivo">Inactivo (Suspendido)</option>
                                <option value="Pendiente">Pendiente (Revisión)</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-4 pt-4">
                            <a href="planilla.html" class="flex-1 text-center py-4 bg-white/5 text-dibaMuted text-[10px] font-black uppercase tracking-widest rounded-2xl border border-white/5 hover:bg-white/10 transition-all">
                                <i class="fas fa-arrow-left mr-2"></i> Volver
                            </a>
                            <button type="submit" class="flex-[2] py-4 bg-dibaGold text-dibaBlue text-[10px] font-black uppercase tracking-widest rounded-2xl hover:scale-[1.02] transition-all shadow-lg shadow-dibaGold/20">
                                <i class="fas fa-save mr-2"></i> Registrar Jugador
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initTheme } from '/src/core/theme-switcher.js';
        import { initAdminLayout } from '/src/components/layout/admin-layout.js';
        import { hookCreatePlayerForm } from '/src/features/players/admin.js';
        
        initTheme();
        initAdminLayout();
        hookCreatePlayerForm();

        document.getElementById('admin-body').style.display = 'flex';

        // Clock logic
        const clockEl = document.getElementById('clock');
        setInterval(() => {
            if (clockEl) clockEl.textContent = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // Mobile menu
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        const menuIcon = document.getElementById('menu-icon');
        menuBtn?.addEventListener('click', () => {
            sidebar?.classList.toggle('open');
            if (menuIcon) {
                menuIcon.className = sidebar?.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
            }
        });
    </script>
</body>
</html>
