<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Usuario — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin-common.css">
</head>

<body style="display:none;" id="admin-body">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/ESCUDO.png" alt="DIBA FBC">
            <div>
                <div class="sidebar-logo-text">DIBA FBC</div>
                <div class="sidebar-logo-sub">Panel de Control</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>

            <div class="nav-section-label">Equipo</div>
            <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Planilla</a>
            <a href="listaJugadores.html" class="nav-link"><i class="fas fa-users"></i> Jugadores</a>
            <a href="partidos.html" class="nav-link"><i class="fas fa-futbol"></i> Partidos</a>
            <a href="../analisis.html" class="nav-link"><i class="fas fa-chart-line"></i> Análisis</a>

            <div class="nav-section-label">Administración</div>
            <a href="GestorDocumental.html" class="nav-link"><i class="fas fa-folder-open"></i> Gestor Documental</a>
            <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a>
            <a href="crear-usuario.html" class="nav-link active"><i class="fas fa-user-plus"></i> Crear Usuario</a>
            <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Rifas</a>

            <div class="nav-section-label">Sitio Web</div>
            <a href="../index.html" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="user-avatar" id="sb-avatar">A</div>
                <div>
                    <div class="user-name" id="sb-name">Administrador</div>
                    <div class="user-role" id="sb-role">Admin</div>
                </div>
            </div>
            <button class="btn-logout" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <!-- ══ MAIN ══ -->
    <div class="main">

        <header class="topbar">
            <button class="mobile-menu-btn" id="menu-btn">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
            <div>
                <div class="page-title">Crear <span>Usuario</span></div>
                <div class="page-subtitle">Registro de nuevo miembro del panel — DIBA FBC</div>
            </div>
            <div class="topbar-right">
                <div class="topbar-time" id="clock">--:--</div>
            </div>
        </header>

        <div class="content">
            <div class="panel animate-fade-up" style="max-width: 600px; margin: 0 auto;">
                <div class="panel-header">
                    <span class="panel-title"><i class="fas fa-user-plus"></i>Formulario de Registro</span>
                    <span class="panel-badge">Admin Privileges</span>
                </div>
                <div class="panel-body" style="padding: 2rem;">

                    <div id="form-alert" class="panel"
                        style="display:none; margin-bottom:1.5rem; padding:1rem; font-size:.8rem; font-weight:700">
                    </div>

                    <form id="createUserForm" autocomplete="off">

                        <div style="margin-bottom: 1.5rem;">
                            <label class="page-subtitle"
                                style="text-transform:uppercase; margin-bottom:.5rem; display:block">Nombre de
                                usuario</label>
                            <input type="text" class="form-control" name="username" placeholder="ej. entrenador_sub10"
                                required>
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label class="page-subtitle"
                                style="text-transform:uppercase; margin-bottom:.5rem; display:block">Contraseña</label>
                            <input type="password" class="form-control" name="password" placeholder="••••••••" required
                                autocomplete="new-password">
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label class="page-subtitle"
                                style="text-transform:uppercase; margin-bottom:.5rem; display:block">Nombre
                                completo</label>
                            <input type="text" class="form-control" name="full_name" placeholder="ej. Juan Pérez">
                        </div>

                        <div style="margin-bottom: 2rem;">
                            <label class="page-subtitle"
                                style="text-transform:uppercase; margin-bottom:.5rem; display:block">Rol</label>
                            <select class="form-select" name="role_name" required>
                                <option value="admin">Administrador</option>
                                <option value="tecnico" selected>Técnico</option>
                                <option value="authenticated">Usuario</option>
                            </select>
                        </div>

                        <div style="display:flex; justify-content:flex-end; gap:1rem">
                            <a href="usuarios.html" class="btn btn-outline" style="font-size:.7rem"><i
                                    class="fas fa-arrow-left"></i> Volver</a>
                            <button type="submit" class="btn btn-primary" id="submit-btn" style="font-size:.7rem"><i
                                    class="fas fa-save"></i> Guardar Usuario</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
        import { setupAdminUI } from '../scripts/admin-ui.js';

        const form = document.getElementById('createUserForm');
        const alertBox = document.getElementById('form-alert');
        const submitBtn = document.getElementById('submit-btn');

        requireAdmin().then(session => {
            if (session) {
                document.getElementById('admin-body').style.display = 'flex';
                setupAdminUI();
            }
        });

        function showAlert(msg, isSuccess = false) {
            alertBox.style.display = 'block';
            alertBox.style.borderColor = isSuccess ? '#4ade80' : '#fb7185';
            alertBox.style.color = isSuccess ? '#4ade80' : '#fb7185';
            alertBox.style.background = isSuccess ? 'rgba(34,197,94,.05)' : 'rgba(244,63,94,.05)';
            alertBox.innerHTML = `<i class="fas fa-${isSuccess ? 'check-circle' : 'exclamation-triangle'}"></i> ${msg}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CREANDO...';

            const fd = new FormData(form);
            const username = fd.get('username').trim();
            const password = fd.get('password');
            const full_name = fd.get('full_name').trim();
            const role_name = fd.get('role_name');

            try {
                const { error } = await supabase.rpc('admin_create_user', {
                    new_username: username,
                    new_password: password,
                    new_full_name: full_name,
                    new_role: role_name
                });

                if (error) throw error;

                showAlert('Usuario creado con éxito. Redirigiendo...', true);
                form.reset();
                setTimeout(() => { window.location.href = 'usuarios.html'; }, 1500);

            } catch (err) {
                console.error(err);
                showAlert('Error: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> GUARDAR USUARIO';
            }
        });
    </script>
</body>

</html>
