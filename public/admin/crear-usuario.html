<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Usuario — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#06090e] text-white font-['Outfit']">

    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300 flex items-center justify-center p-6">
        <div class="w-full max-w-2xl animate-fade-up">
            
            <!-- Context Header -->
            <div class="mb-10 text-center">
                <div class="flex items-center justify-center gap-3 mb-3">
                    <span class="w-8 h-1 bg-gold rounded-full"></span>
                    <p class="text-white/40 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Control de Seguridad DIBA</p>
                    <span class="w-8 h-1 bg-gold rounded-full"></span>
                </div>
                <h2 class="text-4xl lg:text-5xl font-black italic text-white uppercase tracking-tighter">Nuevo <span class="text-gold">Socio Admin</span></h2>
            </div>

            <div class="panel p-0 overflow-hidden shadow-[0_30px_100px_rgba(0,0,0,0.5)] border-white/10">
                <div class="p-8 border-b border-white/5 bg-white/[0.02] flex items-center gap-6">
                    <div class="w-14 h-14 bg-gold/10 rounded-2xl flex items-center justify-center text-gold border border-gold/10">
                        <i class="fas fa-user-shield text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-black italic uppercase text-white tracking-tight">Credenciales del Sistema</h3>
                        <p class="text-[0.6rem] text-white/30 font-bold uppercase tracking-[0.2em]">Defina los permisos y nivel de acceso</p>
                    </div>
                </div>

                <div class="p-10">
                    <form id="createUserForm" class="space-y-8">
                        <div id="form-alert" class="hidden flex items-center gap-4 p-5 rounded-2xl text-[0.7rem] font-bold uppercase tracking-widest bg-red-500/10 text-red-500 border border-red-500/20 animate-fade-in shadow-lg"></div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="premium-form-group">
                                <label class="premium-label">Nombre de Usuario (Login)</label>
                                <div class="relative group">
                                    <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                    <input type="text" name="username" required placeholder="EJ: TECNICO_PRO" 
                                        class="premium-input pl-14 font-black uppercase text-[0.8rem] tracking-tight">
                                </div>
                            </div>
                            
                            <div class="premium-form-group">
                                <label class="premium-label">Contraseña Temporal</label>
                                <div class="relative group">
                                    <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                    <input type="password" name="password" required placeholder="••••••••" 
                                        class="premium-input pl-14 font-black text-[0.8rem]">
                                </div>
                            </div>
                        </div>

                        <div class="premium-form-group">
                            <label class="premium-label">Nombre Completo del Directivo</label>
                            <div class="relative group">
                                <i class="fas fa-signature absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                <input type="text" name="full_name" required placeholder="EJ: ALEXANDER HERNÁNDEZ" 
                                    class="premium-input pl-14 font-bold uppercase text-[0.8rem]">
                            </div>
                        </div>

                        <div class="premium-form-group">
                            <label class="premium-label">Rol Administrativo Asignado</label>
                            <div class="relative group">
                                <i class="fas fa-user-tag absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                <select name="role_name" required class="premium-input pl-14 font-bold uppercase text-[0.7rem] tracking-widest cursor-pointer appearance-none">
                                    <option value="usuario">USUARIO ESTÁNDAR (CONSULTA)</option>
                                    <option value="tecnico" selected>TÉCNICO / COORDINADOR (OPERATIVO)</option>
                                    <option value="admin">ADMINISTRADOR (CONTROL TOTAL)</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-white/20 pointer-events-none"></i>
                            </div>
                            <p class="mt-3 text-[0.55rem] font-bold text-white/20 uppercase tracking-[0.2em] italic pr-2 text-right">
                                * El rol determina los módulos visibles en el menú lateral.
                            </p>
                        </div>

                        <div class="pt-6 flex flex-col md:flex-row gap-4">
                            <a href="usuarios.html" class="flex-1 px-8 py-5 bg-white/5 text-white/40 border border-white/5 rounded-2xl font-black uppercase tracking-widest text-[0.7rem] hover:bg-white/10 hover:text-white transition-all text-center flex items-center justify-center gap-3">
                                <i class="fas fa-arrow-left"></i> VOLVER
                            </a>
                            <button type="submit" id="submit-btn" class="flex-[2] px-8 py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase tracking-widest text-[0.75rem] shadow-xl shadow-gold/10 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3">
                                <i class="fas fa-save"></i> GUARDAR USUARIO
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="mt-8 text-center text-[0.6rem] font-bold text-white/20 uppercase tracking-[0.4em] italic">
                DIBA FBC SECURITY — SISTEMA CENTRALIZADO
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        initAdminLayout();
    </script>
    <script type="module" src="/src/features/users/admin.js"></script>
</body>

</html>
