<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBA FBC — Crear Usuario</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #002a40;
            --gold: #ffcc00;
            --dark: #0a0e14;
            --dark2: #111823;
            --dark3: #1a2332;
            --slate: #8b9ab0;
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.07);
            --sidebar-w: 270px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Layout matching dashboard ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--dark2);
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        .page-title span {
            color: var(--gold);
        }

        .page-subtitle {
            font-size: .7rem;
            color: var(--slate);
            font-weight: 600;
            margin-top: 2px;
        }

        .content {
            padding: 2rem;
            flex: 1;
        }

        /* ── Card ── */
        .form-card {
            max-width: 560px;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            animation: fadeUp .4s ease both;
        }

        .card-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .8rem;
        }

        .card-header i {
            color: var(--gold);
            font-size: 1rem;
        }

        .card-header-title {
            font-size: .85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .1em;
        }

        .card-body {
            padding: 1.8rem 1.5rem;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: .65rem;
            font-weight: 800;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--slate);
            margin-bottom: .5rem;
        }

        .form-control,
        .form-select {
            width: 100%;
            padding: .75rem 1rem;
            background: var(--dark3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            transition: border-color .2s;
            outline: none;
        }

        .form-control::placeholder {
            color: var(--slate);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--gold);
        }

        .form-select option {
            background: var(--dark3);
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            justify-content: flex-end;
            gap: .8rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .7rem 1.5rem;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: .75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-cancel {
            background: var(--dark3);
            color: var(--slate);
            border: 1px solid var(--border);
        }

        .btn-cancel:hover {
            color: var(--text);
            border-color: var(--slate);
        }

        .btn-submit {
            background: var(--gold);
            color: var(--blue);
        }

        .btn-submit:hover {
            background: #e6b800;
        }

        .btn-submit:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        /* ── Alert ── */
        .alert {
            display: none;
            padding: .8rem 1rem;
            border-radius: 10px;
            font-size: .75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .alert.error {
            background: rgba(244, 63, 94, .1);
            color: #fb7185;
            border: 1px solid rgba(244, 63, 94, .2);
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .alert.success {
            background: rgba(34, 197, 94, .1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, .2);
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main {
                margin-left: 0;
            }

            .content {
                padding: 1rem;
            }
        }
    </style>
</head>

<body style="display:none;" id="admin-body">

    <!-- Sidebar injected by dashboard iframe pattern -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { requireAdmin } from '../scripts/supabaseClient.js';
        requireAdmin().then(() => {
            document.getElementById('admin-body').style.display = '';
        });
    </script>

    <div class="main">

        <header class="topbar">
            <div>
                <div class="page-title">Crear <span>Usuario</span></div>
                <div class="page-subtitle">Registro de nuevo miembro del panel — DIBA FBC</div>
            </div>
        </header>

        <div class="content">
            <div class="form-card">
                <div class="card-header">
                    <i class="fas fa-user-plus"></i>
                    <span class="card-header-title">Nuevo Usuario</span>
                </div>
                <div class="card-body">

                    <div id="form-alert" class="alert"></div>

                    <form id="createUserForm" autocomplete="off">

                        <div class="form-group">
                            <label class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" name="username" placeholder="ej. entrenador_sub10"
                                required autocomplete="off">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" name="password" placeholder="••••••••" required
                                autocomplete="new-password">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" name="full_name" placeholder="ej. Juan Pérez">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Rol</label>
                            <select class="form-select" name="role_name" required>
                                <option value="admin">Administrador</option>
                                <option value="tecnico" selected>Técnico</option>
                                <option value="authenticated">Usuario</option>
                            </select>
                        </div>

                        <div class="btn-row">
                            <a href="usuarios.html" class="btn btn-cancel"><i class="fas fa-arrow-left"></i>
                                Cancelar</a>
                            <button type="submit" class="btn btn-submit" id="submit-btn"><i class="fas fa-save"></i>
                                Guardar Usuario</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../scripts/supabaseClient.js';

        const form = document.getElementById('createUserForm');
        const alertBox = document.getElementById('form-alert');
        const submitBtn = document.getElementById('submit-btn');

        function showAlert(msg, type = 'error') {
            alertBox.className = `alert ${type}`;
            alertBox.innerHTML = `<i class="fas fa-${type === 'error' ? 'circle-exclamation' : 'circle-check'}"></i> ${msg}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.className = 'alert'; // hide
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';

            const fd = new FormData(form);
            const username = fd.get('username').trim();
            const password = fd.get('password');
            const full_name = fd.get('full_name').trim();
            const role_name = fd.get('role_name');

            try {
                const { error } = await supabase.rpc('admin_create_user', {
                    new_username: username,
                    new_password: password,
                    new_full_name: full_name,
                    new_role: role_name
                });

                if (error) throw error;

                showAlert('Usuario creado con éxito. Redirigiendo...', 'success');
                form.reset();
                setTimeout(() => { window.location.href = 'usuarios.html'; }, 1500);

            } catch (err) {
                console.error(err);
                showAlert('Error al crear usuario: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar Usuario';
            }
        });
    </script>

</body>

</html>
