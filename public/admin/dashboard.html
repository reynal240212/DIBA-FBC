<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-slate-800 font-['Outfit']">

    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300">
        <div class="p-6 lg:p-10 max-w-[1600px] mx-auto overflow-x-hidden">
            <!-- Header Section -->
            <div class="mb-12 animate-fade-up">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-8 h-1 bg-yellow-500 rounded-full"></span>
                    <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Panel de Control Maestro</p>
                </div>
                <h2 class="text-4xl lg:text-5xl font-black italic text-slate-800 uppercase tracking-tighter">Resumen <span class="text-yellow-600">General</span></h2>
            </div>

            <!-- Dashboard Grid -->
            <div class="diba-grid gap-6 lg:gap-8">
                <!-- Row 1: KPIs (2x2) + Quick Access -->
                <div class="col-12 lg:col-4" style="animation-delay: 0.1s">
                    <div class="grid grid-cols-2 gap-4 h-full">
                        <div class="premium-stat-card p-4 lg:p-6 flex flex-col justify-center">
                            <div class="premium-stat-icon mb-2 text-yellow-600"><i class="fas fa-users text-sm lg:text-base"></i></div>
                            <div class="premium-stat-value text-xl lg:text-2xl text-slate-800" id="kpi-players">0</div>
                            <div class="premium-stat-label text-[0.55rem] lg:text-[0.65rem] text-slate-500">Jugadores</div>
                        </div>

                        <div class="premium-stat-card p-4 lg:p-6 flex flex-col justify-center">
                            <div class="premium-stat-icon mb-2 text-yellow-600"><i class="fas fa-futbol text-sm lg:text-base"></i></div>
                            <div class="premium-stat-value text-xl lg:text-2xl text-slate-800" id="kpi-matches">0</div>
                            <div class="premium-stat-label text-[0.55rem] lg:text-[0.65rem] text-slate-500">Partidos</div>
                        </div>

                        <div class="premium-stat-card p-4 lg:p-6 flex flex-col justify-center">
                            <div class="premium-stat-icon mb-2 text-yellow-600"><i class="fas fa-chart-line text-sm lg:text-base"></i></div>
                            <div class="premium-stat-value text-xl lg:text-2xl text-slate-800" id="kpi-attendance">0%</div>
                            <div class="premium-stat-label text-[0.55rem] lg:text-[0.65rem] text-slate-500">Asistencia</div>
                        </div>

                        <div class="premium-stat-card p-4 lg:p-6 flex flex-col justify-center">
                            <div class="premium-stat-icon mb-2 text-red-500"><i class="fas fa-wallet text-sm lg:text-base"></i></div>
                            <div class="premium-stat-value text-xl lg:text-2xl text-slate-800" id="kpi-pending">0</div>
                            <div class="premium-stat-label text-[0.55rem] lg:text-[0.65rem] text-slate-500">Pendientes</div>
                        </div>
                    </div>
                </div>

                <div class="col-12 lg:col-8 panel" style="animation-delay: 0.2s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-bolt text-yellow-600"></i>Accesos Rápidos</span>
                        <span class="premium-p-badge italic">Master</span>
                    </div>
                    <div class="p-6 lg:p-8">
                        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3 lg:gap-4">
                            <a href="planilla.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-clipboard-check text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Planilla</span>
                            </a>
                            <a href="partidos.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-calendar-star text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Partidos</span>
                            </a>
                            <a href="usuarios.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-users-gear text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Usuarios</span>
                            </a>
                            <a href="GestorDocumental.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-file-invoice text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Archivos</span>
                            </a>
                            <a href="rifa_diba.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-ticket text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Rifas</span>
                            </a>
                            <a href="push.html" class="flex flex-col items-center p-4 lg:p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-yellow-400 transition-all duration-300 group">
                                <i class="fas fa-paper-plane text-xl lg:text-2xl text-yellow-600 group-hover:text-slate-800 mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.6rem] lg:text-[0.65rem] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-800">Push</span>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-12 lg:col-4 panel" style="animation-delay: 0.35s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-history text-yellow-600"></i>Recientes</span>
                    </div>
                    <div class="p-6 max-h-[400px] overflow-y-auto custom-scrollbar">
                        <div class="space-y-3" id="activity-list">
                            <!-- Skeleton Loader -->
                            <div class="animate-pulse space-y-3">
                                <div class="h-12 bg-slate-100 rounded-xl"></div>
                                <div class="h-12 bg-slate-100 rounded-xl"></div>
                                <div class="h-12 bg-slate-100 rounded-xl"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="col-12 lg:col-8 panel" style="animation-delay: 0.4s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-calendar-alt text-yellow-600"></i>Próximos Encuentros</span>
                        <a href="partidos.html" class="text-[0.6rem] font-black uppercase tracking-[0.2em] text-yellow-600 hover:underline">Ver Todos →</a>
                    </div>
                    <div class="p-8">
                        <div id="matches-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Skeleton -->
                            <div class="h-32 bg-slate-100 rounded-2xl animate-pulse"></div>
                            <div class="h-32 bg-slate-100 rounded-2xl animate-pulse"></div>
                        </div>
                    </div>
                </div>

                <div class="col-12 lg:col-4 panel" id="attendance-panel" style="animation-delay: 0.45s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-chart-pie text-yellow-600"></i>Asistencia</span>
                    </div>
                    <div class="p-8">
                        <div class="space-y-6">
                            <div class="flex items-center justify-between text-[0.65rem] font-black uppercase tracking-widest text-slate-500">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                                    <span id="att-p">0 Presentes</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                                    <span id="att-a">0 Ausentes</span>
                                </div>
                            </div>
                            <div class="h-3 w-full bg-slate-200 rounded-full overflow-hidden flex">
                                <div class="h-full bg-green-500 transition-all duration-1000" id="bar-p" style="width:0%"></div>
                                <div class="h-full bg-red-500 transition-all duration-1000" id="bar-a" style="width:0%"></div>
                                <div class="h-full bg-yellow-500 transition-all duration-1000" id="bar-e" style="width:0%"></div>
                            </div>
                            <p class="text-[0.6rem] font-bold text-center text-slate-400 uppercase tracking-[0.3em]">Resumen de la última sesión</p>
                        </div>
                    </div>
                </div>
            </div> <!-- /diba-grid -->
        </div>
    </main>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        // ── AUTENTICACIÓN Y CARGA ──
        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;
                
                await initAdminLayout();
                await loadKPIs();
            } catch (error) {
                console.error("Init error:", error);
            }
        }
        init();

        async function loadKPIs() {
            try {
                // 1. Jugadores
                const { count: playerCount } = await supabase.from('identificacion').select('*', { count: 'exact', head: true });
                document.getElementById('kpi-players').textContent = playerCount || 0;

                // 2. Partidos
                const { count: matchCount } = await supabase.from('partidos').select('*', { count: 'exact', head: true });
                document.getElementById('kpi-matches').textContent = matchCount || 0;

                // 3. Asistencia (RPC)
                const { data: stats } = await supabase.rpc('get_dashboard_stats');
                if (stats && stats.length > 0) {
                    const s = stats[0];
                    const total = (s.presentes || 0) + (s.ausentes || 0) + (s.excusas || 0);
                    const attPct = total > 0 ? Math.round((s.presentes / total) * 100) : 0;
                    document.getElementById('kpi-attendance').textContent = `${attPct}%`;
                    
                    document.getElementById('bar-p').style.width = (total > 0 ? (s.presentes / total) * 100 : 0) + '%';
                    document.getElementById('bar-a').style.width = (total > 0 ? (s.ausentes / total) * 100 : 0) + '%';
                    document.getElementById('bar-e').style.width = (total > 0 ? (s.excusas / total) * 100 : 0) + '%';
                    
                    document.getElementById('att-p').textContent = `${s.presentes} Presentes`;
                    document.getElementById('att-a').textContent = `${s.ausentes} Ausentes`;
                }

                // 4. Pendientes
                const { count: pendingCount } = await supabase.from('planilla_registros').select('*', { count: 'exact', head: true }).or('pago.is.null,pago.eq.0');
                document.getElementById('kpi-pending').textContent = pendingCount || 0;

                // 5. Listas
                loadRecentActivity();
                loadUpcomingMatches();
            } catch (e) {
                console.error('KPI error:', e);
            }
        }

        async function loadRecentActivity() {
            const { data: players } = await supabase.from('jugadores').select('nombre, fecha_registro').order('fecha_registro', { ascending: false }).limit(5);
            const list = document.getElementById('activity-list');
            
            if (!players || players.length === 0) {
                list.innerHTML = `<div class="p-10 text-center opacity-20"><i class="fas fa-inbox text-4xl mb-2"></i><p class="text-[0.6rem] font-black uppercase">Sin actividad</p></div>`;
                return;
            }

            list.innerHTML = players.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all group">
                    <div class="w-10 h-10 rounded-xl bg-gold/10 text-gold flex items-center justify-center text-sm font-black">${p.nombre[0]}</div>
                    <div class="min-w-0">
                        <div class="text-[0.85rem] font-bold text-slate-800 truncate">${p.nombre}</div>
                        <div class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest mt-0.5">Nuevo Registro · ${new Date(p.fecha_registro).toLocaleDateString()}</div>
                    </div>
                    <i class="fas fa-arrow-right text-[0.6rem] text-gold/20 ml-auto group-hover:translate-x-1 group-hover:text-gold transition-all"></i>
                </div>
            `).join('');
        }

        async function loadUpcomingMatches() {
            const { data: matches } = await supabase.from('partidos').select('*').gte('fecha', new Date().toISOString().split('T')[0]).order('fecha', { ascending: true }).limit(2);
            const container = document.getElementById('matches-list');

            if (!matches || matches.length === 0) {
                container.innerHTML = `<div class="col-span-2 p-10 text-center opacity-20"><i class="fas fa-futbol text-4xl mb-2"></i><p class="text-[0.6rem] font-black uppercase">No hay partidos programados</p></div>`;
                return;
            }

            container.innerHTML = matches.map(m => {
                const dateObj = new Date(m.fecha + 'T00:00:00');
                const day = dateObj.getDate();
                const month = dateObj.toLocaleDateString('es-CO', { month: 'short' }).replace('.', '').toUpperCase();
                
                return `
                <div class="match-card group">
                    <span class="match-category-pill">${m.categoria}</span>
                    
                    <div class="flex items-center gap-6">
                        <div class="match-date-badge">
                            <span class="match-date-day">${day}</span>
                            <span class="match-date-month">${month}</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col gap-3">
                            <div class="flex items-center gap-3">
                                <span class="match-team">${m.equipolocal}</span>
                                <span class="match-vs-badge">VS</span>
                                <span class="match-team">${m.equipovisitante}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="match-footer">
                        <div class="match-info-item">
                            <i class="fas fa-clock text-gold"></i>
                            <span>${m.hora}</span>
                        </div>
                        <div class="match-info-item">
                            <i class="fas fa-map-marker-alt text-gold"></i>
                            <span>${m.Cancha}</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
