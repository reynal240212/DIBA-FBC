<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#06090e] text-white font-['Outfit']">

    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300">
        <div class="p-6 lg:p-10 max-w-[1600px] mx-auto overflow-x-hidden">
            <!-- Header Section -->
            <div class="mb-12 animate-fade-up">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-8 h-1 bg-gold rounded-full"></span>
                    <p class="text-white/40 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Panel de Control Maestro</p>
                </div>
                <h2 class="text-4xl lg:text-5xl font-black italic text-white uppercase tracking-tighter">Resumen <span class="text-gold">General</span></h2>
            </div>

            <!-- Dashboard Grid -->
            <div class="diba-grid gap-6 lg:gap-8">
                <!-- KPI Section (Row 1) -->
                <div class="col-12 lg:col-3 premium-stat-card animate-fade-up" style="animation-delay: 0.1s">
                    <div class="premium-stat-icon"><i class="fas fa-users"></i></div>
                    <div class="premium-stat-value" id="kpi-players">0</div>
                    <div class="premium-stat-label">Jugadores</div>
                </div>

                <div class="col-12 lg:col-3 premium-stat-card animate-fade-up" style="animation-delay: 0.15s">
                    <div class="premium-stat-icon"><i class="fas fa-futbol"></i></div>
                    <div class="premium-stat-value" id="kpi-matches">0</div>
                    <div class="premium-stat-label">Partidos</div>
                </div>

                <div class="col-12 lg:col-3 premium-stat-card animate-fade-up" style="animation-delay: 0.2s">
                    <div class="premium-stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="premium-stat-value" id="kpi-attendance">0%</div>
                    <div class="premium-stat-label">Asistencia</div>
                </div>

                <div class="col-12 lg:col-3 premium-stat-card animate-fade-up" style="animation-delay: 0.25s">
                    <div class="premium-stat-icon text-red-500"><i class="fas fa-wallet"></i></div>
                    <div class="premium-stat-value" id="kpi-pending">0</div>
                    <div class="premium-stat-label">Pendientes</div>
                </div>

                <!-- Main Content Row (Row 2) -->
                <div class="col-12 lg:col-8 panel animate-fade-up" style="animation-delay: 0.3s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-bolt text-gold"></i>Accesos Rápidos</span>
                        <span class="premium-p-badge italic">Master</span>
                    </div>
                    <div class="p-8">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <a href="planilla.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-clipboard-check text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Planilla</span>
                            </a>
                            <a href="partidos.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-calendar-star text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Partidos</span>
                            </a>
                            <a href="usuarios.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-users-gear text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Usuarios</span>
                            </a>
                            <a href="GestorDocumental.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-file-invoice text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Archivos</span>
                            </a>
                            <a href="rifa_diba.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-ticket text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Rifas</span>
                            </a>
                            <a href="push.html" class="flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-2xl hover:bg-gold transition-all duration-300 group">
                                <i class="fas fa-paper-plane text-2xl text-gold group-hover:text-[#004d98] mb-3 transition-transform group-hover:scale-110"></i>
                                <span class="text-[0.65rem] font-black uppercase tracking-widest text-white/40 group-hover:text-[#004d98]">Push</span>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-12 lg:col-4 panel animate-fade-up" style="animation-delay: 0.35s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-history text-gold"></i>Recientes</span>
                    </div>
                    <div class="p-6 max-h-[400px] overflow-y-auto custom-scrollbar">
                        <div class="space-y-4" id="activity-list">
                            <!-- Skeleton Loader -->
                            <div class="animate-pulse space-y-4">
                                <div class="h-12 bg-white/5 rounded-xl"></div>
                                <div class="h-12 bg-white/5 rounded-xl"></div>
                                <div class="h-12 bg-white/5 rounded-xl"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="col-12 lg:col-8 panel animate-fade-up" style="animation-delay: 0.4s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-calendar-alt text-gold"></i>Próximos Encuentros</span>
                        <a href="partidos.html" class="text-[0.6rem] font-black uppercase tracking-[0.2em] text-gold hover:underline">Ver Todos →</a>
                    </div>
                    <div class="p-8">
                        <div id="matches-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Skeleton -->
                            <div class="h-32 bg-white/5 rounded-2xl animate-pulse"></div>
                            <div class="h-32 bg-white/5 rounded-2xl animate-pulse"></div>
                        </div>
                    </div>
                </div>

                <div class="col-12 lg:col-4 panel animate-fade-up" id="attendance-panel" style="animation-delay: 0.45s">
                    <div class="premium-p-header">
                        <span class="premium-p-title"><i class="fas fa-chart-pie text-gold"></i>Asistencia</span>
                    </div>
                    <div class="p-8">
                        <div class="space-y-6">
                            <div class="flex items-center justify-between text-[0.65rem] font-black uppercase tracking-widest text-white/40">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                                    <span id="att-p">0 Presentes</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                                    <span id="att-a">0 Ausentes</span>
                                </div>
                            </div>
                            <div class="h-3 w-full bg-white/5 rounded-full overflow-hidden flex border border-white/5 shadow-inner">
                                <div class="h-full bg-gradient-to-r from-green-500 to-green-400 transition-all duration-1000" id="bar-p" style="width:0%"></div>
                                <div class="h-full bg-gradient-to-r from-red-500 to-red-400 transition-all duration-1000" id="bar-a" style="width:0%"></div>
                                <div class="h-full bg-gradient-to-r from-yellow-500 to-yellow-400 transition-all duration-1000" id="bar-e" style="width:0%"></div>
                            </div>
                            <p class="text-[0.6rem] font-bold text-center text-white/20 uppercase tracking-[0.3em]">Resumen de la última sesión</p>
                        </div>
                    </div>
                </div>
            </div> <!-- /diba-grid -->
        </div>
    </main>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        // ── AUTENTICACIÓN Y CARGA ──
        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;
                
                await initAdminLayout();
                await loadKPIs();
            } catch (error) {
                console.error("Init error:", error);
            }
        }
        init();

        async function loadKPIs() {
            try {
                // 1. Jugadores
                const { count: playerCount } = await supabase.from('identificacion').select('*', { count: 'exact', head: true });
                document.getElementById('kpi-players').textContent = playerCount || 0;

                // 2. Partidos
                const { count: matchCount } = await supabase.from('partidos').select('*', { count: 'exact', head: true });
                document.getElementById('kpi-matches').textContent = matchCount || 0;

                // 3. Asistencia (RPC)
                const { data: stats } = await supabase.rpc('get_dashboard_stats');
                if (stats && stats.length > 0) {
                    const s = stats[0];
                    const total = (s.presentes || 0) + (s.ausentes || 0) + (s.excusas || 0);
                    const attPct = total > 0 ? Math.round((s.presentes / total) * 100) : 0;
                    document.getElementById('kpi-attendance').textContent = `${attPct}%`;
                    
                    document.getElementById('bar-p').style.width = (total > 0 ? (s.presentes / total) * 100 : 0) + '%';
                    document.getElementById('bar-a').style.width = (total > 0 ? (s.ausentes / total) * 100 : 0) + '%';
                    document.getElementById('bar-e').style.width = (total > 0 ? (s.excusas / total) * 100 : 0) + '%';
                    
                    document.getElementById('att-p').textContent = `${s.presentes} Presentes`;
                    document.getElementById('att-a').textContent = `${s.ausentes} Ausentes`;
                }

                // 4. Pendientes
                const { count: pendingCount } = await supabase.from('planilla_registros').select('*', { count: 'exact', head: true }).or('pago.is.null,pago.eq.0');
                document.getElementById('kpi-pending').textContent = pendingCount || 0;

                // 5. Listas
                loadRecentActivity();
                loadUpcomingMatches();
            } catch (e) {
                console.error('KPI error:', e);
            }
        }

        async function loadRecentActivity() {
            const { data: players } = await supabase.from('jugadores').select('nombre, fecha_registro').order('fecha_registro', { ascending: false }).limit(5);
            const list = document.getElementById('activity-list');
            
            if (!players || players.length === 0) {
                list.innerHTML = `<div class="p-10 text-center opacity-20"><i class="fas fa-inbox text-4xl mb-2"></i><p class="text-[0.6rem] font-black uppercase">Sin actividad</p></div>`;
                return;
            }

            list.innerHTML = players.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all group">
                    <div class="w-10 h-10 rounded-xl bg-gold/10 text-gold flex items-center justify-center text-sm font-black">${p.nombre[0]}</div>
                    <div class="min-w-0">
                        <div class="text-[0.85rem] font-bold text-white truncate">${p.nombre}</div>
                        <div class="text-[0.6rem] font-black text-white/30 uppercase tracking-widest mt-0.5">Nuevo Registro · ${new Date(p.fecha_registro).toLocaleDateString()}</div>
                    </div>
                    <i class="fas fa-arrow-right text-[0.6rem] text-gold/20 ml-auto group-hover:translate-x-1 group-hover:text-gold transition-all"></i>
                </div>
            `).join('');
        }

        async function loadUpcomingMatches() {
            const { data: matches } = await supabase.from('partidos').select('*').gte('fecha', new Date().toISOString().split('T')[0]).order('fecha', { ascending: true }).limit(2);
            const container = document.getElementById('matches-list');

            if (!matches || matches.length === 0) {
                container.innerHTML = `<div class="col-span-2 p-10 text-center opacity-20"><i class="fas fa-futbol text-4xl mb-2"></i><p class="text-[0.6rem] font-black uppercase">No hay partidos programados</p></div>`;
                return;
            }

            container.innerHTML = matches.map(m => `
                <div class="p-6 bg-[#020617] border border-white/5 rounded-3xl relative overflow-hidden group hover:border-gold/30 transition-all">
                    <div class="absolute top-0 right-0 p-4">
                        <span class="px-2 py-1 rounded bg-gold/10 text-gold text-[0.5rem] font-black uppercase tracking-widest">${m.categoria}</span>
                    </div>
                    <div class="mb-6 flex flex-col gap-1">
                        <span class="text-[0.6rem] font-black text-white/30 uppercase tracking-widest">${new Date(m.fecha).toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' })}</span>
                        <div class="flex items-center gap-3 text-lg font-black italic tracking-tighter uppercase">
                            <span class="text-white">${m.equipolocal}</span>
                            <span class="text-gold text-xs">VS</span>
                            <span class="text-white">${m.equipovisitante}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-white/5">
                        <div class="flex items-center gap-4 text-[0.65rem] font-black uppercase tracking-widest text-white/40">
                            <span><i class="fas fa-clock text-gold mr-2"></i>${m.hora}</span>
                            <span><i class="fas fa-map-marker-alt text-gold mr-2"></i>${m.Cancha}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
