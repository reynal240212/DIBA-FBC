<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white pb-20">
        <div class="p-6 lg:p-10 space-y-8 max-w-2xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col items-center text-center gap-4 animate-fade-up">
                <div class="w-20 h-20 bg-diba-blue/5 rounded-[2rem] flex items-center justify-center text-diba-blue shadow-inner group transition-all hover:scale-110">
                    <i class="fas fa-user-edit text-3xl"></i>
                </div>
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase" id="user-title">Cargando...</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1" id="user-subtitle">Gestión de Perfil Administrativo</p>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium p-8 md:p-12 animate-fade-up" style="animation-delay: 0.1s">
                <form id="editUserForm" class="space-y-8">
                    <div id="form-alert" class="hidden flex items-center gap-3 p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg"></div>

                    <!-- ID and Username Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">ID Universal</label>
                            <input type="text" id="user-id-display" readonly 
                                   class="w-full px-6 py-4 bg-slate-50 border border-slate-50 rounded-2xl text-slate-400 text-[10px] font-black outline-none cursor-not-allowed italic">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Nombre de Usuario</label>
                            <div class="relative group">
                                <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                                <input type="text" name="username" id="username" required 
                                       class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all lowercase italic">
                            </div>
                        </div>
                    </div>

                    <!-- Full Name -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Nombre Completo</label>
                        <div class="relative group">
                            <i class="fas fa-signature absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                            <input type="text" name="full_name" id="full_name" required placeholder="Nombre del administrador" 
                                   class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all uppercase italic">
                        </div>
                    </div>

                    <!-- Role -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Asignar Rol Permanente</label>
                        <div class="relative group">
                            <i class="fas fa-id-badge absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                            <select name="role_name" id="role_name" required 
                                    class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue appearance-none cursor-pointer transition-all italic">
                                <option value="usuario">USUARIO ESTÁNDAR (CONSULTA)</option>
                                <option value="tecnico">TÉCNICO / ENTRENADOR (PLANILLA/JUGADORES)</option>
                                <option value="admin">ADMINISTRADOR (CONTROL TOTAL)</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-col sm:flex-row items-center gap-4 pt-4">
                        <a href="usuarios.html" class="w-full sm:flex-1 text-center py-4 bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-slate-100 hover:bg-slate-100 hover:text-diba-blue transition-all italic">
                            <i class="fas fa-times mr-2"></i> Cancelar
                        </a>
                        <button type="submit" id="submit-btn" class="w-full sm:flex-[2] py-4 bg-diba-blue text-diba-gold text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-blue-900/20 italic">
                            <i class="fas fa-save mr-2"></i> Aplicar Cambios
                        </button>
                    </div>
                </form>
            </div>

            <!-- Warning -->
            <div class="p-6 bg-rose-50 border border-rose-100 rounded-3xl animate-fade-up" style="animation-delay: 0.2s">
                <div class="flex gap-4">
                    <i class="fas fa-exclamation-triangle text-rose-500 mt-1"></i>
                    <div>
                        <p class="text-[10px] font-black text-rose-600 uppercase tracking-widest">Atención: Cambios Críticos</p>
                        <p class="text-[9px] text-rose-400 font-bold uppercase mt-1 leading-relaxed">La modificación del rol de un usuario afecta instantáneamente su acceso a módulos restringidos y API Keys de Supabase.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        const form = document.getElementById('editUserForm');
        const alertBox = document.getElementById('form-alert');
        const submitBtn = document.getElementById('submit-btn');

        // Obtener ID de la URL
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        async function loadUserData() {
            if (!userId) {
                window.location.href = 'usuarios.html';
                return;
            }

            try {
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                document.getElementById('user-id-display').value = user.id.slice(0, 18) + '...';
                document.getElementById('username').value = user.username;
                document.getElementById('full_name').value = user.full_name || '';
                document.getElementById('role_name').value = user.role;
                document.getElementById('user-title').textContent = user.username.toUpperCase();
                document.getElementById('user-subtitle').textContent = `ACTUALIZANDO A ${user.full_name || user.username}`.toUpperCase();

            } catch (err) {
                console.error(err);
                alert("Error al cargar usuario: " + err.message);
                window.location.href = 'usuarios.html';
            }
        }

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            loadUserData();
        }
        init();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2 text-diba-gold"></i> Sincronizando...';

            const fd = new FormData(form);
            const new_username = fd.get('username').trim();
            const new_full_name = fd.get('full_name').trim();
            const new_role = fd.get('role_name');

            try {
                const { error } = await supabase.rpc('admin_update_user', {
                    target_user_id: userId,
                    new_full_name: new_full_name,
                    new_role: new_role,
                    new_username: new_username
                });

                if (error) throw error;

                alertBox.className = "flex items-center gap-3 p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-emerald-50 text-emerald-600 border border-emerald-100 shadow-lg shadow-emerald-500/10";
                alertBox.innerHTML = '<i class="fas fa-check-circle text-lg"></i> Cambios Aplicados con Éxito';
                alertBox.classList.remove('hidden');
                
                setTimeout(() => window.location.href = 'usuarios.html', 1500);

            } catch (err) {
                alertBox.className = "flex items-center gap-3 p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-rose-50 text-rose-600 border border-rose-100 shadow-lg shadow-rose-500/10";
                alertBox.innerHTML = '<i class="fas fa-exclamation-triangle text-lg"></i> Error: ' + err.message;
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save mr-2"></i> Aplicar Cambios';
            }
        });
    </script>
</body>

</html>
