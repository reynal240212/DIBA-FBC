<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Core & Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
</head>
<body class="bg-slate-50 font-['Montserrat']">
    <!-- Loader -->
    <div id="app-loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-white text-[#003366]">
        <i class="fas fa-circle-notch fa-spin text-4xl"></i>
    </div>

    <div id="admin-body" class="hidden min-h-screen transition-opacity duration-500 opacity-0">
        <main class="lg:ml-72 min-h-screen transition-all duration-300">
            <div class="p-4 lg:p-8 max-w-4xl mx-auto flex justify-center items-center min-h-[80vh]">
                
                <div class="w-full max-w-xl bg-white rounded-[2.5rem] border border-slate-100 shadow-premium overflow-hidden animate-fade-up">
                    <!-- Header Secundario -->
                    <div class="p-8 border-b border-slate-50 bg-slate-50/30 flex items-center gap-5">
                        <div class="w-14 h-14 bg-white text-[#003366] rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm text-2xl">
                            <i class="fas fa-user-edit text-[#FFD700]"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-black italic uppercase text-[#003366] leading-tight" id="user-title">Cargando...</h2>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1" id="user-subtitle">Actualizando información de usuario</p>
                        </div>
                    </div>

                    <div class="p-8 lg:p-10">
                        <form id="editUserForm" class="space-y-6">
                            <div id="form-alert" class="hidden p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-fade-up border"></div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">ID Interno</label>
                                <input type="text" id="user-id-display" readonly class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-xl text-slate-300 text-[9px] font-mono outline-none cursor-not-allowed uppercase tracking-tighter">
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre de Usuario (@)</label>
                                <div class="relative">
                                    <input type="text" name="username" id="username" required class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm">
                                    <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre Completo</label>
                                <div class="relative">
                                    <input type="text" name="full_name" id="full_name" placeholder="ej. Alexander Hernández" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm">
                                    <i class="fas fa-signature absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nivel de Acceso (Rol)</label>
                                <div class="relative group">
                                    <select name="role_name" id="role_name" required class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm appearance-none cursor-pointer">
                                        <option value="usuario">Usuario Estándar (Lectura)</option>
                                        <option value="tecnico">Técnico / Entrenador (Gestión)</option>
                                        <option value="admin">Administrador (Total)</option>
                                    </select>
                                    <i class="fas fa-shield-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-hover:text-[#FFD700] transition-colors"></i>
                                    <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 text-[10px] pointer-events-none"></i>
                                </div>
                            </div>

                            <div class="flex items-center gap-4 pt-6">
                                <a href="usuarios.html" class="flex-1 bg-white border border-slate-100 text-[#003366] rounded-2xl py-4 text-center text-[10px] font-black uppercase tracking-[0.2em] italic hover:bg-slate-50 transition-all shadow-sm">
                                    <i class="fas fa-times mr-2"></i> Cancelar
                                </a>
                                <button type="submit" id="submit-btn" class="flex-[2] bg-[#003366] text-white rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:bg-[#002244] transition-all flex items-center justify-center gap-3 group shadow-lg shadow-[#003366]/20 relative overflow-hidden">
                                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                                    <i class="fas fa-check-circle group-hover:scale-110 transition-transform text-[#FFD700]"></i>
                                    <span id="btn-text">Aplicar Cambios</span>
                                    <div id="btn-spinner" class="hidden w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Core Logic -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../src/core/supabase.js';
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';

        const form = document.getElementById('editUserForm');
        const alertBox = document.getElementById('form-alert');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        // Obtener ID de la URL
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        async function loadUserData() {
            if (!userId) {
                window.location.href = 'usuarios.html';
                return;
            }

            try {
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                document.getElementById('user-id-display').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('full_name').value = user.full_name || '';
                document.getElementById('role_name').value = user.role;
                document.getElementById('user-title').innerHTML = `${user.username} <span class="text-[#FFD700]">Perfil</span>`;
                document.getElementById('user-subtitle').textContent = `Editando a ${user.full_name || user.username}`;

            } catch (err) {
                console.error(err);
                alert("Error al cargar usuario: " + err.message);
                window.location.href = 'usuarios.html';
            }
        }

        async function init() {
            try {
                const session = await requireAdmin();
                if (session) {
                    const user = session.user;
                    initAdminLayout({
                        username: user.email.split('@')[0],
                        role: 'Administrador',
                        avatarText: user.email[0].toUpperCase()
                    });

                    await loadUserData();

                    const loader = document.getElementById('app-loader');
                    const body = document.getElementById('admin-body');
                    loader.classList.add('opacity-0');
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        body.classList.remove('hidden');
                        setTimeout(() => body.classList.add('opacity-100'), 50);
                    }, 300);
                }
            } catch (error) {
                console.error(error);
            }
        }
        init();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            submitBtn.disabled = true;
            btnSpinner.classList.remove('hidden');
            btnText.classList.add('opacity-50');

            const fd = new FormData(form);
            const new_username = fd.get('username').trim();
            const new_full_name = fd.get('full_name').trim();
            const new_role = fd.get('role_name');

            try {
                const { error } = await supabase.rpc('admin_update_user', {
                    target_user_id: userId,
                    new_full_name: new_full_name,
                    new_role: new_role,
                    new_username: new_username
                });

                if (error) throw error;

                alertBox.className = "p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-emerald-50 text-emerald-500 border border-emerald-100 flex items-center gap-3";
                alertBox.innerHTML = '<i class="fas fa-check-circle"></i> Cambios guardados con éxito.';
                alertBox.classList.remove('hidden');
                
                setTimeout(() => window.location.href = 'usuarios.html', 1500);

            } catch (err) {
                alertBox.className = "p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-rose-50 text-rose-500 border border-rose-100 flex items-center gap-3";
                alertBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + err.message;
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                btnSpinner.classList.add('hidden');
                btnText.classList.remove('opacity-50');
            }
        });
    </script>
</body>
</html>
