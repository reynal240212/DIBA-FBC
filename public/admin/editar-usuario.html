<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dibaGold: 'var(--gold)',
                        dibaBlue: 'var(--blue)',
                        dibaDark: 'var(--bg-main)',
                        dibaDark2: 'var(--bg-panel)',
                        dibaText: 'var(--text-main)',
                        dibaMuted: 'var(--text-muted)'
                    }
                },
            },
        }
    </script>
</head>

<body style="display: none;" id="admin-body" class="bg-dibaDark text-dibaText font-sans">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-[38px] h-[38px]">
            <div>
                <div class="text-[1.05rem] font-black italic uppercase tracking-wider text-dibaGold leading-none">DIBA FBC</div>
                <div class="text-[0.55rem] text-slate-500 uppercase tracking-widest font-bold mt-1">Panel de Control</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large w-5"></i> Dashboard</a>
            <div class="text-[0.55rem] font-black uppercase text-slate-500 tracking-[0.2em] px-4 mt-6 mb-2">Administración</div>
            <a href="usuarios.html" class="nav-link active"><i class="fas fa-user-cog w-5"></i> Usuarios</a>
            <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus w-5"></i> Crear Usuario</a>
        </nav>

        <div class="sidebar-footer">
            <button class="w-full flex items-center justify-center gap-2 p-3 bg-red-500/10 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <div class="main">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu-btn" id="menu-btn">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
            <div>
                <h1 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter text-dibaText">Editar <span class="text-dibaGold">Perfil</span></h1>
                <p class="text-[10px] font-bold text-dibaMuted uppercase tracking-widest mt-1">Modificación de permisos y datos oficiales</p>
            </div>
            <div class="topbar-right">
                <button id="theme-toggle" class="mobile-menu-btn" style="display: flex; margin-right: 0.5rem;" title="Cambiar Tema">
                  <i id="theme-icon" class="fas fa-sun"></i>
                </button>
                <div class="topbar-time" id="clock">00:00</div>
            </div>
        </header>

        <div class="p-4 md:p-8 flex justify-center">
            <div class="w-full max-w-xl bg-dibaDark2 border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl animate-fade-up">
                <div class="p-8 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-dibaGold/10 rounded-2xl flex items-center justify-center text-dibaGold">
                            <i class="fas fa-user-edit text-xl"></i>
                        </div>
                        <div>
                            <h2 class="text-lg font-black italic uppercase text-dibaText" id="user-title">Cargando...</h2>
                            <p class="text-[10px] text-dibaMuted font-bold uppercase tracking-widest" id="user-subtitle">Actualizando información de usuario</p>
                        </div>
                    </div>
                </div>

                <div class="p-8">
                    <form id="editUserForm" class="space-y-6">
                        <div id="form-alert" class="hidden flex items-center gap-3 p-4 rounded-2xl text-xs font-bold uppercase tracking-widest"></div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">ID del Registro</label>
                            <input type="text" id="user-id-display" readonly 
                                   class="w-full px-4 py-3 bg-white/5 border border-white/5 rounded-xl text-dibaMuted text-[10px] font-mono outline-none cursor-not-allowed">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Nombre de Usuario (@)</label>
                            <div class="relative">
                                <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-dibaGold"></i>
                                <input type="text" name="username" id="username" required 
                                       class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold transition-all">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Nombre Completo</label>
                            <div class="relative">
                                <i class="fas fa-signature absolute left-4 top-1/2 -translate-y-1/2 text-dibaGold"></i>
                                <input type="text" name="full_name" id="full_name" placeholder="ej. Alexander Hernández" 
                                       class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold transition-all">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted ml-1">Rol Administrativo</label>
                            <select name="role_name" id="role_name" required 
                                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-dibaText text-sm font-semibold outline-none focus:ring-2 focus:ring-dibaGold appearance-none cursor-pointer">
                                <option value="usuario">Usuario Estándar (Consulta)</option>
                                <option value="tecnico">Técnico / Entrenador (Planilla/Jugadores)</option>
                                <option value="admin">Administrador (Control Total)</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-4 pt-4">
                            <a href="usuarios.html" class="flex-1 text-center py-4 bg-white/5 text-dibaMuted text-[10px] font-black uppercase tracking-widest rounded-2xl border border-white/5 hover:bg-white/10 transition-all">
                                <i class="fas fa-times mr-2"></i> Cancelar
                            </a>
                            <button type="submit" id="submit-btn" class="flex-[2] py-4 bg-dibaGold text-dibaBlue text-[10px] font-black uppercase tracking-widest rounded-2xl hover:scale-[1.02] transition-all shadow-lg shadow-dibaGold/20">
                                <i class="fas fa-check mr-2"></i> Aplicar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        const form = document.getElementById('editUserForm');
        const alertBox = document.getElementById('form-alert');
        const submitBtn = document.getElementById('submit-btn');

        // Obtener ID de la URL
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        async function loadUserData() {
            if (!userId) {
                window.location.href = 'usuarios.html';
                return;
            }

            try {
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                document.getElementById('user-id-display').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('full_name').value = user.full_name || '';
                document.getElementById('role_name').value = user.role;
                document.getElementById('user-title').textContent = user.username;
                document.getElementById('user-subtitle').textContent = `Editando a ${user.full_name || user.username}`;

            } catch (err) {
                console.error(err);
                alert("Error al cargar usuario: " + err.message);
                window.location.href = 'usuarios.html';
            }
        }

        async function init() {
            try {
                const session = await requireAdmin();
                if (session) {
                    document.getElementById('admin-body').style.display = 'flex';
                    loadUserData();
                }
            } catch (error) {
                console.error(error);
            }
        }
        init();

        // UI Helpers
        const clockEl = document.getElementById('clock');
        setInterval(() => {
            clockEl.textContent = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        menuBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            document.getElementById('menu-icon').className = sidebar.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
        });

        document.getElementById('logout-btn')?.addEventListener('click', async () => {
            if (confirm('¿Cerrar sesión?')) {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Guardando...';

            const fd = new FormData(form);
            const new_username = fd.get('username').trim();
            const new_full_name = fd.get('full_name').trim();
            const new_role = fd.get('role_name');

            try {
                const { error } = await supabase.rpc('admin_update_user', {
                    target_user_id: userId,
                    new_full_name: new_full_name,
                    new_role: new_role,
                    new_username: new_username
                });

                if (error) throw error;

                alertBox.className = "flex items-center gap-3 p-4 rounded-2xl text-xs font-bold uppercase tracking-widest bg-green-500/10 text-green-500";
                alertBox.innerHTML = '<i class="fas fa-check-circle"></i> Cambios guardados con éxito.';
                alertBox.classList.remove('hidden');
                
                setTimeout(() => window.location.href = 'usuarios.html', 1500);

            } catch (err) {
                alertBox.className = "flex items-center gap-3 p-4 rounded-2xl text-xs font-bold uppercase tracking-widest bg-red-500/10 text-red-500";
                alertBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + err.message;
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check mr-2"></i> Aplicar Cambios';
            }
        });
    </script>
</body>
</html>
