<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-2xl mx-auto flex items-center justify-center min-h-[80vh]">
            
            <div class="w-full bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden animate-fade-up">
                <!-- Header Secundario -->
                <div class="p-8 border-b border-slate-50 bg-slate-50/30 flex items-center gap-5">
                    <div class="w-14 h-14 bg-gradient-to-br from-diba-blue to-diba-red text-white rounded-2xl flex items-center justify-center shadow-lg text-2xl">
                        <i class="fas fa-user-edit text-diba-gold"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black italic uppercase text-diba-blue leading-tight flex items-center gap-2">
                            Editar <span class="text-diba-red">Usuario</span>
                        </h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Actualización de perfil administrativo</p>
                    </div>
                </div>

                <div class="p-8 lg:p-10">
                    <form id="editUserForm" class="space-y-6">
                        <div id="form-alert" class="hidden p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest"></div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre Completo</label>
                            <div class="relative">
                                <input type="text" name="full_name" id="full_name" placeholder="Cargando..." class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm">
                                <i class="fas fa-signature absolute left-4 top-1/2 -translate-y-1/2 text-slate-200"></i>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nivel de Acceso (Rol)</label>
                            <div class="relative group">
                                <select name="role" id="role" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 transition-all shadow-sm appearance-none cursor-pointer">
                                    <option value="usuario">Usuario Estándar (Lectura)</option>
                                    <option value="tecnico">Técnico / Entrenador (Gestión)</option>
                                    <option value="admin">Administrador (Total)</option>
                                </select>
                                <i class="fas fa-shield-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-200 group-hover:text-diba-blue transition-colors"></i>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-200 text-[10px] pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-50 rounded-[2rem] border border-slate-100 italic">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-2 flex items-center gap-2">
                                <i class="fas fa-info-circle text-diba-blue"></i> Nota de Seguridad
                            </p>
                            <p class="text-[10px] text-slate-500 font-medium leading-relaxed">Las credenciales de acceso (Username/Email) deben ser gestionadas por el administrador de sistemas para mantener la integridad de la base de datos.</p>
                        </div>

                        <div class="flex items-center gap-4 pt-6">
                            <a href="usuarios.html" class="flex-1 bg-white border border-slate-100 text-slate-400 rounded-2xl py-4 text-center text-[10px] font-black uppercase tracking-[0.2em] italic hover:bg-slate-50 transition-all">
                                <i class="fas fa-arrow-left mr-2"></i> Volver
                            </a>
                            <button type="submit" id="submit-btn" class="flex-[2] bg-diba-gold text-diba-blue rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:scale-105 transition-all flex items-center justify-center gap-3 group shadow-lg shadow-yellow-500/20">
                                <i class="fas fa-save group-hover:scale-110 transition-transform text-diba-red"></i>
                                <span id="btn-text">Actualizar Perfil</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            if (userId) loadUserData();
            
            document.getElementById('editUserForm').addEventListener('submit', handleUpdate);
        }

        async function loadUserData() {
            const { data, error } = await supabase.from('users').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('full_name').value = data.full_name || '';
                document.getElementById('role').value = data.role || 'usuario';
            }
        }

        async function handleUpdate(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            
            btn.disabled = true;
            btnText.textContent = 'Actualizando...';

            const { error } = await supabase.from('users').update({
                full_name: document.getElementById('full_name').value,
                role: document.getElementById('role').value
            }).eq('id', userId);

            if (error) {
                alert('Error al actualizar: ' + error.message);
            } else {
                window.location.href = 'usuarios.html';
            }
            
            btn.disabled = false;
            btnText.textContent = 'Actualizar Perfil';
        }

        init();
    </script>
</body>
</html>
