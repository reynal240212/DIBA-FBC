<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso Administrativo — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #020617;
            overflow: hidden;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 0% 0%, #004d98 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #a50044 0%, transparent 40%);
            opacity: 0.6;
        }

        .login-glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }

        .floating-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(60px);
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 10s infinite linear;
        }

        @keyframes rise {
            from { transform: translateY(100vh) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            to { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }

        .pw-toggle-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .pw-toggle-btn:hover {
            color: var(--gold);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 font-['Outfit']">
    <div class="login-bg"></div>
    <div class="floating-orb" style="top: 10%; left: 20%"></div>
    <div class="floating-orb" style="bottom: 10%; right: 20%; animation-delay: -10s"></div>
    
    <!-- Particles -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="w-full max-w-[480px] z-10 animate-fade-up">
        <div class="login-glass rounded-[48px] p-10 lg:p-14 relative overflow-hidden">
            
            <!-- Logo & Title -->
            <div class="text-center mb-12">
                <div class="inline-flex relative mb-8 group">
                    <div class="absolute -inset-4 bg-gold/20 rounded-full blur-2xl group-hover:blur-3xl transition-all duration-700"></div>
                    <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-24 h-24 object-contain relative drop-shadow-[0_0_20px_rgba(255,215,0,0.3)]">
                </div>
                
                <div class="flex flex-col items-center">
                    <h1 class="text-4xl font-black italic text-white uppercase tracking-tighter leading-none mb-3">
                        DIBA <span class="text-gold">ADMIN</span>
                    </h1>
                    <div class="flex items-center gap-3">
                        <span class="w-4 h-[1px] bg-white/20"></span>
                        <p class="text-[0.65rem] font-black text-white/40 uppercase tracking-[0.4em] italic">Panel de Gestión Deportiva</p>
                        <span class="w-4 h-[1px] bg-white/20"></span>
                    </div>
                </div>
            </div>

            <div id="alert-container" class="mb-8"></div>

            <form id="login-form" class="space-y-8">
                <!-- User Field -->
                <div class="premium-form-group">
                    <label class="premium-label ml-2">Usuario / Correo Oficial</label>
                    <div class="relative group">
                        <i class="fas fa-user-shield absolute left-6 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                        <input type="text" id="login-username" required placeholder="ADMIN_DIBA" 
                            class="premium-input pl-16 font-bold uppercase tracking-tight text-[0.85rem]">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="premium-form-group">
                    <div class="flex justify-between items-center px-2 mb-2">
                        <label class="premium-label !mb-0">Contraseña</label>
                        <button type="button" id="forgot-link" class="text-[0.6rem] font-bold text-white/30 uppercase tracking-widest hover:text-gold transition-colors italic">¿Recuperar Acceso?</button>
                    </div>
                    <div class="relative group">
                        <i class="fas fa-key absolute left-6 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" 
                            class="premium-input pl-16 pr-16 font-black text-[0.85rem]">
                        <button type="button" class="pw-toggle-btn" id="pw-toggle">
                            <i class="fas fa-eye-slash" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="login-button" 
                    class="w-full py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase text-[0.85rem] tracking-[0.2em] shadow-2xl shadow-gold/20 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-4 group">
                    <span class="button-text">Iniciar Sesión</span>
                    <i class="fas fa-bolt group-hover:animate-bounce"></i>
                    <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                </button>
            </form>

            <div class="mt-12 text-center">
                <a href="/" class="text-[0.6rem] font-black text-white/20 uppercase tracking-[0.4em] hover:text-gold transition-all flex items-center justify-center gap-3 italic">
                    <i class="fas fa-arrow-left text-[0.5rem]"></i> Volver al Portal Público
                </a>
            </div>
        </div>

        <p class="mt-8 text-center text-[0.6rem] font-bold text-white/20 uppercase tracking-[0.5em] italic">
            DIBA FBC — SYSTEMS CORE v2.0
        </p>
    </div>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { iniciarSesion, enviarCorreoRecuperacion } from "/scripts/auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('spinner');
        const btnText = loginBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            const isError = type === 'error';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-4 p-5 rounded-2xl border ${isError ? 'bg-red-500/10 border-red-500/20 text-red-500' : 'bg-green-500/10 border-green-500/20 text-green-500'} animate-fade-in shadow-xl">
                    <i class="fas ${isError ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i>
                    <p class="text-[0.65rem] font-black uppercase tracking-widest leading-relaxed">${message}</p>
                </div>
            `;
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Verificando...';
            alertContainer.innerHTML = '';

            try {
                await iniciarSesion(username, password);
                btnText.textContent = 'Acceso Exitoso';
                showAlert('Credenciales correctas. Sincronizando panel...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            } catch (error) {
                console.error("Login error:", error);
                showAlert(error.message === 'Invalid login credentials' ? 'Las credenciales no coinciden.' : error.message);
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Iniciar Sesión';
            }
        });

        // Forgot password
        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-username').value.trim();
            if (!email) {
                showAlert('Ingrese su usuario/correo para recuperar acceso.', 'error');
                return;
            }
            try {
                await enviarCorreoRecuperacion(email);
                showAlert('Enlace de recuperación enviado al correo oficial.', 'success');
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        // Password matching
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('login-password');
        const pwIcon = document.getElementById('pw-icon');
        pwToggle.addEventListener('click', () => {
            const isShown = pwInput.type === 'text';
            pwInput.type = isShown ? 'password' : 'text';
            pwIcon.className = isShown ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        // Particles Generation
        const container = document.getElementById('particles-container');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (5 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            p.style.opacity = Math.random() * 0.3;
            container.appendChild(p);
        }
    </script>
</body>

</html>
