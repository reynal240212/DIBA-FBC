<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrativo — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --gold: #ffd700;
            --gold2: #f59e0b;
            --amber: #fb923c;
            --mono: 'Share Tech Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #020617;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* ======================================
           AURORA WAVE BACKGROUND
        ====================================== */
        #aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #000;
        }
        .aurora-band {
            position: absolute;
            left: -20%;
            width: 140%;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: auroraFloat linear infinite;
        }
        .aurora-band:nth-child(1) {
            height: 220px;
            top: 15%;
            background: radial-gradient(ellipse at center, rgba(255,200,0,0.35) 0%, rgba(251,146,60,0.15) 50%, transparent 80%);
            animation-duration: 14s;
            animation-delay: 0s;
        }
        .aurora-band:nth-child(2) {
            height: 180px;
            top: 35%;
            background: radial-gradient(ellipse at center, rgba(255,215,0,0.25) 0%, rgba(245,158,11,0.12) 50%, transparent 80%);
            animation-duration: 18s;
            animation-delay: -5s;
        }
        .aurora-band:nth-child(3) {
            height: 260px;
            top: 55%;
            background: radial-gradient(ellipse at center, rgba(253,186,116,0.2) 0%, rgba(255,200,0,0.08) 50%, transparent 80%);
            animation-duration: 22s;
            animation-delay: -10s;
        }
        .aurora-band:nth-child(4) {
            height: 150px;
            top: 5%;
            background: radial-gradient(ellipse at center, rgba(255,165,0,0.18) 0%, transparent 70%);
            animation-duration: 10s;
            animation-delay: -3s;
        }
        .aurora-band:nth-child(5) {
            height: 200px;
            top: 70%;
            background: radial-gradient(ellipse at center, rgba(255,215,0,0.22) 0%, rgba(253,186,116,0.1) 50%, transparent 80%);
            animation-duration: 16s;
            animation-delay: -8s;
        }
        @keyframes auroraFloat {
            0%   { transform: translateX(0%)   scaleY(1)   skewX(0deg);  opacity: 0; }
            10%  { opacity: 1; }
            30%  { transform: translateX(8%)   scaleY(1.3) skewX(3deg); }
            50%  { transform: translateX(-5%)  scaleY(0.8) skewX(-2deg); }
            70%  { transform: translateX(10%)  scaleY(1.1) skewX(4deg); }
            90%  { opacity: 1; }
            100% { transform: translateX(-3%)  scaleY(1)   skewX(0deg);  opacity: 0; }
        }

        /* ======================================
           INTRO OVERLAY
        ====================================== */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1100px;
        }
        #intro-overlay.exit {
            animation: introExit 1.4s cubic-bezier(0.77,0,0.175,1) forwards;
        }
        @keyframes introExit {
            0%   { opacity:1; transform: scale(1); }
            50%  { opacity:1; transform: scale(1.05); }
            100% { opacity:0; transform: scale(0.88); pointer-events:none; }
        }

        /* HUD elements */
        #hud-top, #hud-bottom { 
            font-family: var(--mono);
            color: rgba(255,215,0,0.65);
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }
        #hud-top    { margin-bottom: 1.4rem; opacity: 0; }
        #hud-bottom { margin-top: 1.4rem; opacity: 0; color: rgba(255,183,0,0.5); }

        #hud-progress-outer {
            width: 320px;
            margin-top: 0.7rem;
            opacity: 0;
            position: relative;
            z-index: 2;
        }
        #hud-progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255,215,0,0.12);
            border-radius: 9999px;
            overflow: hidden;
        }
        #hud-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            background: linear-gradient(90deg, #f59e0b, #ffd700, #fb923c);
            box-shadow: 0 0 10px rgba(255,215,0,0.7);
            transition: width 0.08s linear;
        }
        #hud-pct {
            font-family: var(--mono);
            font-size: 0.48rem;
            color: rgba(255,215,0,0.5);
            text-align: right;
            margin-top: 0.3rem;
            letter-spacing: 0.1em;
        }

        /* ======================================
           3D CUBE STAGE
        ====================================== */
        #cube-stage {
            position: relative;
            transform-style: preserve-3d;
            z-index: 2;
        }

        /* Each cube wrapper */
        .cube-wrap {
            position: absolute;
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }
        /* Cube faces */
        .cube-face {
            position: absolute;
            backface-visibility: hidden;
        }
        /* Front face = full W×H */
        .cf-front  { width: 100%; height: 100%; }
        /* Right face = DEPTH × H, at right edge rotated */
        .cf-right  { top: 0; height: 100%; }
        /* Top face = W × DEPTH, at top edge rotated */
        .cf-top    { left: 0; width: 100%; }

        /* ======================================
           LOGIN WRAPPER
        ====================================== */
        #login-wrapper {
            opacity: 0;
            pointer-events: none;
            position: relative;
            z-index: 10;
        }
        #login-wrapper.visible {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.9s ease;
        }

        .login-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 0% 0%, #004d98 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #a50044 0%, transparent 40%);
            opacity: 0.6;
        }
        .login-glass {
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }
        .perspective-1000 { perspective: 1000px; transform-style: preserve-3d; }
        .preserve-3d      { transform-style: preserve-3d; }
        #shield-3d-container {
            will-change: transform;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        .floating-orb {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            z-index: 1; filter: blur(60px);
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        @keyframes floatOrb {
            from { transform: translate(-10%, -10%); }
            to   { transform: translate(10%, 10%); }
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(255,215,0,0.2);
            border-radius: 50%; pointer-events: none;
            animation: rise 10s infinite linear;
        }
        @keyframes rise {
            from { transform: translateY(100vh) scale(1); opacity: 0; }
            50%  { opacity: 0.5; }
            to   { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }
        .pw-toggle-btn {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .pw-toggle-btn:hover { color: var(--gold); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { iniciarSesion, enviarCorreoRecuperacion } from "/scripts/auth.js";
        import anime from 'https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js';

        /* =====================================================
           CUBE CONSTANTS
        ===================================================== */
        const GRID      = 32;       // 32×32 = 1024 cubes
        const CELL      = 11;       // face size in px
        const DEPTH     = 7;        // cube depth/thickness in px
        const STAGE_PX  = GRID * CELL;

        const stage     = document.getElementById('cube-stage');
        const fillBar   = document.getElementById('hud-progress-fill');
        const pctLabel  = document.getElementById('hud-pct');
        const overlay   = document.getElementById('intro-overlay');
        const loginWrap = document.getElementById('login-wrapper');

        stage.style.width  = STAGE_PX + 'px';
        stage.style.height = STAGE_PX + 'px';

        /* =====================================================
           SAMPLE SHIELD → PIXEL COLORS
        ===================================================== */
        function sampleShield() {
            return new Promise(resolve => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = GRID; c.height = GRID;
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, GRID, GRID);
                    const out = [];
                    for (let y = 0; y < GRID; y++)
                        for (let x = 0; x < GRID; x++) {
                            const d = ctx.getImageData(x, y, 1, 1).data;
                            out.push({ r: d[0], g: d[1], b: d[2], a: d[3] });
                        }
                    resolve(out);
                };
                img.onerror = () => {
                    const out = [];
                    for (let i = 0; i < GRID * GRID; i++)
                        out.push({ r: 255, g: 200, b: 0, a: 200 });
                    resolve(out);
                };
                img.src = '/images/ESCUDO.png';
            });
        }

        /* =====================================================
           BUILD CSS 3D CUBES
        ===================================================== */
        function buildCubes(pixels) {
            const wraps = [];

            pixels.forEach((p, i) => {
                if (p.a < 20) { wraps.push(null); return; }

                const gx = i % GRID;
                const gy = Math.floor(i / GRID);
                const px = gx * CELL;
                const py = gy * CELL;

                // Boost brightness slightly for neon look
                const boost = 1.18;
                const r = Math.min(255, Math.round(p.r * boost));
                const g = Math.min(255, Math.round(p.g * boost));
                const b = Math.min(255, Math.round(p.b * boost));
                const rD = Math.round(r * 0.55);
                const gD = Math.round(g * 0.55);
                const bD = Math.round(b * 0.55);
                const rT = Math.round(r * 0.78);
                const gT = Math.round(g * 0.78);
                const bT = Math.round(b * 0.78);

                const frontColor = `rgb(${r},${g},${b})`;
                const rightColor = `rgb(${rD},${gD},${bD})`;
                const topColor   = `rgb(${rT},${gT},${bT})`;
                const glowColor  = `rgba(${r},${g},${b},0.5)`;

                // Cube wrapper
                const wrap = document.createElement('div');
                wrap.className = 'cube-wrap';
                wrap.style.cssText = `
                    width:${CELL}px; height:${CELL}px;
                    left:${px}px; top:${py}px;
                    opacity:0;
                `;

                // Front face
                const front = document.createElement('div');
                front.className = 'cube-face cf-front';
                front.style.cssText = `
                    background:${frontColor};
                    box-shadow: 0 0 5px ${glowColor};
                    transform: translateZ(${DEPTH / 2}px);
                `;
                wrap.appendChild(front);

                // Right face
                const right = document.createElement('div');
                right.className = 'cube-face cf-right';
                right.style.cssText = `
                    width:${DEPTH}px;
                    background:${rightColor};
                    right:0;
                    transform-origin: right center;
                    transform: translateX(${DEPTH / 2}px) rotateY(90deg);
                `;
                wrap.appendChild(right);

                // Top face
                const top = document.createElement('div');
                top.className = 'cube-face cf-top';
                top.style.cssText = `
                    height:${DEPTH}px;
                    background:${topColor};
                    top:0;
                    transform-origin: top center;
                    transform: translateY(-${DEPTH / 2}px) rotateX(-90deg);
                `;
                wrap.appendChild(top);

                stage.appendChild(wrap);
                wraps.push(wrap);
            });

            return wraps;
        }

        /* =====================================================
           ANIMATE 3D CUBES IN
        ===================================================== */
        function animateCubesIn(wraps) {
            // Show HUD
            anime({ targets: '#hud-top',             opacity: [0,1], translateY:[-12,0], duration:700, easing:'easeOutExpo' });
            anime({ targets: ['#hud-bottom','#hud-progress-outer'], opacity:[0,1], translateY:[12,0], duration:700, delay:200, easing:'easeOutExpo' });

            const valid = wraps.filter(Boolean);

            anime({
                targets: valid,
                opacity:  [0, 1],
                scale:    [0, 1],
                rotateX:  [() => anime.random(-200, 200), 0],
                rotateY:  [() => anime.random(-200, 200), 0],
                rotateZ:  [() => anime.random(-90, 90),   0],
                translateZ:[() => -(300 + Math.random() * 500), 0],
                duration: 1700,
                delay: anime.stagger(4, {
                    grid: [GRID, GRID],
                    from: 'center',
                    easing: 'easeOutQuad'
                }),
                easing: 'easeOutElastic(1, 0.55)',
                update(a) {
                    const pct = Math.round(a.progress);
                    fillBar.style.width = pct + '%';
                    pctLabel.textContent = pct + '%';
                },
                complete() {
                    pctLabel.textContent = '100%';
                    fillBar.style.width = '100%';
                    setTimeout(scatterAndExit, 700);
                }
            });
        }

        /* =====================================================
           SCATTER CUBES → EXIT OVERLAY
        ===================================================== */
        function scatterAndExit() {
            const cubes = stage.querySelectorAll('.cube-wrap');

            anime({
                targets: cubes,
                opacity:   [1, 0],
                scale:     [1, 0.2],
                rotateX:   () => anime.random(-180, 180),
                rotateY:   () => anime.random(-180, 180),
                translateZ:() => 200 + Math.random() * 500,
                duration:  1000,
                delay: anime.stagger(3, { from: 'center', easing: 'easeInQuad' }),
                easing: 'easeInExpo',
                complete() {
                    overlay.classList.add('exit');
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        loginWrap.classList.add('visible');
                        bootLogin();
                    }, 1400);
                }
            });
        }

        /* =====================================================
           BOOT SEQUENCE
        ===================================================== */
        sampleShield().then(pixels => {
            const wraps = buildCubes(pixels);
            setTimeout(() => animateCubesIn(wraps), 250);
        });

        /* =====================================================
           LOGIN 3D PARALLAX + SPIN-IN
        ===================================================== */
        function bootLogin() {
            const loginCard = document.querySelector('.login-glass');
            const sc        = document.getElementById('shield-3d-container');
            const ring      = document.getElementById('shield-ring');
            const img       = document.getElementById('shield-image');
            const glare     = document.getElementById('shield-glare');

            // Spin-in entrance
            anime({
                targets: sc,
                scale: [0.05, 1], rotateY: [720, 0], rotateX: [360, 0],
                opacity: [0, 1], duration: 2200, easing: 'easeOutElastic(1, 0.65)'
            });

            // Particles
            const pc = document.getElementById('particles-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (5 + Math.random() * 10) + 's';
                p.style.animationDelay    = (Math.random() * 5) + 's';
                p.style.opacity = String(Math.random() * 0.3);
                pc.appendChild(p);
            }

            // Mouse tilt
            document.addEventListener('mousemove', (e) => {
                if (!sc) return;
                const rect = sc.getBoundingClientRect();
                const dx = (e.clientX - rect.left - rect.width/2)  / (window.innerWidth/2);
                const dy = (e.clientY - rect.top  - rect.height/2) / (window.innerHeight/2);
                const M = 22;
                sc.style.transform = `rotateX(${-dy*M}deg) rotateY(${dx*M}deg)`;
                if (ring) ring.style.transform = `translateZ(15px) translate(${-dx*8}px,${-dy*8}px)`;
                if (img)  img.style.transform  = `translateZ(35px) translate(${dx*6}px,${dy*6}px)`;
                if (glare) {
                    glare.style.opacity = '0.6';
                    const angle = Math.atan2(dy, dx) * (180/Math.PI);
                    glare.style.background = `linear-gradient(${angle+180}deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.22) 50%,rgba(255,255,255,0) 100%)`;
                }
                if (loginCard) loginCard.style.transform = `rotateX(${-dy*5}deg) rotateY(${dx*5}deg)`;
            });

            document.addEventListener('mouseleave', () => {
                anime({ targets: sc,        rotateX:0, rotateY:0, duration:1200, easing:'easeOutElastic(1,0.75)' });
                anime({ targets: loginCard, rotateX:0, rotateY:0, duration:1200, easing:'easeOutElastic(1,0.75)' });
                if (glare) anime({ targets: glare, opacity:0, duration:600, easing:'easeOutQuad' });
            });
        }

        /* =====================================================
           AUTH
        ===================================================== */
        const loginForm      = document.getElementById('login-form');
        const loginBtn       = document.getElementById('login-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner        = document.getElementById('spinner');
        const btnText        = loginBtn.querySelector('.button-text');

        const showAlert = (msg, type = 'error') => {
            const e = type === 'error';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-4 p-5 rounded-2xl border ${e ? 'bg-red-500/10 border-red-500/20 text-red-500' : 'bg-green-500/10 border-green-500/20 text-green-500'} shadow-xl">
                    <i class="fas ${e ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i>
                    <p class="text-[0.65rem] font-black uppercase tracking-widest leading-relaxed">${msg}</p>
                </div>`;
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Verificando...';
            alertContainer.innerHTML = '';
            try {
                await iniciarSesion(username, password);
                btnText.textContent = 'Acceso Exitoso';
                showAlert('Credenciales correctas. Sincronizando panel...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            } catch (err) {
                showAlert(err.message === 'Invalid login credentials' ? 'Las credenciales no coinciden.' : err.message);
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Iniciar Sesión';
            }
        });

        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-username').value.trim();
            if (!email) { showAlert('Ingrese su correo para recuperar acceso.'); return; }
            try {
                await enviarCorreoRecuperacion(email);
                showAlert('Enlace enviado al correo oficial.', 'success');
            } catch (err) { showAlert('Error: ' + err.message); }
        });

        const pwToggle = document.getElementById('pw-toggle');
        const pwInput  = document.getElementById('login-password');
        const pwIcon   = document.getElementById('pw-icon');
        pwToggle.addEventListener('click', () => {
            const shown = pwInput.type === 'text';
            pwInput.type     = shown ? 'password' : 'text';
            pwIcon.className = shown ? 'fas fa-eye-slash' : 'fas fa-eye';
        });
    </script>
</body>
</html>
