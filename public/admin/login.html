<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrativo — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --gold: #ffd700;
            --gold2: #f59e0b;
            --amber: #fb923c;
            --mono: 'Share Tech Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #020617;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* ======================================
           AURORA WAVE BACKGROUND
        ====================================== */
        #aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #000;
        }
        .aurora-band {
            position: absolute;
            left: -20%;
            width: 140%;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: auroraFloat linear infinite;
        }
        .aurora-band:nth-child(1) {
            height: 220px;
            top: 15%;
            background: radial-gradient(ellipse at center, rgba(255,200,0,0.35) 0%, rgba(251,146,60,0.15) 50%, transparent 80%);
            animation-duration: 14s;
            animation-delay: 0s;
        }
        .aurora-band:nth-child(2) {
            height: 180px;
            top: 35%;
            background: radial-gradient(ellipse at center, rgba(255,215,0,0.25) 0%, rgba(245,158,11,0.12) 50%, transparent 80%);
            animation-duration: 18s;
            animation-delay: -5s;
        }
        .aurora-band:nth-child(3) {
            height: 260px;
            top: 55%;
            background: radial-gradient(ellipse at center, rgba(253,186,116,0.2) 0%, rgba(255,200,0,0.08) 50%, transparent 80%);
            animation-duration: 22s;
            animation-delay: -10s;
        }
        .aurora-band:nth-child(4) {
            height: 150px;
            top: 5%;
            background: radial-gradient(ellipse at center, rgba(255,165,0,0.18) 0%, transparent 70%);
            animation-duration: 10s;
            animation-delay: -3s;
        }
        .aurora-band:nth-child(5) {
            height: 200px;
            top: 70%;
            background: radial-gradient(ellipse at center, rgba(255,215,0,0.22) 0%, rgba(253,186,116,0.1) 50%, transparent 80%);
            animation-duration: 16s;
            animation-delay: -8s;
        }
        @keyframes auroraFloat {
            0%   { transform: translateX(0%)   scaleY(1)   skewX(0deg);  opacity: 0; }
            10%  { opacity: 1; }
            30%  { transform: translateX(8%)   scaleY(1.3) skewX(3deg); }
            50%  { transform: translateX(-5%)  scaleY(0.8) skewX(-2deg); }
            70%  { transform: translateX(10%)  scaleY(1.1) skewX(4deg); }
            90%  { opacity: 1; }
            100% { transform: translateX(-3%)  scaleY(1)   skewX(0deg);  opacity: 0; }
        }

        /* ======================================
           INTRO OVERLAY — VIDEO FULLSCREEN
        ====================================== */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #intro-overlay.exit {
            animation: introExit 1.2s cubic-bezier(0.77,0,0.175,1) forwards;
        }
        @keyframes introExit {
            0%   { opacity:1; }
            100% { opacity:0; pointer-events:none; }
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* fills the screen, no black bars */
            display: block;
        }

        /* Skip button — bottom-right corner */
        #skip-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 9999px;
            color: rgba(255,215,0,0.85);
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
            z-index: 2;
        }
        #skip-btn:hover {
            background: rgba(255,215,0,0.15);
            border-color: rgba(255,215,0,0.7);
            color: #ffd700;
            transform: scale(1.05);
        }


        /* ======================================
           LOGIN WRAPPER
        ====================================== */
        #login-wrapper {
            opacity: 0;
            pointer-events: none;
            position: relative;
            z-index: 10;
        }
        #login-wrapper.visible {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.9s ease;
        }

        .login-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 0% 0%, #004d98 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #a50044 0%, transparent 40%);
            opacity: 0.6;
        }
        .login-glass {
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }
        .perspective-1000 { perspective: 1000px; transform-style: preserve-3d; }
        .preserve-3d      { transform-style: preserve-3d; }
        #shield-3d-container {
            will-change: transform;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        .floating-orb {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            z-index: 1; filter: blur(60px);
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        @keyframes floatOrb {
            from { transform: translate(-10%, -10%); }
            to   { transform: translate(10%, 10%); }
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(255,215,0,0.2);
            border-radius: 50%; pointer-events: none;
            animation: rise 10s infinite linear;
        }
        @keyframes rise {
            from { transform: translateY(100vh) scale(1); opacity: 0; }
            50%  { opacity: 0.5; }
            to   { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }
        .pw-toggle-btn {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .pw-toggle-btn:hover { color: var(--gold); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Aurora Borealis Waves -->
    <div id="aurora-bg">
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
    </div>

    <!-- ========== INTRO VIDEO ========== -->
    <div id="intro-overlay">
        <video
            id="intro-video"
            src="/videos/intro.mp4"
            autoplay
            muted
            playsinline
            preload="auto"
        ></video>

        <!-- Skip button -->
        <button id="skip-btn">
            <i class="fas fa-forward-step"></i> Saltar
        </button>
    </div>

    <!-- ========== LOGIN ========== -->
    <div id="login-wrapper" class="w-full">
        <div class="login-bg"></div>
        <div class="floating-orb" style="top:10%;left:20%"></div>
        <div class="floating-orb" style="bottom:10%;right:20%;animation-delay:-10s"></div>
        <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

        <div class="w-full max-w-[480px] mx-auto z-10">
            <div class="login-glass rounded-[48px] p-10 lg:p-14 relative overflow-hidden">

                <!-- 3D Shield -->
                <div class="text-center mb-12">
                    <div class="w-full flex justify-center mb-8 perspective-1000">
                        <div id="shield-3d-container" class="relative w-28 h-28 preserve-3d cursor-pointer opacity-0">
                            <div id="shield-ring"  class="absolute inset-0 border-2 border-yellow-500/30 rounded-full" style="transform:translateZ(15px);transition:transform 0.1s ease-out;"></div>
                            <div id="shield-glow"  class="absolute -inset-4 bg-gradient-to-tr from-yellow-500/20 to-blue-500/20 rounded-full blur-2xl" style="transform:translateZ(-20px);"></div>
                            <img id="shield-image" src="/images/ESCUDO.png" alt="DIBA FBC" class="w-full h-full object-contain drop-shadow-[0_15px_30px_rgba(0,0,0,0.6)]" style="transform:translateZ(35px);transition:transform 0.1s ease-out;">
                            <div id="shield-glare" class="absolute inset-0 rounded-full opacity-0 pointer-events-none" style="transform:translateZ(45px);transition:opacity 0.15s ease-out;"></div>
                        </div>
                    </div>

                    <div class="flex flex-col items-center">
                        <h1 class="text-4xl font-black italic text-white uppercase tracking-tighter leading-none mb-3">
                            DIBA <span class="text-yellow-400">ADMIN</span>
                        </h1>
                        <div class="flex items-center gap-3">
                            <span class="w-4 h-[1px] bg-white/20"></span>
                            <p class="text-[0.65rem] font-black text-white/40 uppercase tracking-[0.4em] italic">Panel de Gestión Deportiva</p>
                            <span class="w-4 h-[1px] bg-white/20"></span>
                        </div>
                    </div>
                </div>

                <div id="alert-container" class="mb-8"></div>

                <form id="login-form" class="space-y-8">
                    <div class="premium-form-group">
                        <label class="premium-label ml-2">Usuario / Correo Oficial</label>
                        <div class="relative group">
                            <i class="fas fa-user-shield absolute left-6 top-1/2 -translate-y-1/2 text-yellow-500/30 group-focus-within:text-yellow-500 transition-colors"></i>
                            <input type="text" id="login-username" required placeholder="ADMIN_DIBA"
                                class="premium-input pl-16 font-bold uppercase tracking-tight text-[0.85rem]">
                        </div>
                    </div>
                    <div class="premium-form-group">
                        <div class="flex justify-between items-center px-2 mb-2">
                            <label class="premium-label !mb-0">Contraseña</label>
                            <button type="button" id="forgot-link" class="text-[0.6rem] font-bold text-white/30 uppercase tracking-widest hover:text-yellow-400 transition-colors italic">¿Recuperar Acceso?</button>
                        </div>
                        <div class="relative group">
                            <i class="fas fa-key absolute left-6 top-1/2 -translate-y-1/2 text-yellow-500/30 group-focus-within:text-yellow-500 transition-colors"></i>
                            <input type="password" id="login-password" required placeholder="••••••••"
                                class="premium-input pl-16 pr-16 font-black text-[0.85rem]">
                            <button type="button" class="pw-toggle-btn" id="pw-toggle">
                                <i class="fas fa-eye-slash" id="pw-icon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="login-button"
                        class="w-full py-5 bg-yellow-500 text-[#004d98] rounded-2xl font-black uppercase text-[0.85rem] tracking-[0.2em] shadow-2xl shadow-yellow-500/20 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-4 group">
                        <span class="button-text">Iniciar Sesión</span>
                        <i class="fas fa-bolt group-hover:animate-bounce"></i>
                        <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                    </button>
                </form>

                <div class="mt-12 text-center">
                    <a href="/" class="text-[0.6rem] font-black text-white/20 uppercase tracking-[0.4em] hover:text-yellow-400 transition-all flex items-center justify-center gap-3 italic">
                        <i class="fas fa-arrow-left text-[0.5rem]"></i> Volver al Portal Público
                    </a>
                </div>
            </div>
            <p class="mt-8 text-center text-[0.6rem] font-bold text-white/20 uppercase tracking-[0.5em] italic">
                DIBA FBC — SYSTEMS CORE v2.0
            </p>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { iniciarSesion, enviarCorreoRecuperacion } from "/scripts/auth.js";
        import anime from 'https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js';

        /* =====================================================
           VIDEO INTRO
        ===================================================== */
        const overlay   = document.getElementById('intro-overlay');
        const loginWrap = document.getElementById('login-wrapper');
        const introVid  = document.getElementById('intro-video');
        const skipBtn   = document.getElementById('skip-btn');

        function exitIntro() {
            overlay.classList.add('exit');
            overlay.addEventListener('animationend', () => {
                overlay.style.display = 'none';
                loginWrap.classList.add('visible');
                bootLogin();
            }, { once: true });
        }

        introVid.addEventListener('ended', exitIntro);
        skipBtn.addEventListener('click', exitIntro);

        // Fallback: if video fails to load, skip straight to login
        introVid.addEventListener('error', exitIntro);


        /* =====================================================
           LOGIN 3D PARALLAX + SPIN-IN
        ===================================================== */
        function bootLogin() {
            const loginCard = document.querySelector('.login-glass');
            const sc        = document.getElementById('shield-3d-container');
            const ring      = document.getElementById('shield-ring');
            const img       = document.getElementById('shield-image');
            const glare     = document.getElementById('shield-glare');

            // Spin-in entrance
            anime({
                targets: sc,
                scale: [0.05, 1], rotateY: [720, 0], rotateX: [360, 0],
                opacity: [0, 1], duration: 2200, easing: 'easeOutElastic(1, 0.65)'
            });

            // Particles
            const pc = document.getElementById('particles-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (5 + Math.random() * 10) + 's';
                p.style.animationDelay    = (Math.random() * 5) + 's';
                p.style.opacity = String(Math.random() * 0.3);
                pc.appendChild(p);
            }

            // Mouse tilt
            document.addEventListener('mousemove', (e) => {
                if (!sc) return;
                const rect = sc.getBoundingClientRect();
                const dx = (e.clientX - rect.left - rect.width/2)  / (window.innerWidth/2);
                const dy = (e.clientY - rect.top  - rect.height/2) / (window.innerHeight/2);
                const M = 22;
                sc.style.transform = `rotateX(${-dy*M}deg) rotateY(${dx*M}deg)`;
                if (ring) ring.style.transform = `translateZ(15px) translate(${-dx*8}px,${-dy*8}px)`;
                if (img)  img.style.transform  = `translateZ(35px) translate(${dx*6}px,${dy*6}px)`;
                if (glare) {
                    glare.style.opacity = '0.6';
                    const angle = Math.atan2(dy, dx) * (180/Math.PI);
                    glare.style.background = `linear-gradient(${angle+180}deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.22) 50%,rgba(255,255,255,0) 100%)`;
                }
                if (loginCard) loginCard.style.transform = `rotateX(${-dy*5}deg) rotateY(${dx*5}deg)`;
            });

            document.addEventListener('mouseleave', () => {
                anime({ targets: sc,        rotateX:0, rotateY:0, duration:1200, easing:'easeOutElastic(1,0.75)' });
                anime({ targets: loginCard, rotateX:0, rotateY:0, duration:1200, easing:'easeOutElastic(1,0.75)' });
                if (glare) anime({ targets: glare, opacity:0, duration:600, easing:'easeOutQuad' });
            });
        }

        /* =====================================================
           AUTH
        ===================================================== */
        const loginForm      = document.getElementById('login-form');
        const loginBtn       = document.getElementById('login-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner        = document.getElementById('spinner');
        const btnText        = loginBtn.querySelector('.button-text');

        const showAlert = (msg, type = 'error') => {
            const e = type === 'error';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-4 p-5 rounded-2xl border ${e ? 'bg-red-500/10 border-red-500/20 text-red-500' : 'bg-green-500/10 border-green-500/20 text-green-500'} shadow-xl">
                    <i class="fas ${e ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i>
                    <p class="text-[0.65rem] font-black uppercase tracking-widest leading-relaxed">${msg}</p>
                </div>`;
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Verificando...';
            alertContainer.innerHTML = '';
            try {
                await iniciarSesion(username, password);
                btnText.textContent = 'Acceso Exitoso';
                showAlert('Credenciales correctas. Sincronizando panel...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            } catch (err) {
                showAlert(err.message === 'Invalid login credentials' ? 'Las credenciales no coinciden.' : err.message);
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Iniciar Sesión';
            }
        });

        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-username').value.trim();
            if (!email) { showAlert('Ingrese su correo para recuperar acceso.'); return; }
            try {
                await enviarCorreoRecuperacion(email);
                showAlert('Enlace enviado al correo oficial.', 'success');
            } catch (err) { showAlert('Error: ' + err.message); }
        });

        const pwToggle = document.getElementById('pw-toggle');
        const pwInput  = document.getElementById('login-password');
        const pwIcon   = document.getElementById('pw-icon');
        pwToggle.addEventListener('click', () => {
            const shown = pwInput.type === 'text';
            pwInput.type     = shown ? 'password' : 'text';
            pwIcon.className = shown ? 'fas fa-eye-slash' : 'fas fa-eye';
        });
    </script>
</body>
</html>
