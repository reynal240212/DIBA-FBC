<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso Administrativo — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 font-['Inter'] min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-diba-blue/5 via-white to-diba-red/5">

    <div class="w-full max-w-[440px] animate-fade-up">
        
        <!-- Logo Container -->
        <div class="flex justify-center mb-10">
            <div class="w-24 h-24 bg-white rounded-[2.5rem] shadow-premium flex items-center justify-center border border-slate-50 relative group transition-all hover:scale-110">
                <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-16 h-16 object-contain">
                <div class="absolute -bottom-2 -right-2 w-8 h-8 bg-diba-gold rounded-xl flex items-center justify-center text-diba-blue shadow-lg border-2 border-white">
                    <i class="fas fa-bolt text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[3rem] shadow-premium border border-slate-50 p-10 md:p-12 relative overflow-hidden">
            <!-- Decorative Accent -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-diba-blue via-diba-gold to-diba-red opacity-80"></div>

            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase leading-none">Acceso <span class="text-diba-red">Admin</span></h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-3 italic">Panel de Control Oficial</p>
            </div>

            <div id="alert-container" class="mb-8 hidden"></div>

            <form id="login-form" class="space-y-8">
                
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Identificación</label>
                    <div class="relative group">
                        <i class="fas fa-user-shield absolute left-6 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-blue transition-colors"></i>
                        <input type="text" id="login-username" required placeholder="Usuario o Correo" 
                               class="w-full pl-14 pr-6 py-4 bg-slate-50 border border-slate-50 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all italic">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Contraseña</label>
                        <a href="#" id="forgot-link" class="text-[9px] text-slate-300 hover:text-diba-red font-black uppercase tracking-wider transition-colors italic">¿Olvidaste la clave?</a>
                    </div>
                    <div class="relative group">
                        <i class="fas fa-key absolute left-6 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-blue transition-colors"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" 
                               class="w-full pl-14 pr-14 py-4 bg-slate-50 border border-slate-50 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all italic">
                        <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-diba-blue transition-colors" id="pw-toggle">
                            <i class="fas fa-eye-slash text-xs" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-button" class="w-full py-4 bg-diba-blue text-diba-gold text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-blue-900/20 italic flex items-center justify-center gap-3">
                    <span class="button-text">Entrar al Sistema</span>
                    <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                </button>
            </form>
        </div>

        <!-- Secondary Links -->
        <div class="mt-10 flex flex-col items-center gap-6">
            <a href="/" class="inline-flex items-center gap-2 text-slate-400 hover:text-diba-blue text-[10px] font-black uppercase tracking-widest transition-all group italic">
                <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Regresar a la Web Principal
            </a>
            
            <div class="h-px w-12 bg-slate-200"></div>
            
            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest italic">DIBA FBC © 2025 · v2.0 Premium</p>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { iniciarSesion, enviarCorreoRecuperacion } from "../scripts/auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('spinner');
        const btnText = loginBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            alertContainer.className = `p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg mb-8 ${
                type === 'success' 
                ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' 
                : 'bg-rose-50 text-rose-600 border border-rose-100'
            }`;
            alertContainer.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'} mr-2 text-lg"></i> ${message}`;
            alertContainer.classList.remove('hidden');
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'AUTENTICANDO...';
            alertContainer.classList.add('hidden');

            try {
                await iniciarSesion(username, password);
                btnText.textContent = '¡CONCEDIDO!';
                showAlert('Bienvenido al panel estratégico.', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showAlert(error.message === 'Invalid login credentials' ? 'Credenciales Inválidas.' : error.message, 'error');
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'ENTRAR AL SISTEMA';
            }
        });

        // Toggle Password
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('login-password');
        const pwIcon = document.getElementById('pw-icon');
        pwToggle.addEventListener('click', () => {
            const shown = pwInput.type === 'text';
            pwInput.type = shown ? 'password' : 'text';
            pwIcon.className = shown ? 'fas fa-eye-slash text-xs' : 'fas fa-eye text-xs';
        });

        // Forgot Password
        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-username').value.trim();
            if (!email) {
                showAlert('Ingresa tu identificador primero.', 'error');
                return;
            }
            try {
                await enviarCorreoRecuperacion(email);
                showAlert('Enlace de recuperación enviado.', 'success');
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>

</html>
