<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Partidos — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <style>
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .match-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 1.8rem;
            transition: all .3s;
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            transform: translateY(-5px);
            background: var(--dark3);
            border-color: var(--gold-semi);
        }

        .match-badge {
            background: rgba(255, 204, 0, .1);
            color: var(--gold);
            padding: .3rem .8rem;
            border-radius: 99px;
            font-size: .6rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid var(--gold-semi);
            display: inline-block;
            margin-bottom: 1rem;
        }

        .match-date {
            font-size: .65rem;
            color: var(--slate);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .5rem;
        }

        .match-teams {
            font-size: 1.1rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: .8rem;
            color: var(--text);
        }

        .match-teams span {
            color: var(--slate);
            font-style: normal;
            font-weight: 400;
            margin: 0 .3rem;
        }

        .match-result {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--gold);
            margin-top: .5rem;
            display: inline-block;
            background: var(--dark);
            padding: .3rem 1rem;
            border-radius: 12px;
        }

        .match-meta {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .65rem;
            color: var(--slate);
            font-weight: 700;
            text-transform: uppercase;
        }

        .match-actions {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: .5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            cursor: pointer;
            transition: all .2s;
            border: none;
        }

        .btn-edit {
            background: var(--dark3);
            color: var(--slate);
        }

        .btn-edit:hover {
            background: var(--gold);
            color: var(--blue);
        }

        .btn-delete {
            background: rgba(244, 63, 94, .1);
            color: #fb7185;
        }

        .btn-delete:hover {
            background: #f43f5e;
            color: #white;
        }

        /* Modal specific overrides */
        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: .5rem;
        }
    </style>
</head>

<body style="display:none;" id="admin-body">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/ESCUDO.png" alt="DIBA FBC">
            <div>
                <div class="sidebar-logo-text">DIBA FBC</div>
                <div class="sidebar-logo-sub">Panel de Control</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>

            <div class="nav-section-label">Equipo</div>
            <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Planilla</a>
            <a href="listaJugadores.html" class="nav-link"><i class="fas fa-users"></i> Jugadores</a>
            <a href="partidos.html" class="nav-link active"><i class="fas fa-futbol"></i> Partidos</a>
            <a href="../analisis.html" class="nav-link"><i class="fas fa-chart-line"></i> Análisis</a>

            <div class="nav-section-label">Administración</div>
            <a href="GestorDocumental.html" class="nav-link"><i class="fas fa-folder-open"></i> Gestor Documental</a>
            <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a>
            <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus"></i> Crear Usuario</a>
            <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Rifas</a>

            <div class="nav-section-label">Sitio Web</div>
            <a href="../index.html" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="user-avatar" id="sb-avatar">A</div>
                <div>
                    <div class="user-name" id="sb-name">Administrador</div>
                    <div class="user-role" id="sb-role">Admin</div>
                </div>
            </div>
            <button class="btn-logout" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <!-- ══ MAIN ══ -->
    <div class="main">

        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu-btn" id="menu-btn">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
            <div>
                <div class="page-title">Gestión de <span>Partidos</span></div>
                <div class="page-subtitle">Programación y resultados — DIBA FBC</div>
            </div>
            <div class="topbar-right">
                <button id="add-match-btn" class="btn btn-primary" style="font-size:.7rem"><i class="fas fa-plus"></i>
                    NUEVO PARTIDO</button>
                <div class="topbar-time" id="clock">--:--</div>
            </div>
        </header>

        <!-- Content -->
        <div class="content">

            <div id="matches-grid" class="match-grid animate-fade-up">
                <!-- Skeletons -->
                <div class="match-card skeleton" style="height:250px"></div>
                <div class="match-card skeleton" style="height:250px"></div>
                <div class="match-card skeleton" style="height:250px"></div>
            </div>

        </div><!-- /content -->
    </div><!-- /main -->

    <!-- Modal Form -->
    <div id="match-modal" class="modal" style="display:none">
        <div class="modal-content animate-fade-up" style="max-width:700px">
            <div class="modal-header">
                <h3 id="modal-title">Registrar Partido</h3>
                <button type="button" class="btn btn-outline" id="close-modal"
                    style="padding:.5rem; border-radius:10px"><i class="fas fa-times"></i></button>
            </div>
            <form id="match-form">
                <input type="hidden" name="id">
                <div class="modal-body"
                    style="display:grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 2rem;">

                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Equipo Local</label>
                        <input type="text" name="equipolocal" class="form-control" required placeholder="DIBA FBC">
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Equipo
                            Visitante</label>
                        <input type="text" name="equipovisitante" class="form-control" required placeholder="Rival">
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Fecha</label>
                        <input type="date" name="fecha" class="form-control" required>
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Hora</label>
                        <input type="time" name="hora" class="form-control" required>
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Cancha / Lugar</label>
                        <input type="text" name="Cancha" class="form-control" placeholder="Ej: Cancha Municipal">
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Categoría</label>
                        <input type="text" name="categoria" class="form-control" placeholder="Ej: Sub-12">
                    </div>
                    <div style="grid-column: span 2">
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Descripción /
                            Resultados Preliminares</label>
                        <textarea name="descripcion" class="form-control" rows="3"
                            placeholder="Detalles extra..."></textarea>
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Resultado Final</label>
                        <input type="text" name="resultado" class="form-control" placeholder="Ej: 2 - 1">
                    </div>
                    <div>
                        <label class="page-subtitle"
                            style="text-transform:uppercase; margin-bottom:.5rem; display:block">Costo / Valor</label>
                        <input type="number" name="valor" class="form-control">
                    </div>
                </div>
                <div class="modal-footer"
                    style="padding: 1.5rem 2rem; background: var(--dark3); display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" class="btn btn-outline" id="cancel-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="font-size: .7rem;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
        import { setupAdminUI } from '../scripts/admin-ui.js';

        let allMatches = [];

        requireAdmin().then(session => {
            if (session) {
                document.getElementById('admin-body').style.display = 'flex';
                setupAdminUI();
                loadMatches();
            }
        });

        async function loadMatches() {
            const grid = document.getElementById('matches-grid');
            const { data, error } = await supabase.from('partidos').select('*').order('fecha', { ascending: false });

            if (error) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--red);">Error: ${error.message}</p>`;
                return;
            }

            allMatches = data;
            renderMatches(data);
        }

        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            if (matches.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:5rem; border:2px dashed var(--border); border-radius:30px;">
                    <i class="fas fa-calendar-times" style="font-size:3rem; opacity:.1; margin-bottom:1rem; display:block"></i>
                    <p style="text-transform:uppercase; font-size:.7rem; font-weight:800; color:var(--slate)">No hay partidos registrados</p>
                </div>`;
                return;
            }

            grid.innerHTML = matches.map(m => {
                const date = new Date(m.fecha).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
                return `
                <div class="match-card">
                    <div class="match-actions">
                        <button onclick="window.editMatch('${m.id}')" class="action-btn btn-edit"><i class="fas fa-pencil-alt"></i></button>
                        <button onclick="window.deleteMatch('${m.id}')" class="action-btn btn-delete"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <span class="match-badge">${m.categoria || 'DIBA FBC'}</span>
                    <div class="match-date">${date} · ${m.hora || '--:--'}</div>
                    <h3 class="match-teams">${m.equipolocal} <span>VS</span> ${m.equipovisitante}</h3>
                    ${m.resultado ? `<div class="match-result">${m.resultado}</div>` : '<div style="font-size:.65rem; color:var(--slate); margin-top:.5rem; font-weight:700">PARTIDO PENDIENTE</div>'}
                    <div class="match-meta">
                        <i class="fas fa-map-marker-alt" style="color:var(--gold)"></i>
                        <span>${m.Cancha || 'Lugar por definir'}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // Exposed to window for onclick handlers
        window.editMatch = (id) => {
            const match = allMatches.find(m => m.id === id);
            if (!match) return;
            const form = document.getElementById('match-form');
            document.getElementById('modal-title').textContent = 'Editar Partido';
            form.id.value = match.id;
            form.equipolocal.value = match.equipolocal;
            form.equipovisitante.value = match.equipovisitante;
            form.fecha.value = match.fecha ? match.fecha.split('T')[0] : '';
            form.hora.value = match.hora || '';
            form.Cancha.value = match.Cancha || '';
            form.categoria.value = match.categoria || '';
            form.descripcion.value = match.descripcion || '';
            form.resultado.value = match.resultado || '';
            form.valor.value = match.valor || '';
            document.getElementById('match-modal').style.display = 'flex';
        };

        window.deleteMatch = async (id) => {
            if (!confirm('¿Seguro de eliminar este partido?')) return;
            const { error } = await supabase.from('partidos').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else loadMatches();
        };

        document.getElementById('add-match-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Registrar Partido';
            document.getElementById('match-form').reset();
            document.getElementById('match-form').id.value = '';
            document.getElementById('match-modal').style.display = 'flex';
        });

        const closeModal = () => document.getElementById('match-modal').style.display = 'none';
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('cancel-modal').addEventListener('click', closeModal);

        document.getElementById('match-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('id');
            const data = Object.fromEntries(fd.entries());
            delete data.id;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';

            const { error } = id
                ? await supabase.from('partidos').update(data).eq('id', id)
                : await supabase.from('partidos').insert([data]);

            if (error) {
                alert('Error: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Guardar Cambios';
            } else {
                closeModal();
                loadMatches();
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Guardar Cambios';
            }
        });
    </script>
</body>

</html>
