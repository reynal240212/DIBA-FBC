<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white pb-20">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto text-diba-blue uppercase italic">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 animate-fade-up">
                <div>
                    <h2 class="text-3xl font-black italic tracking-tighter">Calendario de <span class="text-diba-red">Encuentros</span></h2>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-1">Programación y Resultados Oficiales · DIBA FBC</p>
                </div>
                <button id="add-match-btn" class="px-6 py-3.5 rounded-2xl bg-diba-blue text-white text-[10px] font-black italic tracking-widest hover:bg-diba-red transition-all shadow-lg shadow-blue-900/10 flex items-center gap-3">
                    <i class="fas fa-plus text-sm text-diba-gold"></i> Nuevo Partido
                </button>
            </div>

            <!-- Matches Grid -->
            <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Skeletons -->
                <div class="bg-slate-50 border border-slate-100 rounded-[2.5rem] h-64 animate-pulse"></div>
                <div class="bg-slate-50 border border-slate-100 rounded-[2.5rem] h-64 animate-pulse"></div>
                <div class="bg-slate-50 border border-slate-100 rounded-[2.5rem] h-64 animate-pulse"></div>
            </div>

        </div>
    </main>

    <!-- Modal Partido (Azul Grana Premium) -->
    <div id="match-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 lg:p-10 pointer-events-none">
        <div class="absolute inset-0 bg-diba-blue/60 backdrop-blur-xl pointer-events-auto" id="modal-backdrop"></div>
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl relative z-10 overflow-hidden animate-fade-up pointer-events-auto border border-white/20">
            <div class="p-8 lg:p-12">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-2xl font-black text-diba-blue italic uppercase tracking-tighter" id="modal-title">Registrar Partido</h3>
                    <button id="close-modal" class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-rose-50 hover:text-rose-500 transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="match-form" class="space-y-6 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
                    <input type="hidden" name="id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Equipo Local</label>
                           <input type="text" name="equipolocal" required class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none focus:bg-white transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Equipo Visitante</label>
                           <input type="text" name="equipovisitante" required class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none focus:bg-white transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Fecha</label>
                           <input type="date" name="fecha" required class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Hora</label>
                           <input type="time" name="hora" required class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cancha / Lugar</label>
                           <input type="text" name="Cancha" class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Categoría</label>
                           <input type="text" name="categoria" class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                        <div class="col-span-full space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Detalles Adicionales</label>
                           <textarea name="descripcion" class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all h-24"></textarea>
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Resultado Final</label>
                           <input type="text" name="resultado" placeholder="0 - 0" class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                           <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Costo / Inversión</label>
                           <input type="number" name="valor" class="w-full px-5 py-3.5 bg-slate-50 border-slate-100 rounded-2xl font-bold text-xs text-diba-blue outline-none transition-all">
                        </div>
                    </div>
                    <div class="flex gap-4 pt-6">
                        <button type="button" id="cancel-modal" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:bg-slate-50 rounded-2xl transition-all">Descartar</button>
                        <button type="submit" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest bg-diba-blue text-white rounded-2xl hover:bg-diba-red transition-all shadow-xl shadow-blue-900/10">Guardar Encuentro</button>
                    </div>
                </form>
            </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex items-center justify-center text-[7px] font-black text-slate-300 uppercase tracking-[.4em]">
                Módulo de Programación Deportiva · DIBA FBC
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        let allMatches = [];

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            loadMatches();
        }

        async function loadMatches() {
            const grid = document.getElementById('matches-grid');
            const { data, error } = await supabase.from('partidos').select('*').order('fecha', { ascending: false });

            if (error) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-rose-500 font-black uppercase italic">Error al cargar datos maestro</div>`;
                return;
            }

            allMatches = data;
            renderMatches(data);
        }

        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            if (matches.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center opacity-20"><i class="fas fa-calendar-times text-5xl mb-6"></i><p class="text-[10px] font-black italic tracking-widest uppercase">Sin encuentros programados</p></div>`;
                return;
            }

            grid.innerHTML = matches.map(m => {
                const dateObj = new Date(m.fecha + 'T12:00:00'); 
                const dia = dateObj.getDate();
                const mes = dateObj.toLocaleDateString('es-CO', { month: 'short' }).toUpperCase().replace('.','');
                
                return `
                <div class="bg-white border border-slate-50 rounded-[2.5rem] p-8 hover:shadow-premium transition-all group relative overflow-hidden animate-fade-up">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex flex-col items-center bg-slate-50 w-12 py-2 rounded-2xl border border-slate-100">
                           <span class="text-[8px] font-black text-slate-400">${mes}</span>
                           <span class="text-xl font-black text-diba-blue">${dia}</span>
                        </div>
                        <div class="flex gap-2">
                           <button onclick="editMatch('${m.id}')" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-300 flex items-center justify-center hover:bg-diba-blue hover:text-white transition-all shadow-sm"><i class="fas fa-edit text-xs"></i></button>
                           <button onclick="deleteMatch('${m.id}')" class="w-10 h-10 rounded-xl bg-rose-50 text-rose-300 flex items-center justify-center hover:bg-rose-500 hover:text-white transition-all shadow-sm"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                           <span class="px-3 py-1 bg-diba-blue/5 text-diba-blue text-[7px] font-black uppercase italic rounded-full tracking-widest border border-diba-blue/10">${m.categoria || 'CLUB'}</span>
                           <span class="text-[8px] font-bold text-slate-300 uppercase tracking-widest underline decoration-diba-gold/40 decoration-2 underline-offset-4">${m.hora || '--:--'}</span>
                        </div>
                        
                        <div class="space-y-1">
                           <h3 class="text-lg font-black italic leading-tight text-diba-blue group-hover:text-diba-red transition-colors uppercase tracking-tighter">${m.equipolocal}</h3>
                           <div class="text-[8px] font-black text-slate-300 tracking-widest">VS</div>
                           <h3 class="text-lg font-black italic leading-tight text-diba-blue group-hover:text-diba-red transition-colors uppercase tracking-tighter">${m.equipovisitante}</h3>
                        </div>
                        
                        ${m.resultado ? `<div class="mt-4 bg-diba-gold/10 px-4 py-2 rounded-xl inline-block font-black text-diba-blue italic text-base shadow-inner border border-diba-gold/20 tracking-widest">${m.resultado}</div>` : ''}
                        
                        <div class="flex items-center gap-2 pt-4 border-t border-slate-50">
                            <i class="fas fa-map-marker-alt text-[10px] text-diba-red"></i>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${m.Cancha || 'Sede DIBA FBC'}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Global Handlers
        window.editMatch = (id) => {
            const m = allMatches.find(x => x.id === id);
            if (!m) return;
            document.getElementById('modal-title').textContent = 'Editar Partido';
            const f = document.getElementById('match-form');
            f.id.value = m.id;
            f.equipolocal.value = m.equipolocal;
            f.equipovisitante.value = m.equipovisitante;
            f.fecha.value = m.fecha ? m.fecha.split('T')[0] : '';
            f.hora.value = m.hora || '';
            f.Cancha.value = m.Cancha || '';
            f.categoria.value = m.categoria || '';
            f.descripcion.value = m.descripcion || '';
            f.resultado.value = m.resultado || '';
            f.valor.value = m.valor || '';
            document.getElementById('match-modal').classList.remove('hidden');
        };

        window.deleteMatch = async (id) => {
            if (confirm('¿Eliminar encuentro?')) {
                const { error } = await supabase.from('partidos').delete().eq('id', id);
                if (error) alert(error.message); else loadMatches();
            }
        };

        document.getElementById('add-match-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Registrar Partido';
            document.getElementById('match-form').reset();
            document.getElementById('match-form').id.value = '';
            document.getElementById('match-modal').classList.remove('hidden');
        });

        const closeFunc = () => document.getElementById('match-modal').classList.add('hidden');
        document.getElementById('close-modal').onclick = closeFunc;
        document.getElementById('cancel-modal').onclick = closeFunc;
        document.getElementById('modal-backdrop').onclick = closeFunc;

        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            const id = f.id.value;
            const data = {
                equipolocal: f.equipolocal.value,
                equipovisitante: f.equipovisitante.value,
                fecha: f.fecha.value,
                hora: f.hora.value,
                Cancha: f.Cancha.value,
                categoria: f.categoria.value,
                descripcion: f.descripcion.value,
                resultado: f.resultado.value,
                valor: f.valor.value ? parseInt(f.valor.value) : null
            };

            const { error } = id ? await supabase.from('partidos').update(data).eq('id', id) : await supabase.from('partidos').insert([data]);
            if (error) alert(error.message); else { closeFunc(); loadMatches(); }
        };

        init();
    </script>
</body>
</html>
