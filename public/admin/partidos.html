<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBA FBC — Gestión de Partidos</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { dibaGold: '#ffcc00', dibaBlue: '#002a40', dibaDark: '#0a0e14' }
                },
            },
        }
    </script>
    <style>
        /* ── Dashboard Base Styles ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #002a40;
            --blue2: #003d5c;
            --gold: #ffcc00;
            --gold2: #e6b800;
            --dark: #0a0e14;
            --dark2: #111823;
            --dark3: #1a2332;
            --slate: #8b9ab0;
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.07);
            --sidebar-w: 270px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--dark2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform .3s ease;
        }

        .sidebar-logo {
            padding: 2rem 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .8rem;
        }

        .sidebar-logo img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        .sidebar-logo-text {
            font-size: 1.05rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--gold);
        }

        .sidebar-logo-sub {
            font-size: .55rem;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: .15em;
            font-weight: 700;
            margin-top: 1px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: .35rem;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: .55rem;
            font-weight: 800;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--slate);
            padding: .8rem .6rem .4rem;
            margin-top: .5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: .85rem;
            padding: .75rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: .78rem;
            font-weight: 700;
            color: var(--slate);
            transition: all .2s ease;
            position: relative;
        }

        .nav-link i {
            width: 18px;
            text-align: center;
            font-size: .85rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, .05);
            color: var(--text);
        }

        .nav-link.active {
            background: rgba(255, 204, 0, .1);
            color: var(--gold);
        }

        .sidebar-footer {
            padding: 1.2rem 1rem;
            border-top: 1px solid var(--border);
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .75rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, .04);
            margin-bottom: .6rem;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: .8rem;
        }

        .user-name {
            font-size: .75rem;
            font-weight: 800;
            color: var(--text);
        }

        .user-role {
            font-size: .6rem;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: .1em;
        }

        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: .7rem;
            border-radius: 12px;
            border: none;
            background: rgba(239, 68, 68, .1);
            color: #ef4444;
            font-family: 'Montserrat', sans-serif;
            font-size: .72rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: #fff;
        }

        /* ── MAIN & TOPBAR ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--dark2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: .03em;
        }

        .page-title span {
            color: var(--gold);
        }

        .page-subtitle {
            font-size: .7rem;
            color: var(--slate);
            font-weight: 600;
            margin-top: 2px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .8rem;
        }

        .topbar-time {
            font-size: .72rem;
            font-weight: 700;
            color: var(--slate);
            background: var(--dark3);
            padding: .45rem .9rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .mobile-menu-btn {
            display: none;
            background: var(--dark3);
            border: 1px solid var(--border);
            color: var(--gold);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .content {
            padding: 2rem;
            flex: 1;
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: flex;
            }
        }
    </style>
</head>

<body style="display: none;" id="admin-body">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/ESCUDO.png" alt="DIBA FBC">
            <div>
                <div class="sidebar-logo-text">DIBA FBC</div>
                <div class="sidebar-logo-sub">Panel de Control</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>

            <div class="nav-section-label">Equipo</div>
            <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Planilla</a>
            <a href="../ficha.html" class="nav-link"><i class="fas fa-users"></i> Jugadores</a>
            <a href="partidos.html" class="nav-link active"><i class="fas fa-futbol"></i> Partidos</a>
            <a href="../analisis.html" class="nav-link"><i class="fas fa-chart-line"></i> Análisis</a>
            <a href="convocatorias.html" class="nav-link"><i class="fas fa-bullhorn"></i> Convocatorias</a>

            <div class="nav-section-label">Administración</div>
            <a href="GestorDocumental.html" class="nav-link"><i class="fas fa-folder-open"></i> Gestor Documental</a>
            <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a>
            <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus"></i> Crear Usuario</a>
            <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Rifas</a>

            <div class="nav-section-label">Sitio Web</div>
            <a href="../index.html" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="user-avatar" id="sb-avatar">A</div>
                <div>
                    <div class="user-name" id="sb-name">Administrador</div>
                    <div class="user-role" id="sb-role">Admin</div>
                </div>
            </div>
            <button class="btn-logout" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <div class="main">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu-btn" id="menu-btn">
                <i class="fas fa-bars" id="menu-icon"></i>
            </button>
            <div>
                <div class="page-title">Gestión de <span>Partidos</span></div>
                <div class="page-subtitle">Programación y resultados de encuentros — DIBA FBC</div>
            </div>
            <div class="topbar-right">
                <div class="topbar-time" id="clock">--:--</div>
                <button id="add-match-btn"
                    class="bg-dibaGold text-dibaBlue px-6 py-2 rounded-xl font-black uppercase italic text-[10px] flex items-center gap-2 hover:scale-105 transition-all shadow-lg active:scale-95">
                    <i class="fas fa-plus"></i> Nuevo Partido
                </button>
            </div>
        </header>

        <div class="content">

            <div class="p-6 md:p-10 max-w-7xl mx-auto w-full">
                <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Skeleton loader -->
                    <div class="animate-pulse bg-white/5 rounded-3xl h-64 border border-white/10"></div>
                    <div class="animate-pulse bg-white/5 rounded-3xl h-64 border border-white/10"></div>
                    <div class="animate-pulse bg-white/5 rounded-3xl h-64 border border-white/10"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para crear/editar -->
    <div id="match-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="modal-backdrop"></div>
        <div
            class="relative bg-dibaDark border border-white/10 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate__animated animate__zoomIn">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-black uppercase italic" id="modal-title">Registrar Partido</h3>
                <button class="text-slate-400 hover:text-white" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <form id="match-form" class="p-8 space-y-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" name="id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Equipo
                            Local</label>
                        <input type="text" name="equipolocal" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Equipo
                            Visitante</label>
                        <input type="text" name="equipovisitante" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Fecha</label>
                        <input type="date" name="fecha" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Hora</label>
                        <input type="time" name="hora" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Cancha /
                            Lugar</label>
                        <input type="text" name="Cancha"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: Cancha Municipal">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Categoría</label>
                        <input type="text" name="categoria"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: Sub-12">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Descripción /
                            Detalles</label>
                        <textarea name="descripcion"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold h-24"
                            placeholder="Detalles del partido..."></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Resultado</label>
                        <input type="text" name="resultado"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: 2 - 1">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Valor /
                            Costo</label>
                        <input type="number" name="valor"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                </div>
                <div class="flex justify-end gap-4 p-8 bg-white/5 mt-8 -mx-8 -mb-8">
                    <button type="button" id="cancel-modal"
                        class="px-8 py-4 rounded-2xl text-slate-400 font-black uppercase italic text-xs hover:bg-white/5">Cancelar</button>
                    <button type="submit"
                        class="bg-dibaGold text-dibaBlue px-10 py-4 rounded-2xl font-black uppercase italic text-xs shadow-lg hover:scale-105 active:scale-95 transition-all">Guardar
                        Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        let allMatches = [];

        // ── AUTENTICACIÓN Y CARGA ──
        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;

                document.getElementById('admin-body').style.display = 'flex';

                const user = session.user;
                if (user) {
                    const { data: profile } = await supabase
                        .from('users')
                        .select('username, role, full_name')
                        .eq('id', user.id)
                        .single();

                    if (profile) {
                        document.getElementById('sb-name').textContent = profile.username;
                        document.getElementById('sb-role').textContent = profile.role;
                        document.getElementById('sb-avatar').textContent = profile.username[0].toUpperCase();
                    } else {
                        const emailName = user.email.split('@')[0];
                        document.getElementById('sb-name').textContent = emailName;
                        document.getElementById('sb-avatar').textContent = emailName[0].toUpperCase();
                    }
                }
                loadMatches();
            } catch (error) {
                console.error("Init error:", error);
            }
        }

        init();

        // Clock
        const clockEl = document.getElementById('clock');
        function updateClock() {
            const now = new Date();
            if (clockEl) clockEl.textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Mobile Menu
        const menuBtn = document.getElementById('menu-btn');
        const menuIcon = document.getElementById('menu-icon');
        const sidebar = document.getElementById('sidebar');
        menuBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            if (menuIcon) menuIcon.className = sidebar.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', async () => {
            if (confirm('¿Cerrar sesión?')) {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        });

        // 2. Cargar partidos
        async function loadMatches() {
            const grid = document.getElementById('matches-grid');
            const { data, error } = await supabase.from('partidos').select('*').order('fecha', { ascending: false });

            if (error) {
                console.error(error);
                grid.innerHTML = `<p class="col-span-full text-center text-red-400">Error al cargar datos: ${error.message}</p>`;
                return;
            }

            allMatches = data;
            renderMatches(data);
        }

        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            if (matches.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
                    <i class="fas fa-calendar-times text-4xl text-slate-600 mb-4 block"></i>
                    <p class="text-slate-500 uppercase font-black italic">No hay partidos registrados</p>
                </div>`;
                return;
            }

            grid.innerHTML = matches.map(m => {
                const fecha = new Date(m.fecha).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
                return `
                <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 hover:bg-white/[0.08] transition-all group overflow-hidden relative">
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-dibaGold/10 text-dibaGold px-4 py-1.5 rounded-full text-[9px] font-black uppercase italic tracking-widest border border-dibaGold/20">${m.categoria || 'GENERAL'}</span>
                        <div class="flex gap-2">
                            <button onclick="editMatch('${m.id}')" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteMatch('${m.id}')" class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="mb-6">
                        <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-2">${fecha} · ${m.hora || '--:--'}</p>
                        <h3 class="text-xl font-black uppercase italic leading-tight text-white group-hover:text-dibaGold transition-colors">${m.equipolocal} <span class="text-slate-500">vs</span> ${m.equipovisitante}</h3>
                        ${m.resultado ? `<div class="mt-4 bg-black/40 px-4 py-2 rounded-xl inline-block font-black text-dibaGold italic text-lg">${m.resultado}</div>` : ''}
                    </div>
                    <div class="flex items-center gap-3 text-slate-400">
                        <i class="fas fa-map-marker-alt text-xs text-dibaGold"></i>
                        <span class="text-[10px] font-bold uppercase">${m.Cancha || 'Cancha por definir'}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // 3. Modal logic
        const modal = document.getElementById('match-modal');
        const form = document.getElementById('match-form');

        window.editMatch = (id) => {
            const match = allMatches.find(m => m.id === id);
            if (!match) return;

            document.getElementById('modal-title').textContent = 'Editar Partido';
            form.id.value = match.id;
            form.equipolocal.value = match.equipolocal;
            form.equipovisitante.value = match.equipovisitante;
            form.fecha.value = match.fecha ? match.fecha.split('T')[0] : '';
            form.hora.value = match.hora || '';
            form.Cancha.value = match.Cancha || '';
            form.categoria.value = match.categoria || '';
            form.descripcion.value = match.descripcion || '';
            form.resultado.value = match.resultado || '';
            form.valor.value = match.valor || '';

            modal.classList.remove('hidden');
        };

        window.deleteMatch = async (id) => {
            if (!confirm('¿Seguro que deseas eliminar este partido?')) return;
            const { error } = await supabase.from('partidos').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else loadMatches();
        };

        document.getElementById('add-match-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Registrar Partido';
            form.reset();
            form.id.value = '';
            modal.classList.remove('hidden');
        });

        document.getElementById('close-modal').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('cancel-modal').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('modal-backdrop').addEventListener('click', () => modal.classList.add('hidden'));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            const id = fd.get('id');
            const data = Object.fromEntries(fd.entries());
            delete data.id;

            let result;
            if (id) {
                result = await supabase.from('partidos').update(data).eq('id', id);
            } else {
                result = await supabase.from('partidos').insert([data]);
            }

            if (result.error) {
                alert('Error al guardar: ' + result.error.message);
            } else {
                modal.classList.add('hidden');
                loadMatches();
            }
        });

        // Make functions global for HTML strings
        window.editMatch = editMatch;
        window.deleteMatch = deleteMatch;

    </script>
</body>

</html>
