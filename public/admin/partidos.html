<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBA FBC — Gestión de Partidos</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 
                        dibaGold: 'var(--gold)', 
                        dibaBlue: 'var(--blue)', 
                        dibaDark: 'var(--bg-main)',
                        dibaDark2: 'var(--bg-panel)',
                        dibaDark3: 'var(--bg-input)'
                    }
                },
            },
        }
    </script>
    <style>
        /* Partidos specific styles */
        .content {
            padding: 2rem;
            flex: 1;
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body class="bg-[#06090e] text-fcfcfc font-['Inter']">
    <!-- Loader -->
    <div id="app-loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-[#06090e]">
        <div class="text-center animate-fade-up">
            <div class="relative w-16 h-16 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-gold/10 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-gold rounded-full animate-spin"></div>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gold italic opacity-80">DIBA FBC — Sistema Admin</p>
        </div>
    </div>
    <div id="admin-nav"></div>
    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300">
        <div class="p-10 max-w-[1600px] mx-auto">
            <div class="mb-12 animate-fade-up">
                <div class="flex items-center justify-between flex-wrap gap-6">
                    <div>
                        <h2 class="text-4xl font-black italic text-white uppercase tracking-tighter mb-2">Gestión de <span class="text-gold">Partidos</span></h2>
                        <p class="text-white/40 font-bold uppercase tracking-[0.4em] text-[0.7rem]">Calendario oficial y resultados de encuentros</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button id="add-match-btn" class="px-8 py-4 bg-gold rounded-2xl text-[#004d98] font-black uppercase tracking-widest text-[0.7rem] hover:scale-105 transition-all shadow-xl shadow-gold/10 flex items-center gap-3">
                            <i class="fas fa-plus"></i> AGREGAR PARTIDO
                        </button>
                    </div>
                </div>
            </div>

            <div class="diba-grid" id="matches-grid">
                <!-- Skeleton loader -->
                <div class="col-4 animate-pulse bg-white/5 rounded-[2.5rem] h-64 border border-white/10"></div>
                <div class="col-4 animate-pulse bg-white/5 rounded-[2.5rem] h-64 border border-white/10"></div>
                <div class="col-4 animate-pulse bg-white/5 rounded-[2.5rem] h-64 border border-white/10"></div>
            </div>
        </div>
    </main>

    <!-- Modal para crear/editar -->
    <div id="match-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="modal-backdrop"></div>
        <div
            class="relative bg-dibaDark border border-white/10 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate__animated animate__zoomIn">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-black uppercase italic" id="modal-title">Registrar Partido</h3>
                <button class="text-slate-400 hover:text-white" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <form id="match-form" class="p-8 space-y-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" name="id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Equipo
                            Local</label>
                        <input type="text" name="equipolocal" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Equipo
                            Visitante</label>
                        <input type="text" name="equipovisitante" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Fecha</label>
                        <input type="date" name="fecha" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Hora</label>
                        <input type="time" name="hora" required
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Cancha /
                            Lugar</label>
                        <input type="text" name="Cancha"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: Cancha Municipal">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Categoría</label>
                        <input type="text" name="categoria"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: Sub-12">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Descripción /
                            Detalles</label>
                        <textarea name="descripcion"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold h-24"
                            placeholder="Detalles del partido..."></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Resultado</label>
                        <input type="text" name="resultado"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold"
                            placeholder="Ej: 2 - 1">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Valor /
                            Costo</label>
                        <input type="number" name="valor"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-dibaGold outline-none font-bold">
                    </div>
                </div>
                <div class="flex justify-end gap-4 p-8 bg-white/5 mt-8 -mx-8 -mb-8">
                    <button type="button" id="cancel-modal"
                        class="px-8 py-4 rounded-2xl text-slate-400 font-black uppercase italic text-xs hover:bg-white/5">Cancelar</button>
                    <button type="submit"
                        class="bg-dibaGold text-dibaBlue px-10 py-4 rounded-2xl font-black uppercase italic text-xs shadow-lg hover:scale-105 active:scale-95 transition-all">Guardar
                        Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        let allMatches = [];

        // ── AUTENTICACIÓN Y CARGA ──
        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;

                initAdminLayout();
                loadMatches();
            } catch (error) {
                console.error("Init error:", error);
            }
        }

        init();

        // 2. Cargar partidos
        async function loadMatches() {
            const grid = document.getElementById('matches-grid');
            const { data, error } = await supabase.from('partidos').select('*').order('fecha', { ascending: false });

            if (error) {
                console.error(error);
                grid.innerHTML = `<p class="col-span-full text-center text-red-400">Error al cargar datos: ${error.message}</p>`;
                return;
            }

            allMatches = data;
            renderMatches(data);
        }

        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            if (matches.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
                    <i class="fas fa-calendar-times text-4xl text-slate-600 mb-4 block"></i>
                    <p class="text-slate-500 uppercase font-black italic">No hay partidos registrados</p>
                </div>`;
                return;
            }

            grid.innerHTML = matches.map(m => {
                // Parse date safely to avoid UTC shifts
                const dateParts = m.fecha ? m.fecha.split('T')[0].split('-') : null;
                const dateObj = dateParts ? new Date(dateParts[0], dateParts[1] - 1, dateParts[2]) : null;
                const fechaStr = dateObj ? dateObj.toLocaleDateString('es-CO', { day: '2-digit', month: 'long', year: 'numeric' }) : 'Fecha pendiente';
                
                return `
                <div class="col-4 panel glass p-8 group relative overflow-hidden flex flex-col h-full hover:border-gold/30 transition-all duration-500">
                    <div class="flex justify-between items-start mb-8">
                        <span class="px-3 py-1 rounded-full bg-gold/10 border border-gold/20 text-gold text-[0.55rem] font-black uppercase tracking-widest">${m.categoria || 'GENERAL'}</span>
                        <div class="flex gap-2">
                             <button onclick="editMatch('${m.id}')" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white/40 hover:text-gold hover:bg-white/10 transition-all border border-white/5"><i class="fas fa-edit text-xs"></i></button>
                             <button onclick="deleteMatch('${m.id}')" class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white transition-all border border-red-500/10"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>

                    <div class="mb-auto">
                        <div class="flex items-center gap-3 text-white/30 text-[0.6rem] font-bold uppercase tracking-[0.2em] mb-4">
                            <i class="fas fa-calendar-star text-gold"></i>
                            <span>${fechaStr}</span>
                        </div>
                        
                        <div class="flex flex-col gap-4 mb-6">
                            <div class="flex items-center justify-between">
                                <span class="text-lg font-black italic uppercase tracking-tighter text-white">${m.equipolocal}</span>
                                ${m.resultado ? `<span class="bg-black/40 px-3 py-1 rounded-lg text-gold font-black italic border border-gold/20 shadow-lg">${m.resultado.split('-')[0].trim()}</span>` : ''}
                            </div>
                            <div class="w-full h-[1px] bg-gradient-to-r from-white/0 via-white/10 to-white/0 my-1 flex items-center justify-center">
                                <span class="bg-[#0b101b] px-3 py-1 text-[0.5rem] font-black text-white/20 italic uppercase">VS</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-lg font-black italic uppercase tracking-tighter text-white">${m.equipovisitante}</span>
                                ${m.resultado ? `<span class="bg-black/40 px-3 py-1 rounded-lg text-gold font-black italic border border-gold/20 shadow-lg">${m.resultado.split('-')[1]?.trim() || '0'}</span>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-white/5 space-y-3">
                        <div class="flex items-center gap-3 text-white/40">
                            <i class="fas fa-clock text-gold text-[0.6rem]"></i>
                            <span class="text-[0.65rem] font-black uppercase tracking-widest">${m.hora || 'POR DEFINIR'}</span>
                        </div>
                        <div class="flex items-center gap-3 text-white/40">
                            <i class="fas fa-map-marker-alt text-gold text-[0.6rem]"></i>
                            <span class="text-[0.65rem] font-black uppercase tracking-widest truncate">${m.Cancha || 'SIN CANCHA ASIGNADA'}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // 3. Modal logic
        const modal = document.getElementById('match-modal');
        const form = document.getElementById('match-form');

        window.editMatch = (id) => {
            const match = allMatches.find(m => m.id === id);
            if (!match) return;

            document.getElementById('modal-title').textContent = 'Editar Partido';
            form.id.value = match.id;
            form.equipolocal.value = match.equipolocal;
            form.equipovisitante.value = match.equipovisitante;
            form.fecha.value = match.fecha ? match.fecha.split('T')[0] : '';
            form.hora.value = match.hora || '';
            form.Cancha.value = match.Cancha || '';
            form.categoria.value = match.categoria || '';
            form.descripcion.value = match.descripcion || '';
            form.resultado.value = match.resultado || '';
            form.valor.value = match.valor || '';

            modal.classList.remove('hidden');
        };

        window.deleteMatch = async (id) => {
            if (!confirm('¿Seguro que deseas eliminar este partido?')) return;
            const { error } = await supabase.from('partidos').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else loadMatches();
        };

        document.getElementById('add-match-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Registrar Partido';
            form.reset();
            form.id.value = '';
            modal.classList.remove('hidden');
        });

        document.getElementById('close-modal').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('cancel-modal').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('modal-backdrop').addEventListener('click', () => modal.classList.add('hidden'));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            const id = fd.get('id');
            const data = Object.fromEntries(fd.entries());
            delete data.id;

            let result;
            if (id) {
                result = await supabase.from('partidos').update(data).eq('id', id);
            } else {
                result = await supabase.from('partidos').insert([data]);
            }

            if (result.error) {
                alert('Error al guardar: ' + result.error.message);
            } else {
                modal.classList.add('hidden');
                loadMatches();
            }
        });

        // Make functions global for HTML strings
        window.editMatch = editMatch;
        window.deleteMatch = deleteMatch;

    </script>
</body>

</html>
