<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilla de Asistencia — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Planilla de <span class="text-diba-red">Asistencia</span></h2>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-1">Control de presencia y rendimiento</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="save-attendance-btn" class="bg-diba-gold text-diba-blue px-8 py-3 rounded-xl font-black italic uppercase text-xs shadow-lg shadow-yellow-500/20 hover:scale-105 transition-all">
                        <i class="fas fa-save mr-2 text-diba-red"></i> Guardar Cambios
                    </button>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden">
                <div class="p-8 border-b border-slate-50 bg-slate-50/20 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-1.5 h-10 bg-diba-blue rounded-full"></div>
                        <div>
                            <div class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Partido / Sesión</div>
                            <div class="text-sm font-black text-diba-blue italic uppercase tracking-tighter" id="session-title">Cargando evento...</div>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 border-b border-slate-50">
                                <th class="px-8 py-5">Jugador</th>
                                <th class="px-8 py-5 text-center">Asistencia</th>
                                <th class="px-8 py-5 text-center">Pago</th>
                                <th class="px-8 py-5 text-center">Observaciones</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-table-body">
                            <tr><td colspan="4" class="py-20 text-center"><i class="fas fa-circle-notch fa-spin text-2xl text-slate-200"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            fetchPlayers();
        }

        async function fetchPlayers() {
            try {
                const { data: players, error } = await supabase.from('jugadores').select('*').order('nombre', { ascending: true });
                if (error) throw error;
                renderAttendance(players || []);
            } catch (error) {
                console.error("Fetch Players Error:", error);
            }
        }

        function renderAttendance(players) {
            const tbody = document.getElementById('attendance-table-body');
            document.getElementById('session-title').textContent = "Práctica General — " + new Date().toLocaleDateString();
            
            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-xs font-bold text-slate-400 italic">No hay jugadores registrados</td></tr>';
                return;
            }

            tbody.innerHTML = players.map(p => `
                <tr class="group hover:bg-slate-50 transition-all border-b border-slate-50">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-diba-blue group-hover:bg-white transition-all border border-transparent group-hover:border-slate-100 italic font-black shadow-inner">
                                ${(p.nombre || 'J')[0]}
                            </div>
                            <div>
                                <div class="text-xs font-black text-diba-blue italic uppercase tracking-tighter">${p.nombre}</div>
                                <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${p.categoria || 'Sin categoría'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-slate-100 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                        </label>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <button class="px-4 py-1.5 rounded-lg bg-slate-50 text-slate-400 text-[9px] font-black uppercase tracking-widest border border-slate-100 hover:bg-emerald-50 hover:text-emerald-500 hover:border-emerald-200 transition-all">
                            Pendiente
                        </button>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <input type="text" placeholder="Añadir nota..." class="bg-slate-50 border-none rounded-xl px-4 py-2 text-[10px] font-medium text-slate-600 outline-none focus:ring-1 focus:ring-diba-blue/10 w-48 mx-auto block group-hover:bg-white transition-all">
                    </td>
                </tr>
            `).join('');
        }
        
        init();
    </script>
</body>
</html>
