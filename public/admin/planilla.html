<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
  <meta charset="UTF-8" />
  <title>Planilla - DIBA FBC</title>
  <meta name="author" content="REINALDO DE JESUS PEREZ NAVAS" />
  <meta name="keywords"
    content="DIBA FBC, Deportivo Internacional De Barranquilla Atlántico, Fútbol, Barranquilla, Atlántico, Colombia" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#002a40" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/ESCUDO.ico" sizes="32x32">

  <!-- Bootstrap 5.3.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/background-animation.css" />

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary-color: #002a40;
      --gold: #ffcc00;
      --bs-body-bg: #f8f9fa;
    }

    body {
      background-color: var(--bs-body-bg);
      padding-bottom: 5rem;
    }

    .navbar {
      background-color: var(--primary-color) !important;
    }

    .table-responsive {
      max-height: 65vh;
      overflow-y: auto;
    }

    .table th {
      background-color: var(--primary-color);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: .8rem;
      margin-bottom: 1.2rem;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      border: 1px solid transparent;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
    }

    .stat-chip.green .stat-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .stat-chip.red .stat-icon {
      background: #fee2e2;
      color: #dc2626;
    }

    .stat-chip.yellow .stat-icon {
      background: #fef9c3;
      color: #ca8a04;
    }

    .stat-chip.blue .stat-icon {
      background: #dbeafe;
      color: #2563eb;
    }

    .stat-chip.purple .stat-icon {
      background: #f3e8ff;
      color: #7c3aed;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 900;
      color: #0f172a;
    }

    .stat-label {
      font-size: .6rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #64748b;
    }

    .att-progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      margin-bottom: 1.2rem;
    }

    .att-seg {
      height: 100%;
      transition: width .4s ease;
    }

    .search-input {
      padding: .55rem .9rem;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      font-size: .82rem;
      font-weight: 600;
      outline: none;
    }

    .toast-container {
      z-index: 1100;
    }

    .saving-indicator {
      font-size: 0.7rem;
      color: #64748b;
      font-style: italic;
    }
  </style>
</head>

<body style="display: none;" id="planilla-body">
  <!-- Toast -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <i class="fas fa-check-circle text-success me-2"></i>
        <strong class="me-auto">Notificación</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body"></div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container text-center">
      <a class="navbar-brand mx-auto" href="index.html">
        <img src="/images/ESCUDO.png" alt="DIBA FBC Logo" width="30" height="30"
          class="d-inline-block align-text-top me-2">
        DIBA FBC - Planilla de Administración
      </a>
      <a href="index.html" class="btn btn-sm btn-outline-warning position-absolute end-0 me-3"><i
          class="fas fa-th-large me-1"></i>Panel</a>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
      <div>
        <h2 class="mb-0 fw-bold">Planilla de Asistencia <span id="sync-status" class="saving-indicator"></span></h2>
      </div>
      <div class="d-flex gap-2 align-items-center mt-2 mt-md-0">
        <label for="planillaDate" class="form-label mb-0 fw-bold">Fecha:</label>
        <input type="date" class="form-control" id="planillaDate">
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-chip green">
        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
        <div>
          <div class="stat-value" id="stat-presentes">0</div>
          <div class="stat-label">Presentes</div>
        </div>
      </div>
      <div class="stat-chip red">
        <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
        <div>
          <div class="stat-value" id="stat-ausentes">0</div>
          <div class="stat-label">Ausentes</div>
        </div>
      </div>
      <div class="stat-chip yellow">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div>
          <div class="stat-value" id="stat-excusas">0</div>
          <div class="stat-label">Excusas</div>
        </div>
      </div>
      <div class="stat-chip blue">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div>
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total DB</div>
        </div>
      </div>
      <div class="stat-chip purple">
        <div class="stat-icon"><i class="fas fa-percent"></i></div>
        <div>
          <div class="stat-value" id="stat-pct">0%</div>
          <div class="stat-label">Asistencia</div>
        </div>
      </div>
    </div>

    <!-- Barra de progreso -->
    <div class="att-progress-bar">
      <div class="att-seg" id="prog-p" style="background:#22c55e;width:0%"></div>
      <div class="att-seg" id="prog-a" style="background:#ef4444;width:0%"></div>
      <div class="att-seg" id="prog-e" style="background:#eab308;width:0%"></div>
    </div>

    <!-- Controles -->
    <div class="card shadow-sm mb-4">
      <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="d-flex gap-2">
          <a href="../listaJugadores.html" class="btn btn-warning fw-bold"><i
              class="fas fa-users-cog me-2"></i>Gestionar Jugadores</a>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <input type="text" id="playerSearch" class="search-input" placeholder="Buscar por nombre...">
          <button id="generatePDF" class="btn btn-primary"><i class="fas fa-file-pdf me-1"></i>PDF</button>
          <button id="generateExcel" class="btn btn-success"><i class="fas fa-file-excel me-1"></i>Excel</button>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive shadow-sm rounded border">
      <table class="table table-striped table-hover mb-0" id="mainTable">
        <thead>
          <tr>
            <th style="width: 5%;">#</th>
            <th>Nombre del Jugador</th>
            <th style="width: 15%;">Pagos ($)</th>
            <th style="width: 15%;">Asistencia</th>
            <th style="width: 25%;">Observaciones</th>
            <th style="width: 10%;" class="text-center">Doc.</th>
          </tr>
        </thead>
        <tbody id="planillaBody">
          <tr>
            <td colspan="6" class="text-center p-5 text-muted">Cargando datos desde la nube... <i
                class="fas fa-spinner fa-spin ms-2"></i></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
    requireAdmin().then(session => {
      if (session) document.getElementById('planilla-body').style.display = 'block';
    });

    document.addEventListener('DOMContentLoaded', () => {
      const tableBody = document.getElementById('planillaBody');
      const dateInput = document.getElementById('planillaDate');
      const playerSearch = document.getElementById('playerSearch');
      const syncStatus = document.getElementById('sync-status');
      const toastElement = document.getElementById('appToast');
      const bsToast = new bootstrap.Toast(toastElement);

      let appState = {
        players: [],
        currentPlanillaId: null,
        registros: {} // { dni: { id_db, pago, asistencia, observacion } }
      };

      const showToast = (message, isError = false) => {
        toastElement.querySelector('.toast-body').textContent = message;
        toastElement.querySelector('i').className = isError ? 'fas fa-exclamation-circle text-danger me-2' : 'fas fa-check-circle text-success me-2';
        bsToast.show();
      };

      const loadData = async () => {
        try {
          tableBody.innerHTML = '<tr><td colspan="6" class="text-center p-5 text-muted">Sincronizando con base de datos... <i class="fas fa-spinner fa-spin ms-2"></i></td></tr>';

          if (!dateInput.value) dateInput.valueAsDate = new Date();
          const fechaSeleccionada = dateInput.value;

          // 1. Cargar jugadores
          const { data: players, error: pErr } = await supabase.from('identificacion').select('numero, nombre, apellidos').order('apellidos');
          if (pErr) throw pErr;
          appState.players = players.map(p => ({ id: p.numero, name: `${p.nombre} ${p.apellidos}`.trim() }));

          // 2. Obtener o crear Planilla del día
          const { data: planillas, error: plErr } = await supabase
            .from('planillas')
            .select('id')
            .eq('fecha', fechaSeleccionada)
            .limit(1);

          if (plErr) throw plErr;

          let planillaId;
          if (planillas.length === 0) {
            const { data: newPl, error: createErr } = await supabase
              .from('planillas')
              .insert([{ fecha: fechaSeleccionada, categoria: 'General' }])
              .select('id')
              .single();
            if (createErr) throw createErr;
            planillaId = newPl.id;
          } else {
            planillaId = planillas[0].id;
          }
          appState.currentPlanillaId = planillaId;

          // 3. Cargar registros existentes
          const { data: regs, error: rErr } = await supabase
            .from('planilla_registros')
            .select('*')
            .eq('planilla_id', planillaId);

          if (rErr) throw rErr;

          appState.registros = {};
          regs.forEach(r => {
            appState.registros[r.jugador_dni] = {
              db_id: r.id,
              pago: r.pago,
              asistencia: r.asistencia,
              obs: r.observacion
            };
          });

          render();
        } catch (e) {
          console.error(e);
          showToast('Error de conexión: ' + (e.message || 'Supabase no responde'), true);
        }
      };

      const render = () => {
        const q = playerSearch.value.toLowerCase();
        tableBody.innerHTML = '';
        const filtered = appState.players.filter(p => p.name.toLowerCase().includes(q));

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="text-center p-4">Listado vacío o sin coincidencias.</td></tr>`;
          return;
        }

        filtered.forEach((p, i) => {
          const d = appState.registros[p.id] || { pago: 0, asistencia: 'P', obs: '' };
          const tr = document.createElement('tr');
          tr.dataset.dni = p.id;
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td class="fw-bold text-primary">${p.name}</td>
            <td><input type="number" class="form-control form-control-sm in-pago" value="${d.pago || ''}" placeholder="0"></td>
            <td>
              <select class="form-select form-select-sm in-asist">
                <option value="P" ${d.asistencia === 'P' ? 'selected' : ''}>Presente</option>
                <option value="A" ${d.asistencia === 'A' ? 'selected' : ''}>Ausente</option>
                <option value="E" ${d.asistencia === 'E' ? 'selected' : ''}>Excusa</option>
              </select>
            </td>
            <td><input type="text" class="form-control form-control-sm in-obs" value="${d.obs || ''}" placeholder="..."></td>
            <td class="text-center small text-muted">${p.id}</td>
          `;
          tableBody.appendChild(tr);
        });
        updateStats();
      };

      const updateStats = () => {
        const total = appState.players.length;
        let p = 0, a = 0, e = 0;
        appState.players.forEach(pl => {
          const d = appState.registros[pl.id] || { asistencia: 'P' };
          if (d.asistencia === 'P') p++;
          else if (d.asistencia === 'A') a++;
          else if (d.asistencia === 'E') e++;
        });

        document.getElementById('stat-presentes').textContent = p;
        document.getElementById('stat-ausentes').textContent = a;
        document.getElementById('stat-excusas').textContent = e;
        document.getElementById('stat-total').textContent = total;

        const pct = total > 0 ? Math.round((p / total) * 100) : 0;
        document.getElementById('stat-pct').textContent = pct + '%';
        document.getElementById('prog-p').style.width = (total > 0 ? (p / total) * 100 : 0) + '%';
        document.getElementById('prog-a').style.width = (total > 0 ? (a / total) * 100 : 0) + '%';
        document.getElementById('prog-e').style.width = (total > 0 ? (e / total) * 100 : 0) + '%';
      };

      // Guardado automático en Supabase
      const saveRegistro = async (dni) => {
        syncStatus.innerHTML = '<i class="fas fa-cloud-upload-alt ms-2"></i> Guardando...';
        const d = appState.registros[dni];
        const payload = {
          planilla_id: appState.currentPlanillaId,
          jugador_dni: dni,
          pago: parseFloat(d.pago) || 0,
          asistencia: d.asistencia,
          observacion: d.obs
        };

        try {
          if (d.db_id) {
            // Update
            await supabase.from('planilla_registros').update(payload).eq('id', d.db_id);
          } else {
            // Insert
            const { data, error } = await supabase.from('planilla_registros').insert([payload]).select('id').single();
            if (!error) d.db_id = data.id;
          }
          syncStatus.innerHTML = '<i class="fas fa-check-circle text-success ms-2"></i> Sincronizado';
        } catch (e) {
          console.error(e);
          syncStatus.innerHTML = '<i class="fas fa-times-circle text-danger ms-2"></i> Error al guardar';
        }
      };

      // Handlers
      tableBody.addEventListener('input', (e) => {
        const tr = e.target.closest('tr');
        if (!tr) return;
        const dni = tr.dataset.dni;
        if (!appState.registros[dni]) appState.registros[dni] = { pago: 0, asistencia: 'P', obs: '' };

        if (e.target.classList.contains('in-pago')) appState.registros[dni].pago = e.target.value;
        if (e.target.classList.contains('in-obs')) appState.registros[dni].obs = e.target.value;

        // Debounce simple
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => saveRegistro(dni), 1000);
      });

      tableBody.addEventListener('change', (e) => {
        const tr = e.target.closest('tr');
        if (tr && e.target.classList.contains('in-asist')) {
          const dni = tr.dataset.dni;
          if (!appState.registros[dni]) appState.registros[dni] = { pago: 0, asistencia: 'P', obs: '' };
          appState.registros[dni].asistencia = e.target.value;
          saveRegistro(dni);
          updateStats();
        }
      });

      dateInput.onchange = loadData;
      playerSearch.oninput = render;

      // Export
      document.getElementById('generateExcel').onclick = () => {
        const rows = [['Nombre', 'DNI', 'Pago', 'Asistencia', 'Observación']];
        appState.players.forEach(p => {
          const d = appState.registros[p.id] || { asistencia: 'P' };
          rows.push([p.name, p.id, d.pago, d.asistencia, d.obs]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'DIBA_Planilla');
        XLSX.writeFile(wb, `Planilla_${dateInput.value}.xlsx`);
      };

      document.getElementById('generatePDF').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text(`DIBA FBC - Planilla de Control`, 14, 20);
        doc.setFontSize(10);
        doc.text(`Fecha: ${dateInput.value} | Categoria: General`, 14, 28);
        const body = appState.players.map(p => {
          const d = appState.registros[p.id] || { asistencia: 'P' };
          const asistText = { P: 'Presente', A: 'Ausente', E: 'Excusa' }[d.asistencia];
          return [p.name, p.id, `$${d.pago || 0}`, asistText, d.obs];
        });
        doc.autoTable({ startY: 35, head: [['Nombre del Jugador', 'DNI', 'Pago', 'Asist', 'Obs']], body });
        doc.save(`DIBA_Planilla_${dateInput.value}.pdf`);
      };

      loadData();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
