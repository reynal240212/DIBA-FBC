<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
  <meta charset="UTF-8" />
  <title>Planilla - DIBA FBC</title>
  <meta name="author" content="REINALDO DE JESUS PEREZ NAVAS" />
  <meta name="keywords"
    content="DIBA FBC, Deportivo Internacional De Barranquilla Atlántico, Fútbol, Barranquilla, Atlántico, Colombia" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#002a40" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/ESCUDO.ico" sizes="32x32">

  <!-- Bootstrap 5.3.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/background-animation.css" />

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary-color: #002a40;
      --gold: #ffcc00;
      --bs-body-bg: #f8f9fa;
    }

    body {
      background-color: var(--bs-body-bg);
      padding-bottom: 5rem;
    }

    .navbar {
      background-color: var(--primary-color) !important;
    }

    .table-responsive {
      max-height: 65vh;
      overflow-y: auto;
    }

    .table th {
      background-color: var(--primary-color);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: .8rem;
      margin-bottom: 1.2rem;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      border: 1px solid transparent;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
    }

    .stat-chip.green .stat-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .stat-chip.red .stat-icon {
      background: #fee2e2;
      color: #dc2626;
    }

    .stat-chip.yellow .stat-icon {
      background: #fef9c3;
      color: #ca8a04;
    }

    .stat-chip.blue .stat-icon {
      background: #dbeafe;
      color: #2563eb;
    }

    .stat-chip.purple .stat-icon {
      background: #f3e8ff;
      color: #7c3aed;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 900;
      color: #0f172a;
    }

    .stat-label {
      font-size: .6rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #64748b;
    }

    .att-progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      margin-bottom: 1.2rem;
    }

    .att-seg {
      height: 100%;
      transition: width .4s ease;
    }

    .search-input {
      padding: .55rem .9rem;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      font-size: .82rem;
      font-weight: 600;
      outline: none;
    }

    .toast-container {
      z-index: 1100;
    }
  </style>
</head>

<body>
  <!-- Toast -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <i class="fas fa-check-circle text-success me-2"></i>
        <strong class="me-auto">Notificación</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body"></div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container text-center">
      <a class="navbar-brand mx-auto" href="index.html">
        <img src="/images/ESCUDO.png" alt="DIBA FBC Logo" width="30" height="30"
          class="d-inline-block align-text-top me-2">
        DIBA FBC - Planilla de Administración
      </a>
      <a href="index.html" class="btn btn-sm btn-outline-warning position-absolute end-0 me-3"><i
          class="fas fa-th-large me-1"></i>Panel</a>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
      <h2 class="mb-0 fw-bold">Planilla de Asistencia</h2>
      <div class="d-flex gap-2 align-items-center mt-2 mt-md-0">
        <label for="planillaDate" class="form-label mb-0 fw-bold">Fecha:</label>
        <input type="date" class="form-control" id="planillaDate">
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-chip green">
        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
        <div>
          <div class="stat-value" id="stat-presentes">0</div>
          <div class="stat-label">Presentes</div>
        </div>
      </div>
      <div class="stat-chip red">
        <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
        <div>
          <div class="stat-value" id="stat-ausentes">0</div>
          <div class="stat-label">Ausentes</div>
        </div>
      </div>
      <div class="stat-chip yellow">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div>
          <div class="stat-value" id="stat-excusas">0</div>
          <div class="stat-label">Excusas</div>
        </div>
      </div>
      <div class="stat-chip blue">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div>
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total DB</div>
        </div>
      </div>
      <div class="stat-chip purple">
        <div class="stat-icon"><i class="fas fa-percent"></i></div>
        <div>
          <div class="stat-value" id="stat-pct">0%</div>
          <div class="stat-label">Asistencia</div>
        </div>
      </div>
    </div>

    <!-- Barra de progreso -->
    <div class="att-progress-bar">
      <div class="att-seg" id="prog-p" style="background:#22c55e;width:0%"></div>
      <div class="att-seg" id="prog-a" style="background:#ef4444;width:0%"></div>
      <div class="att-seg" id="prog-e" style="background:#eab308;width:0%"></div>
    </div>

    <!-- Controles -->
    <div class="card shadow-sm mb-4">
      <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="d-flex gap-2">
          <a href="../listaJugadores.html" class="btn btn-warning fw-bold"><i
              class="fas fa-users-cog me-2"></i>Gestionar Jugadores</a>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <input type="text" id="playerSearch" class="search-input" placeholder="Buscar por nombre...">
          <button id="generatePDF" class="btn btn-primary"><i class="fas fa-file-pdf me-1"></i>PDF</button>
          <button id="generateExcel" class="btn btn-success"><i class="fas fa-file-excel me-1"></i>Excel</button>
          <button id="clearData" class="btn btn-outline-danger"><i class="fas fa-trash-alt me-1"></i>Limpiar</button>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive shadow-sm rounded border">
      <table class="table table-striped table-hover mb-0">
        <thead>
          <tr>
            <th style="width: 5%;">#</th>
            <th>Nombre del Jugador</th>
            <th style="width: 15%;">Pagos</th>
            <th style="width: 15%;">Asistencia</th>
            <th style="width: 25%;">Observaciones</th>
            <th style="width: 10%;" class="text-center">Doc.</th>
          </tr>
        </thead>
        <tbody id="planillaBody">
          <tr>
            <td colspan="6" class="text-center p-5 text-muted">Cargando datos desde Supabase...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { supabase } from '../scripts/supabaseClient.js';

    document.addEventListener('DOMContentLoaded', () => {
      const tableBody = document.getElementById('planillaBody');
      const dateInput = document.getElementById('planillaDate');
      const playerSearch = document.getElementById('playerSearch');
      const toastElement = document.getElementById('appToast');
      const bsToast = new bootstrap.Toast(toastElement);

      let appState = {
        players: [],
        data: {}
      };

      const showToast = (message, isError = false) => {
        toastElement.querySelector('.toast-body').textContent = message;
        toastElement.querySelector('i').className = isError ? 'fas fa-exclamation-circle text-danger me-2' : 'fas fa-check-circle text-success me-2';
        bsToast.show();
      };

      const saveLocally = () => {
        localStorage.setItem('dibaFbcAppState_v2', JSON.stringify(appState.data));
      };

      const loadData = async () => {
        try {
          // Cargar jugadores de Supabase
          const { data, error } = await supabase.from('identificacion').select('numero, nombre, apellidos').order('apellidos');
          if (error) throw error;
          appState.players = data.map(p => ({ id: p.numero, name: `${p.nombre} ${p.apellidos}`.trim() }));

          // Cargar asistencia guardada localmente
          const saved = localStorage.getItem('dibaFbcAppState_v2');
          if (saved) appState.data = JSON.parse(saved);

          if (!dateInput.value) dateInput.valueAsDate = new Date();

          render();
        } catch (e) {
          console.error(e);
          showToast('Error al conectar con Supabase', true);
        }
      };

      const render = () => {
        const q = playerSearch.value.toLowerCase();
        tableBody.innerHTML = '';

        const filtered = appState.players.filter(p => p.name.toLowerCase().includes(q));

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="text-center p-4">No se encontraron jugadores.</td></tr>`;
          return;
        }

        filtered.forEach((p, i) => {
          const d = appState.data[p.id] || { pagos: '', asistencia: 'P', obs: '' };
          const tr = document.createElement('tr');
          tr.dataset.id = p.id;
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td class="fw-bold text-primary">${p.name}</td>
            <td><input type="text" class="form-control form-control-sm in-pago" value="${d.pagos || ''}" placeholder="$"></td>
            <td>
              <select class="form-select form-select-sm in-asist">
                <option value="P" ${d.asistencia === 'P' ? 'selected' : ''}>Presente</option>
                <option value="A" ${d.asistencia === 'A' ? 'selected' : ''}>Ausente</option>
                <option value="E" ${d.asistencia === 'E' ? 'selected' : ''}>Excusa</option>
              </select>
            </td>
            <td><input type="text" class="form-control form-control-sm in-obs" value="${d.obs || ''}" placeholder="..."></td>
            <td class="text-center small text-muted">${p.id}</td>
          `;
          tableBody.appendChild(tr);
        });
        updateStats();
      };

      const updateStats = () => {
        const total = appState.players.length;
        let p = 0, a = 0, e = 0;
        appState.players.forEach(pl => {
          const d = appState.data[pl.id] || { asistencia: 'P' };
          if (d.asistencia === 'P') p++;
          else if (d.asistencia === 'A') a++;
          else if (d.asistencia === 'E') e++;
        });

        document.getElementById('stat-presentes').textContent = p;
        document.getElementById('stat-ausentes').textContent = a;
        document.getElementById('stat-excusas').textContent = e;
        document.getElementById('stat-total').textContent = total;

        const pct = total > 0 ? Math.round((p / total) * 100) : 0;
        document.getElementById('stat-pct').textContent = pct + '%';
        document.getElementById('prog-p').style.width = (total > 0 ? (p / total) * 100 : 0) + '%';
        document.getElementById('prog-a').style.width = (total > 0 ? (a / total) * 100 : 0) + '%';
        document.getElementById('prog-e').style.width = (total > 0 ? (e / total) * 100 : 0) + '%';
      };

      // Events
      tableBody.addEventListener('input', (e) => {
        const tr = e.target.closest('tr');
        if (!tr) return;
        const id = tr.dataset.id;
        if (!appState.data[id]) appState.data[id] = { pagos: '', asistencia: 'P', obs: '' };

        if (e.target.classList.contains('in-pago')) appState.data[id].pagos = e.target.value;
        if (e.target.classList.contains('in-obs')) appState.data[id].obs = e.target.value;
        saveLocally();
      });

      tableBody.addEventListener('change', (e) => {
        const tr = e.target.closest('tr');
        if (tr && e.target.classList.contains('in-asist')) {
          const id = tr.dataset.id;
          if (!appState.data[id]) appState.data[id] = { pagos: '', asistencia: 'P', obs: '' };
          appState.data[id].asistencia = e.target.value;
          saveLocally();
          updateStats();
        }
      });

      playerSearch.addEventListener('input', render);
      document.getElementById('clearData').onclick = () => {
        if (confirm('¿Vaciar asistencia y pagos?')) { appState.data = {}; saveLocally(); render(); showToast('Planilla vaciada'); }
      };

      // Export
      document.getElementById('generateExcel').onclick = () => {
        const rows = [['Nombre', 'Doc', 'Pago', 'Asistencia', 'Obs']];
        appState.players.forEach(p => {
          const d = appState.data[p.id] || { asistencia: 'P' };
          rows.push([p.name, p.id, d.pagos, d.asistencia, d.obs]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Planilla');
        XLSX.writeFile(wb, `Planilla_DIBA_${dateInput.value}.xlsx`);
      };

      document.getElementById('generatePDF').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Planilla DIBA FBC - ${dateInput.value}`, 14, 20);
        const body = appState.players.map(p => {
          const d = appState.data[p.id] || { asistencia: 'P' };
          return [p.name, p.id, d.pagos, d.asistencia, d.obs];
        });
        doc.autoTable({ startY: 30, head: [['Nombre', 'Doc', 'Pago', 'Asist', 'Obs']], body });
        doc.save(`Planilla_DIBA_${dateInput.value}.pdf`);
      };

      loadData();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
