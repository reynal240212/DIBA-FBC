<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil de Usuario — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            object-fit: cover;
            border: 4px solid var(--gold);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            background: rgba(255, 215, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 3rem;
            border: 2px dashed rgba(255, 215, 0, 0.3);
        }
    </style>
</head>

<body class="bg-gray-100 text-slate-800 font-['Outfit']">

    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300 flex items-center justify-center p-6">
        <div class="w-full max-w-2xl animate-fade-up">
            
            <!-- Context Header -->
            <div class="mb-10 text-center">
                <div class="flex items-center justify-center gap-3 mb-3">
                    <span class="w-8 h-1 bg-gold rounded-full"></span>
                    <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Identidad del Administrador</p>
                    <span class="w-8 h-1 bg-gold rounded-full"></span>
                </div>
                <h2 class="text-4xl lg:text-5xl font-black italic text-slate-800 uppercase tracking-tighter">Mi <span class="text-gold">Perfil</span></h2>
            </div>

            <div class="panel p-0 overflow-hidden shadow-[0_30px_100px_rgba(0,0,0,0.5)] border-white/10">
                <!-- Avatar Section -->
                <div class="p-10 bg-white/[0.02] border-b border-white/5 text-center">
                    <div class="avatar-container mb-6 group">
                        <img id="avatar-preview-img" class="avatar-preview hidden" src="" alt="Avatar">
                        <div id="avatar-placeholder" class="avatar-placeholder">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-gold rounded-xl flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform">
                            <i class="fas fa-camera text-[#004d98] text-sm"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-black italic uppercase text-slate-800 tracking-widest" id="display-full-name">CARGANDO...</h3>
                    <p class="text-[0.6rem] text-gold font-bold uppercase tracking-[0.3em] italic mt-1" id="display-username">@IDENTIDAD</p>
                </div>

                <div class="p-10">
                    <div id="alert-container" class="mb-8 hidden animate-fade-in"></div>

                    <form id="profile-form" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="premium-form-group">
                                <label class="premium-label">Nombre Completo</label>
                                <div class="relative group">
                                    <i class="fas fa-signature absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                    <input type="text" id="full_name" name="full_name" required placeholder="EJ: LIONEL MESSI" 
                                        class="premium-input pl-14 font-bold uppercase text-[0.8rem]">
                                </div>
                            </div>
                            <div class="premium-form-group">
                                <label class="premium-label">Nombre de Usuario</label>
                                <div class="relative group">
                                    <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                    <input type="text" id="username" name="username" required placeholder="EJ: LIO_MESSI" 
                                        class="premium-input pl-14 font-black uppercase tracking-widest text-[0.8rem]">
                                </div>
                            </div>
                        </div>

                        <div class="premium-form-group">
                            <label class="premium-label">Biografía Profesional</label>
                            <div class="relative group">
                                <i class="fas fa-quote-left absolute left-5 top-6 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                <textarea id="bio" name="bio" rows="3" placeholder="DESCRIBE TU ROL EN EL CLUB..." 
                                    class="premium-input pl-14 pt-5 resize-none min-h-[120px] text-[0.8rem]"></textarea>
                            </div>
                        </div>

                        <div class="premium-form-group">
                            <label class="premium-label">URL de Imagen de Perfil</label>
                            <div class="relative group">
                                <i class="fas fa-link absolute left-5 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                                <input type="url" id="avatar_url" name="avatar_url" placeholder="HTTPS://EJEMPLO.COM/FOTO.JPG" 
                                    class="premium-input pl-14 font-medium text-[0.7rem] lowercase tracking-normal">
                            </div>
                            <p class="mt-2 text-[0.55rem] font-bold text-slate-300 uppercase tracking-widest italic pl-2">
                                * Pegue el enlace directo a su imagen para actualizar el avatar.
                            </p>
                        </div>

                        <div class="pt-6">
                            <button type="submit" id="submit-button" class="w-full py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase tracking-[0.2em] text-[0.85rem] shadow-xl shadow-gold/10 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4">
                                <span class="button-text">Guardar Cambios</span>
                                <i class="fas fa-check-circle" id="btn-icon"></i>
                                <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="mt-10 text-center text-[0.6rem] font-bold text-slate-300 uppercase tracking-[0.4em] italic">
                DIBA FBC © 2025 — PERFIL DE SEGURIDAD NIVEL 1
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        const profileForm = document.getElementById('profile-form');
        const alertContainer = document.getElementById('alert-container');
        const submitButton = document.getElementById('submit-button');
        const spinner = document.getElementById('spinner');
        const btnIcon = document.getElementById('btn-icon');
        const btnText = submitButton.querySelector('.button-text');
        const avatarUrlInput = document.getElementById('avatar_url');
        const avatarImg = document.getElementById('avatar-preview-img');
        const placeholder = document.getElementById('avatar-placeholder');

        const showAlert = (message, type = 'danger') => {
            const isSuccess = type === 'success';
            alertContainer.className = `p-5 mb-8 rounded-2xl flex items-center gap-4 text-[0.7rem] font-black uppercase tracking-widest border ${isSuccess ? 'bg-green-500/10 border-green-500/20 text-green-500' : 'bg-red-500/10 border-red-500/20 text-red-500'} animate-fade-in`;
            alertContainer.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            alertContainer.classList.remove('hidden');
        };

        const updateAvatar = (url) => {
            if (url && url.trim() !== '') {
                avatarImg.src = url;
                avatarImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
                avatarImg.onerror = () => {
                    avatarImg.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                };
            } else {
                avatarImg.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        };

        async function loadProfile(userId) {
            try {
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('full_name, username, bio, avatar_url')
                    .eq('id', userId)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;

                if (profile) {
                    document.getElementById('full_name').value = profile.full_name || '';
                    document.getElementById('username').value = profile.username || '';
                    document.getElementById('bio').value = profile.bio || '';
                    avatarUrlInput.value = profile.avatar_url || '';
                    
                    document.getElementById('display-full-name').textContent = profile.full_name?.toUpperCase() || 'MI PERFIL';
                    document.getElementById('display-username').textContent = `@${profile.username?.toUpperCase() || 'USUARIO'}`;
                    
                    updateAvatar(profile.avatar_url);
                }
            } catch (err) {
                console.error('Error load profile:', err);
                showAlert('ERROR AL CONECTAR CON EL SERVIDOR DE PERFILES.');
            }
        }

        async function init() {
            try {
                const session = await requireAdmin();
                if (session) {
                    await initAdminLayout();
                    await loadProfile(session.user.id);
                }
            } catch (error) {
                console.error(error);
            }
        }
        init();

        avatarUrlInput.addEventListener('input', (e) => updateAvatar(e.target.value));

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertContainer.classList.add('hidden');
            submitButton.disabled = true;
            spinner.classList.remove('hidden');
            btnIcon.classList.add('hidden');
            btnText.textContent = 'GUARDANDO...';

            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) throw new Error('SESIÓN EXPIRADA.');

                const profileData = {
                    id: user.id,
                    full_name: document.getElementById('full_name').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    bio: document.getElementById('bio').value.trim(),
                    avatar_url: avatarUrlInput.value.trim(),
                    updated_at: new Date().toISOString(),
                };

                const { error } = await supabase.from('profiles').upsert(profileData, { onConflict: 'id' });
                if (error) throw error;

                showAlert('¡PERFIL ACTUALIZADO CON ÉXITO!', 'success');
                loadProfile(user.id);

            } catch (err) {
                console.error('Save error:', err);
                showAlert(`ERROR: ${err.message.toUpperCase()}`);
            } finally {
                submitButton.disabled = false;
                spinner.classList.add('hidden');
                btnIcon.classList.remove('hidden');
                btnText.textContent = 'GUARDAR CAMBIOS';
            }
        });
    </script>
</body>

</html>
