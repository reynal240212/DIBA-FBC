<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white pb-20">
        <div class="p-6 lg:p-10 space-y-8 max-w-2xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col items-center text-center gap-4 animate-fade-up">
                <div class="relative group">
                    <div class="w-24 h-24 bg-diba-blue rounded-[2.5rem] flex items-center justify-center text-diba-gold shadow-xl group-hover:scale-110 transition-all border-4 border-white overflow-hidden" id="avatar-container">
                        <span class="text-3xl font-black italic uppercase" id="sb-avatar">?</span>
                        <img id="avatar-preview-img" class="absolute inset-0 w-full h-full object-cover hidden" src="" alt="Avatar">
                    </div>
                </div>
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Mi <span class="text-diba-red">Perfil</span></h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Configuración de Cuenta · DIBA FBC Admin</p>
                </div>
            </div>

            <!-- Profile Form Card -->
            <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium p-8 md:p-12 animate-fade-up" style="animation-delay: 0.1s">
                <form id="profile-form" class="space-y-8">
                    <div id="alert-container" class="hidden"></div>

                    <!-- Full Name -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Nombre Oficial</label>
                        <div class="relative group">
                            <i class="fas fa-id-card absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                            <input type="text" id="full_name" name="full_name" required placeholder="Tu nombre real" 
                                   class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all uppercase italic">
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Nombre de Usuario (@)</label>
                        <div class="relative group">
                            <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                            <input type="text" id="username" name="username" required placeholder="usuario_diba" 
                                   class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all lowercase italic">
                        </div>
                    </div>

                    <!-- Bio -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Biografía Breve</label>
                        <textarea id="bio" name="bio" rows="3" placeholder="Tu rol o especialidad en el club..." 
                                  class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all italic resize-none"></textarea>
                    </div>

                    <!-- Avatar URL -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">URL Fotografía</label>
                        <div class="relative group">
                            <i class="fas fa-link absolute left-5 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                            <input type="url" id="avatar_url" name="avatar_url" placeholder="https://..." 
                                   class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-diba-blue text-sm font-bold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all">
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-col sm:flex-row items-center gap-4 pt-4">
                        <a href="dashboard.html" class="w-full sm:flex-1 text-center py-4 bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-slate-100 hover:bg-slate-100 hover:text-diba-blue transition-all italic">
                             Regresar
                        </a>
                        <button type="submit" id="submit-button" class="w-full sm:flex-[2] py-4 bg-diba-blue text-diba-gold text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-blue-900/20 italic">
                            <i class="fas fa-save mr-2"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>

            <!-- Change Password Note -->
            <div class="p-8 bg-slate-50 border border-slate-100 rounded-[2rem] text-center animate-fade-up" style="animation-delay: 0.2s">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">¿Necesitas cambiar tu clave?</p>
                <a href="update-password.html" class="inline-flex items-center gap-2 text-diba-blue text-[11px] font-black uppercase italic hover:text-diba-red transition-colors">
                    Actualizar Contraseña Seguridad <i class="fas fa-key"></i>
                </a>
            </div>

        </div>
    </main>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';

        const profileForm = document.getElementById('profile-form');
        const alertContainer = document.getElementById('alert-container');
        const submitButton = document.getElementById('submit-button');
        const avatarUrlInput = document.getElementById('avatar_url');
        const avatarPreviewImg = document.getElementById('avatar-preview-img');
        const avatarPlaceholder = document.getElementById('sb-avatar');

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            
            const user = session.user;
            if (user) {
                avatarPlaceholder.textContent = user.email[0].toUpperCase();
                loadProfile(user.id);
            }
        }
        init();

        function showAlert(message, type = 'success') {
            alertContainer.className = `p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg mb-8 ${
                type === 'success' 
                ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' 
                : 'bg-rose-50 text-rose-600 border border-rose-100'
            }`;
            alertContainer.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} mr-2 text-lg"></i> ${message}`;
            alertContainer.classList.remove('hidden');
            setTimeout(() => alertContainer.classList.add('hidden'), 5000);
        }

        function updateAvatarPreview(url) {
            if (url && url.trim() !== '') {
                avatarPreviewImg.src = url;
                avatarPreviewImg.classList.remove('hidden');
                avatarPlaceholder.classList.add('hidden');
                avatarPreviewImg.onerror = () => {
                    avatarPreviewImg.classList.add('hidden');
                    avatarPlaceholder.classList.remove('hidden');
                };
            } else {
                avatarPreviewImg.classList.add('hidden');
                avatarPlaceholder.classList.remove('hidden');
            }
        }

        async function loadProfile(userId) {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('full_name, username, bio, avatar_url')
                    .eq('id', userId)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;

                if (data) {
                    document.getElementById('full_name').value = data.full_name || '';
                    document.getElementById('username').value = data.username || '';
                    document.getElementById('bio').value = data.bio || '';
                    avatarUrlInput.value = data.avatar_url || '';
                    updateAvatarPreview(data.avatar_url);
                }
            } catch (error) {
                console.error(error);
            }
        }

        avatarUrlInput.addEventListener('input', () => updateAvatarPreview(avatarUrlInput.value));

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Procesando...';

            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) throw new Error('Sesión expirada');

                const { error } = await supabase
                    .from('profiles')
                    .upsert({
                        id: user.id,
                        full_name: document.getElementById('full_name').value,
                        username: document.getElementById('username').value,
                        bio: document.getElementById('bio').value,
                        avatar_url: avatarUrlInput.value,
                        updated_at: new Date().toISOString(),
                    });

                if (error) throw error;
                showAlert('¡Perfil actualizado correctamente!');
            } catch (error) {
                showAlert(error.message, 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = '<i class="fas fa-save mr-2"></i> Guardar Cambios';
            }
        });
    </script>
</body>

</html>
