<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario — DIBA FBC Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/styles/admin-common.css">
  <style>
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: var(--dark3);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .avatar-huge {
      width: 120px;
      height: 120px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      color: var(--blue);
      margin-bottom: 1.5rem;
      border: 4px solid var(--dark2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background-size: cover;
      background-position: center;
    }

    .profile-form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2rem;
    }
  </style>
</head>

<body style="display:none;" id="admin-body">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/images/ESCUDO.png" alt="DIBA FBC">
      <div>
        <div class="sidebar-logo-text">DIBA FBC</div>
        <div class="sidebar-logo-sub">Panel de Control</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>

      <div class="nav-section-label">Equipo</div>
      <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Planilla</a>
      <a href="listaJugadores.html" class="nav-link"><i class="fas fa-users"></i> Jugadores</a>
      <a href="partidos.html" class="nav-link"><i class="fas fa-futbol"></i> Partidos</a>
      <a href="../analisis.html" class="nav-link"><i class="fas fa-chart-line"></i> Análisis</a>

      <div class="nav-section-label">Administración</div>
      <a href="GestorDocumental.html" class="nav-link"><i class="fas fa-folder-open"></i> Gestor Documental</a>
      <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a>
      <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus"></i> Crear Usuario</a>
      <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Rifas</a>

      <div class="nav-section-label">Sitio Web</div>
      <a href="../index.html" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sb-avatar">A</div>
        <div>
          <div class="user-name" id="sb-name">Administrador</div>
          <div class="user-role" id="sb-role">Admin</div>
        </div>
      </div>
      <button class="btn-logout" id="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="mobile-menu-btn" id="menu-btn">
        <i class="fas fa-bars" id="menu-icon"></i>
      </button>
      <div>
        <div class="page-title">Mi <span>Perfil</span></div>
        <div class="page-subtitle">Información de usuario y ajustes — DIBA FBC</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-time" id="clock">--:--</div>
      </div>
    </header>

    <!-- Content -->
    <div class="content">
      <div class="panel animate-fade-up" style="max-width:600px; margin:0 auto; overflow:hidden">
        <div class="profile-header">
          <div class="avatar-huge" id="avatar-preview">U</div>
          <h2 class="page-title" style="font-size:1.1rem">Tu <span>Identidad</span></h2>
          <p class="page-subtitle">Personaliza cómo te ven los demás</p>
        </div>

        <div class="panel-body">
          <div id="form-alert" class="panel"
            style="display:none; margin-bottom:1.5rem; padding:1rem; font-size:.8rem; font-weight:700"></div>

          <form id="profile-form" class="profile-form-grid">
            <div>
              <label class="page-subtitle" style="text-transform:uppercase; margin-bottom:.5rem; display:block">Nombre
                Completo</label>
              <input type="text" id="full_name" class="form-control" placeholder="Ej: Lionel Messi" required>
            </div>

            <div>
              <label class="page-subtitle" style="text-transform:uppercase; margin-bottom:.5rem; display:block">Nombre
                de Usuario</label>
              <input type="text" id="username" class="form-control" placeholder="Ej: lio_messi" required>
            </div>

            <div>
              <label class="page-subtitle"
                style="text-transform:uppercase; margin-bottom:.5rem; display:block">Biografía</label>
              <textarea id="bio" class="form-control" rows="3" placeholder="Cuéntanos algo sobre ti..."></textarea>
            </div>

            <div>
              <label class="page-subtitle" style="text-transform:uppercase; margin-bottom:.5rem; display:block">URL de
                tu foto (Avatar)</label>
              <input type="url" id="avatar_url" class="form-control" placeholder="https://ejemplo.com/foto.jpg">
            </div>

            <div style="display:flex; justify-content:center; margin-top:1rem">
              <button type="submit" id="submit-btn" class="btn btn-primary" style="padding:1rem 3rem; font-size:.8rem">
                <i class="fas fa-save"></i> GUARDAR PERFIL
              </button>
            </div>
          </form>
        </div>
      </div>
    </div><!-- /content -->
  </div><!-- /main -->

  <script src="/scripts/config.js"></script>
  <script type="module">
    import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
    import { setupAdminUI } from '../scripts/admin-ui.js';

    const form = document.getElementById('profile-form');
    const alertBox = document.getElementById('form-alert');
    const submitBtn = document.getElementById('submit-btn');
    const avatarUrl = document.getElementById('avatar_url');
    const avatarPreview = document.getElementById('avatar-preview');

    requireAdmin().then(session => {
      if (session) {
        document.getElementById('admin-body').style.display = 'flex';
        setupAdminUI();
        loadProfile(session.user.id);
      }
    });

    async function loadProfile(userId) {
      try {
        const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if (error && error.code !== 'PGRST116') throw error;
        if (data) {
          document.getElementById('full_name').value = data.full_name || '';
          document.getElementById('username').value = data.username || '';
          document.getElementById('bio').value = data.bio || '';
          avatarUrl.value = data.avatar_url || '';
          updatePreview(data.avatar_url);
        }
      } catch (err) {
        console.error(err);
        showAlert("Error al cargar perfil: " + err.message);
      }
    }

    function updatePreview(url) {
      if (url) {
        avatarPreview.style.backgroundImage = `url(${url})`;
        avatarPreview.textContent = '';
      } else {
        avatarPreview.style.backgroundImage = 'none';
        avatarPreview.textContent = 'U';
      }
    }

    avatarUrl.addEventListener('input', (e) => updatePreview(e.target.value));

    function showAlert(msg, isSuccess = false) {
      alertBox.style.display = 'block';
      alertBox.style.borderColor = isSuccess ? '#4ade80' : '#fb7185';
      alertBox.style.color = isSuccess ? '#4ade80' : '#fb7185';
      alertBox.style.background = isSuccess ? 'rgba(34,197,94,.05)' : 'rgba(244,63,94,.05)';
      alertBox.innerHTML = `<i class="fas fa-${isSuccess ? 'check-circle' : 'exclamation-triangle'}"></i> ${msg}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';

      try {
        const { data: { user } } = await supabase.auth.getUser();
        const update = {
          id: user.id,
          full_name: document.getElementById('full_name').value,
          username: document.getElementById('username').value,
          bio: document.getElementById('bio').value,
          avatar_url: avatarUrl.value,
          updated_at: new Date().toISOString()
        };

        const { error } = await supabase.from('profiles').upsert(update);
        if (error) throw error;

        showAlert("¡Perfil actualizado con éxito!", true);

        // Update local info for setupAdminUI components
        const localUser = JSON.parse(localStorage.getItem('usuario') || '{}');
        localUser.username = update.username;
        localUser.full_name = update.full_name;
        localStorage.setItem('usuario', JSON.stringify(localUser));

        // Re-run setup to refresh sidebar
        setupAdminUI();

      } catch (err) {
        showAlert("Error: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> GUARDAR PERFIL';
      }
    });
  </script>
</body>

</html>
