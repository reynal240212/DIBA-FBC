<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Crear Perfil - DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ── Dashboard Base Styles ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #002a40;
      --blue2: #003d5c;
      --gold: #ffcc00;
      --gold2: #e6b800;
      --dark: #0a0e14;
      --dark2: #111823;
      --dark3: #1a2332;
      --slate: #8b9ab0;
      --text: #e2e8f0;
      --border: rgba(255, 255, 255, 0.07);
      --sidebar-w: 270px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--dark2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .sidebar-logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .sidebar-logo-text {
      font-size: 1.05rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--gold);
    }

    .sidebar-logo-sub {
      font-size: .55rem;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-weight: 700;
      margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .35rem;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: .55rem;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--slate);
      padding: .8rem .6rem .4rem;
      margin-top: .5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: .78rem;
      font-weight: 700;
      color: var(--slate);
      transition: all .2s ease;
      position: relative;
    }

    .nav-link i {
      width: 18px;
      text-align: center;
      font-size: .85rem;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, .05);
      color: var(--text);
    }

    .nav-link.active {
      background: rgba(255, 204, 0, .1);
      color: var(--gold);
    }

    .sidebar-footer {
      padding: 1.2rem 1rem;
      border-top: 1px solid var(--border);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      margin-bottom: .6rem;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: .8rem;
    }

    .user-name {
      font-size: .75rem;
      font-weight: 800;
      color: var(--text);
    }

    .user-role {
      font-size: .6rem;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .btn-logout {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .7rem;
      border-radius: 12px;
      border: none;
      background: rgba(239, 68, 68, .1);
      color: #ef4444;
      font-family: 'Montserrat', sans-serif;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-logout:hover {
      background: #ef4444;
      color: #fff;
    }

    /* ── MAIN & TOPBAR ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--dark2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .page-title span {
      color: var(--gold);
    }

    .page-subtitle {
      font-size: .7rem;
      color: var(--slate);
      font-weight: 600;
      margin-top: 2px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .topbar-time {
      font-size: .72rem;
      font-weight: 700;
      color: var(--slate);
      background: var(--dark3);
      padding: .45rem .9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .mobile-menu-btn {
      display: none;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--gold);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .content {
      padding: 2rem;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Profile Card Specific ── */
    .profile-card {
      max-width: 500px;
      width: 100%;
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      position: relative;
    }

    .avatar-preview-wrapper {
      text-align: center;
      margin-bottom: 2rem;
    }

    .avatar-preview {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--gold);
      background: var(--dark3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--slate);
      margin: 0 auto;
      box-shadow: 0 8px 25px rgba(255, 204, 0, 0.2);
    }

    .form-label {
      font-size: .7rem;
      font-weight: 800;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .6rem;
      display: block;
    }

    .form-control {
      background: var(--dark3);
      border: 1px solid var(--border);
      color: #fff;
      padding: .8rem 1.2rem;
      border-radius: 14px;
      font-size: .85rem;
      font-weight: 600;
      transition: all .2s;
      width: 100%;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.1);
    }

    .btn-submit {
      background: var(--gold);
      color: var(--blue);
      border: none;
      padding: 1rem;
      border-radius: 16px;
      font-size: .85rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      width: 100%;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 204, 0, 0.3);
    }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .profile-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>

<body style="display: none;" id="admin-body">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/images/ESCUDO.png" alt="DIBA FBC">
      <div>
        <div class="sidebar-logo-text">DIBA FBC</div>
        <div class="sidebar-logo-sub">Panel de Control</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>

      <div class="nav-section-label">Equipo</div>
      <a href="planilla.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Planilla</a>
      <a href="../ficha.html" class="nav-link"><i class="fas fa-users"></i> Jugadores</a>
      <a href="../partidos.html" class="nav-link"><i class="fas fa-futbol"></i> Partidos</a>
      <a href="../analisis.html" class="nav-link"><i class="fas fa-chart-line"></i> Análisis</a>
            <a href="convocatorias.html" class="nav-link"><i class="fas fa-bullhorn"></i> Convocatorias</a>

      <div class="nav-section-label">Administración</div>
      <a href="GestorDocumental.html" class="nav-link"><i class="fas fa-folder-open"></i> Gestor Documental</a>
      <a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a>
      <a href="crear-usuario.html" class="nav-link"><i class="fas fa-user-plus"></i> Crear Usuario</a>
      <a href="rifa_diba.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Rifas</a>

      <div class="nav-section-label">Sitio Web</div>
      <a href="../index.html" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sb-avatar">A</div>
        <div>
          <div class="user-name" id="sb-name">Administrador</div>
          <div class="user-role" id="sb-role">Admin</div>
        </div>
      </div>
      <button class="btn-logout" id="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
      </button>
    </div>
  </aside>

  <div class="main">
    <!-- Top Bar -->
    <header class="topbar">
      <button class="mobile-menu-btn" id="menu-btn">
        <i class="fas fa-bars" id="menu-icon"></i>
      </button>
      <div>
        <div class="page-title">Perfil de <span>Usuario</span></div>
        <div class="page-subtitle">Gestiona tu información personal — DIBA FBC</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-time" id="clock">--:--</div>
      </div>
    </header>

    <div class="content">
      <div class="profile-card shadow-2xl">
        <!-- Avatar Preview -->
        <div class="avatar-preview-wrapper">
          <img id="avatar-preview-img" class="avatar-preview" src="" alt="">
        </div>

        <h2 class="text-xl font-black text-center mb-8 uppercase italic tracking-tight">Completa tu <span
            class="text-gold">Perfil</span></h2>

        <div id="alert-container"></div>

        <form id="profile-form" class="space-y-5">
          <div>
            <label for="full_name" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Ej: Lionel Messi"
              required />
          </div>
          <div>
            <label for="username" class="form-label">Nombre de Usuario</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Ej: lio_messi"
              required />
          </div>
          <div>
            <label for="bio" class="form-label">Biografía</label>
            <textarea class="form-control" id="bio" name="bio" rows="3"
              placeholder="Cuéntanos algo sobre ti..."></textarea>
          </div>
          <div>
            <label for="avatar_url" class="form-label">URL de tu foto (opcional)</label>
            <input type="url" class="form-control" id="avatar_url" name="avatar_url"
              placeholder="https://ejemplo.com/tu-foto.jpg" />
          </div>
          <button type="submit" id="submit-button" class="btn-submit">
            <span class="button-text">Guardar Perfil</span>
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Supabase JS (versión 2.x) -->
  <script type="module">
    import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
    // Protection & Unified UI
    requireAdmin().then(session => {
      if (session) {
        document.getElementById('admin-body').style.display = 'flex';
        const user = session.user;
        if (user) {
          document.getElementById('sb-name').textContent = user.email.split('@')[0];
          document.getElementById('sb-avatar').textContent = user.email[0].toUpperCase();
        }
        loadProfile(user.id);
      }
    });

    // Clock
    const clockEl = document.getElementById('clock');
    function updateClock() {
      const now = new Date();
      if (clockEl) clockEl.textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Mobile Menu
    const menuBtn = document.getElementById('menu-btn');
    const menuIcon = document.getElementById('menu-icon');
    const sidebar = document.getElementById('sidebar');
    menuBtn?.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      if (menuIcon) menuIcon.className = sidebar.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
    });

    // Logout
    document.getElementById('logout-btn')?.addEventListener('click', async () => {
      if (confirm('¿Cerrar sesión?')) {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      }
    });

    // --- 2. FUNCIONES AUXILIARES ---

    function showAlert(message, type = 'danger') {
      const alertHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="background: ${type === 'success' ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; color: ${type === 'success' ? '#22c55e' : '#ef4444'}; border: 1px solid currentColor; border-radius: 12px; font-size: .8rem; font-weight: 700;">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="filter: invert(1);"></button>
        </div>
      `;
      alertContainer.innerHTML = alertHTML;
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitButton.disabled = true;
        profileForm.setAttribute('aria-busy', 'true');
        buttonText.textContent = 'Guardando...';
        buttonSpinner.classList.remove('d-none');
      } else {
        submitButton.disabled = false;
        profileForm.setAttribute('aria-busy', 'false');
        buttonText.textContent = 'Guardar Perfil';
        buttonSpinner.classList.add('d-none');
      }
    }

    function updateAvatarPreview(url) {
      if (url && url.trim() !== '') {
        avatarPreviewImg.src = url;
        avatarPreviewImg.innerHTML = '';
        avatarPreviewImg.onerror = () => {
          avatarPreviewImg.src = '';
          avatarPreviewImg.innerHTML = placeholderIcon;
        };
      } else {
        avatarPreviewImg.src = '';
        avatarPreviewImg.innerHTML = placeholderIcon;
      }
    }

    async function loadProfile(userId) {
      try {
        const { data: profileData, error } = await supabaseClient
          .from('profiles')
          .select('full_name, username, bio, avatar_url')
          .eq('id', userId)
          .single();

        if (error && error.code !== 'PGRST116') throw error;

        if (profileData) {
          document.getElementById('full_name').value = profileData.full_name || '';
          document.getElementById('username').value = profileData.username || '';
          document.getElementById('bio').value = profileData.bio || '';
          avatarUrlInput.value = profileData.avatar_url || '';
          updateAvatarPreview(profileData.avatar_url);
        } else {
          updateAvatarPreview('');
        }
      } catch (error) {
        console.error('Error al cargar el perfil:', error);
        showAlert('No se pudo cargar tu perfil. Inténtalo de nuevo más tarde.', 'warning');
      }
    }

    avatarUrlInput.addEventListener('input', () => updateAvatarPreview(avatarUrlInput.value));

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertContainer.innerHTML = '';
      setLoading(true);

      try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) throw new Error('Usuario no autenticado.');

        const profileUpdate = {
          id: user.id,
          full_name: document.getElementById('full_name').value,
          username: document.getElementById('username').value,
          bio: document.getElementById('bio').value,
          avatar_url: avatarUrlInput.value,
          updated_at: new Date().toISOString(),
        };

        const { error } = await supabaseClient
          .from('profiles')
          .upsert(profileUpdate, { onConflict: 'id' });

        if (error) throw error;

        showAlert('¡Perfil guardado con éxito!', 'success');
      } catch (error) {
        console.error('Error al guardar el perfil:', error);
        showAlert(`Error al guardar: ${error.message || 'Ocurrió un problema.'}`);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
