<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - DIBA FBC Admin</title>
    
    <!-- Core & Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
</head>
<body class="bg-slate-50 font-['Montserrat']">
    <!-- Loader Logic (Same as others) -->
    <div id="app-loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-white">
        <div class="relative flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-slate-100 border-t-[#003366] rounded-full animate-spin"></div>
            <img src="../images/ESCUDO.png" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 opacity-50" alt="Logo">
        </div>
    </div>

    <div id="admin-body" class="hidden min-h-screen">
        <main class="lg:ml-72 min-h-screen transition-all duration-300">
            <div class="p-4 lg:p-8 max-w-4xl mx-auto">
                
                <!-- Main Profile Card -->
                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-premium overflow-hidden animate-fade-up">
                    <div class="relative h-32 bg-[#003366]">
                        <div class="absolute inset-0 opacity-10" style="background-image: url('data:image/svg+xml,%3Csvg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cg fill=\"%23FFD700\" fill-opacity=\"0.4\" fill-rule=\"evenodd\"%3E%3Ccircle cx=\"3\" cy=\"3\" r=\"3\"/%3E%3Ccircle cx=\"13\" cy=\"13\" r=\"3\"/%3E%3C/g%3E%3C/svg%3E');"></div>
                    </div>

                    <div class="px-8 pb-8">
                        <div class="relative -mt-16 mb-8 text-center">
                            <div class="inline-block relative">
                                <img id="avatar-preview-img" src="../images/ESCUDO.png" class="w-32 h-32 rounded-3xl object-cover border-4 border-white shadow-xl bg-white" alt="Avatar">
                                <div class="absolute -bottom-2 -right-2 bg-[#FFD700] text-[#003366] w-10 h-10 rounded-xl flex items-center justify-center shadow-lg border-2 border-white">
                                    <i class="fas fa-camera text-sm"></i>
                                </div>
                            </div>
                            <h2 id="display-name" class="mt-4 text-xl font-black uppercase italic text-[#003366]">Cargando...</h2>
                            <p id="display-role" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Administrador</p>
                        </div>

                        <form id="profile-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre Completo</label>
                                    <input type="text" id="full_name" name="full_name" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm" placeholder="Tu nombre real" required>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nombre de Usuario</label>
                                    <input type="text" id="username" name="username" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm" placeholder="@usuario" required>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Biografía Profunda</label>
                                <textarea id="bio" name="bio" rows="3" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm resize-none" placeholder="Escribe algo sobre ti..."></textarea>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Avatar URL</label>
                                <div class="relative">
                                    <input type="url" id="avatar_url" name="avatar_url" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm" placeholder="https://tu-foto.jpg">
                                    <i class="fas fa-link absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                </div>
                            </div>

                            <div class="pt-6 flex flex-col md:flex-row gap-4">
                                <button type="submit" id="submit-button" class="flex-1 bg-[#003366] text-white rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:bg-[#002244] transition-all flex items-center justify-center gap-3 group shadow-lg shadow-[#003366]/20">
                                    <i class="fas fa-save group-hover:scale-110 transition-transform text-[#FFD700]"></i>
                                    <span id="button-text">Guardar Cambios</span>
                                    <div id="button-spinner" class="hidden w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                                </button>
                                <a href="update-password.html" class="bg-white border border-slate-100 text-[#003366] rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:bg-slate-50 transition-all flex items-center justify-center gap-3 shadow-sm">
                                    <i class="fas fa-key text-[#FFD700]"></i>
                                    Cambiar Contraseña
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Segurity Tips -->
                <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-up" style="animation-delay: 100ms;">
                    <div class="bg-amber-50 border border-amber-100 rounded-3xl p-6 flex items-start gap-4">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#FFD700] shadow-sm shrink-0">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <div>
                            <h4 class="text-[10px] font-black uppercase italic text-[#003366] mb-1">Privacidad Extrema</h4>
                            <p class="text-[10px] font-bold text-amber-900/60 leading-relaxed uppercase tracking-widest">Tus datos están protegidos con encriptación de grado militar en Supabase.</p>
                        </div>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-100 rounded-3xl p-6 flex items-start gap-4">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-emerald-500 shadow-sm shrink-0">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div>
                            <h4 class="text-[10px] font-black uppercase italic text-[#003366] mb-1">Avatar Personalizado</h4>
                            <p class="text-[10px] font-bold text-emerald-900/60 leading-relaxed uppercase tracking-widest">Usa una URL directa de imagen para personalizar tu presencia en el panel.</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="fixed bottom-8 right-8 z-[10000]">
        <div id="appToast" class="toast hide bg-white border-0 shadow-premium rounded-2xl overflow-hidden" role="alert">
            <div class="toast-body p-4 flex items-center gap-4">
                <i class="fas fa-info-circle text-[#003366] text-xl"></i>
                <span class="text-[10px] font-black uppercase italic text-[#003366] tracking-widest"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { supabase, requireAdmin } from '../scripts/supabaseClient.js';
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';

        const toastElement = document.getElementById('appToast');
        const bsToast = new bootstrap.Toast(toastElement);
        const avatarUrlInput = document.getElementById('avatar_url');
        const avatarPreviewImg = document.getElementById('avatar-preview-img');
        const profileForm = document.getElementById('profile-form');

        function showToast(message, isError = false) {
            const icon = toastElement.querySelector('i');
            const text = toastElement.querySelector('span');
            text.textContent = message;
            icon.className = isError ? 'fas fa-exclamation-circle text-rose-500 text-xl' : 'fas fa-check-circle text-emerald-500 text-xl';
            bsToast.show();
        }

        async function init() {
            try {
                const session = await requireAdmin();
                if (!session) return;

                const user = session.user;
                // Cargar perfil primero para el layout
                const { data: profile } = await supabase
                    .from('users')
                    .select('full_name, username, role, bio, avatar_url')
                    .eq('id', user.id)
                    .single();

                const safeProfile = profile || { 
                    username: user.email.split('@')[0], 
                    role: 'Administrador',
                    full_name: user.email.split('@')[0]
                };

                initAdminLayout({
                    username: safeProfile.username,
                    role: safeProfile.role,
                    avatarText: safeProfile.username[0].toUpperCase()
                });

                // Poblar formulario
                document.getElementById('full_name').value = safeProfile.full_name || '';
                document.getElementById('username').value = safeProfile.username || '';
                document.getElementById('bio').value = safeProfile.bio || '';
                avatarUrlInput.value = safeProfile.avatar_url || '';
                
                document.getElementById('display-name').textContent = safeProfile.full_name || safeProfile.username;
                document.getElementById('display-role').textContent = safeProfile.role;

                if (safeProfile.avatar_url) {
                    avatarPreviewImg.src = safeProfile.avatar_url;
                }

                document.getElementById('app-loader').classList.add('hidden');
                document.getElementById('admin-body').classList.remove('hidden');

            } catch (error) {
                console.error("Init profile error:", error);
            }
        }

        avatarUrlInput.addEventListener('input', () => {
            const url = avatarUrlInput.value;
            if (url) avatarPreviewImg.src = url;
            else avatarPreviewImg.src = '../images/ESCUDO.png';
        });

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-button');
            const spinner = document.getElementById('button-spinner');
            const text = document.getElementById('button-text');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.classList.add('opacity-50');

            try {
                const { data: { user } } = await supabase.auth.getUser();
                const updates = {
                    id: user.id,
                    full_name: document.getElementById('full_name').value,
                    username: document.getElementById('username').value,
                    bio: document.getElementById('bio').value,
                    avatar_url: avatarUrlInput.value,
                    updated_at: new Date().toISOString(),
                };

                const { error } = await supabase.from('users').upsert(updates);
                if (error) throw error;

                showToast('Perfil actualizado con éxito');
                document.getElementById('display-name').textContent = updates.full_name;
                
                // Actualizar sidebar si es necesario
                const sbName = document.getElementById('sb-name');
                if (sbName) sbName.textContent = updates.username;

            } catch (error) {
                showToast(error.message || 'Error al guardar perfil', true);
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.classList.remove('opacity-50');
            }
        });

        init();
    </script>
</body>
</html>ript>
</body>

</html>
