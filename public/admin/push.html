<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notificaciones Push — Admin DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Montserrat', 'sans-serif'] },
          colors: {
            dibaGold: 'var(--gold)',
            dibaBlue: 'var(--blue)',
            dibaDark: 'var(--bg-main)',
            dibaText: 'var(--text-main)',
            dibaMuted: 'var(--text-muted)'
          }
        },
      },
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="/styles/admin-common.css">
  <script src="/scripts/theme-switcher.js"></script>
</head>
<body class="bg-white font-['Inter']">

  <div id="admin-nav"></div>

    <div class="content">
      <div class="max-w-4xl mx-auto">
        
        <div class="panel animate-fade-up">
          <div class="panel-header">
            <h2 class="panel-title"><i class="fas fa-paper-plane"></i> Redactar Notificación</h2>
            <span class="panel-badge">Oficial</span>
          </div>
          <div class="panel-body">
            <form id="push-form" class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Título -->
                <div class="space-y-2">
                  <label class="form-label">Título del Mensaje</label>
                  <input type="text" id="push-title" required placeholder="Ej: ¡Nuevo Partido Programado!" 
                         class="form-control w-full">
                </div>
                <!-- Categoría Target -->
                <div class="space-y-2">
                  <label class="form-label">Dirigido a:</label>
                  <select id="push-target" class="form-select w-full">
                    <option value="all">Todos los Suscriptores</option>
                    <option value="2012">Categoría 2012</option>
                    <option value="2013">Categoría 2013</option>
                    <option value="2014/2015/2016">Categoría 2014/15/16</option>
                  </select>
                </div>
              </div>

              <!-- Cuerpo -->
              <div class="space-y-2">
                <label class="form-label">Contenido de la Notificación</label>
                <textarea id="push-body" rows="4" required placeholder="Escribe el cuerpo del mensaje aquí..." 
                          class="form-control w-full resize-none"></textarea>
              </div>

              <!-- URL de Destino -->
              <div class="space-y-2">
                <label class="form-label">URL de Redirección (Opcional)</label>
                <div class="relative group">
                  <span class="absolute inset-y-0 left-4 flex items-center text-slate">
                    <i class="fas fa-link text-xs"></i>
                  </span>
                  <input type="text" id="push-url" placeholder="Ej: /partidos.html" 
                         class="form-control w-full pl-10">
                </div>
                <p class="text-[10px] text-dibaMuted italic">Cuando el usuario haga clic, será llevado a esta página.</p>
              </div>

              <div id="status-container" class="hidden"></div>

              <div class="flex justify-end pt-4">
                <button type="submit" id="send-btn" class="btn btn-primary px-10 py-4 text-xs tracking-[0.2em]">
                  <i class="fas fa-bolt"></i> <span id="btn-text">Lanzar Notificación</span>
                  <i class="fas fa-circle-notch fa-spin hidden" id="btn-loader"></i>
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Preview Section -->
        <div class="panel animate-fade-up" style="animation-delay: 0.1s;">
          <div class="panel-header">
            <h2 class="panel-title"><i class="fas fa-mobile-alt"></i> Vista Previa (Simulada)</h2>
          </div>
          <div class="panel-body flex justify-center py-10">
            <div class="w-72 bg-[#1c1c1e] rounded-[40px] p-4 shadow-2xl border border-white/10">
               <div class="flex justify-between items-center mb-4 px-2">
                  <span class="text-[10px] font-bold text-white">DIBA FBC</span>
                  <span class="text-[10px] text-white/60">ahora</span>
               </div>
               <div class="bg-white/5 rounded-2xl p-4">
                  <h3 id="preview-title" class="text-sm font-black text-dibaGold truncate">Título de prueba</h3>
                  <p id="preview-body" class="text-xs text-white/80 mt-1 line-clamp-3">El contenido que escribas arriba aparecerá aquí para los usuarios en sus dispositivos.</p>
               </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="/scripts/config.js"></script>
  <script type="module">
    import { initAdminLayout } from '/src/components/layout/admin-layout.js';
    initAdminLayout();
  </script>
  <script type="module" src="/src/features/push/admin.js"></script>
  <script>
    // Live Preview
    const titleIn = document.getElementById('push-title');
    const bodyIn = document.getElementById('push-body');
    const titleOut = document.getElementById('preview-title');
    const bodyOut = document.getElementById('preview-body');

    titleIn.addEventListener('input', (e) => titleOut.textContent = e.target.value || 'Título de prueba');
    bodyIn.addEventListener('input', (e) => bodyOut.textContent = e.target.value || 'El contenido que escribas arriba aparecerá aquí...');
  </script>
</body>
</html>
