<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notificaciones Push — Admin DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap 5.3.3 CSS & JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* Push Notification refinements */
        .push-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .preview-device {
            width: 300px;
            background: #000;
            border-radius: 40px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .preview-device::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, rgba(var(--gold-rgb), 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .notification-bubble {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="/styles/admin-common.css">
  <script src="/scripts/theme-switcher.js"></script>
</head>
<body class="bg-[#F4F7FA] text-slate-900 font-sans min-h-screen selection:bg-[#FFD700]/30" id="admin-body" style="display: none;">

    <!-- ══ NAVIGATION (Sidebar + Header) ══ -->
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-500">
        <div class="content p-8">
            <div class="max-w-6xl mx-auto w-full">
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                    
                    <!-- Broadcast Form -->
                    <div class="bg-white shadow-premium rounded-elite border border-slate-100 p-10 animate-fade-up">
                        <div class="mb-10 flex items-center gap-5">
                            <div class="w-14 h-14 bg-[#003366]/5 rounded-2xl flex items-center justify-center text-[#003366] border border-[#003366]/10">
                                <i class="fas fa-paper-plane text-2xl"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-black italic uppercase text-[#003366] leading-tight">Broadcast <span class="text-[#FFD700]">Push</span></h2>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 italic">Envío masivo oficial</p>
                            </div>
                        </div>

                        <form id="push-form" class="space-y-6">
                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">Título del Mensaje</label>
                                <input type="text" id="push-title" required placeholder="Ej: ¡Nuevo Partido Programado!" 
                                    class="w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all">
                            </div>

                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">Dirigido a:</label>
                                <select id="push-target" 
                                    class="w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] appearance-none cursor-pointer">
                                    <option value="all">Todos los Suscriptores</option>
                                    <option value="2012">Categoría 2012</option>
                                    <option value="2013">Categoría 2013</option>
                                    <option value="2014/2015/2016">Categoría 2014/15/16</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">Contenido de la Notificación</label>
                                <textarea id="push-body" rows="4" required placeholder="Escribe el cuerpo del mensaje aquí..." 
                                    class="w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] resize-none transition-all"></textarea>
                            </div>

                            <div class="form-group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">URL de Redirección (Opcional)</label>
                                <input type="text" id="push-url" placeholder="Ej: /partidos.html" 
                                    class="w-full bg-slate-50 border-slate-100 rounded-xl p-4 text-[#003366] font-bold outline-none focus:ring-2 focus:ring-[#FFD700] transition-all">
                                <p class="text-[9px] text-slate-400 font-bold italic mt-2">* El clic llevará al usuario a esta ruta.</p>
                            </div>

                            <div id="status-container" class="hidden animate-fade-up"></div>

                            <div class="pt-4">
                                <button type="submit" id="send-btn" class="w-full h-16 bg-[#003366] text-[#FFD700] rounded-xl font-black uppercase text-xs tracking-widest shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all group overflow-hidden relative">
                                    <span id="btn-text" class="relative z-10 flex items-center justify-center gap-3">
                                        <i class="fas fa-bolt group-hover:animate-pulse"></i> Lanzar Notificación
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Preview Device -->
                    <div class="flex flex-col items-center justify-center animate-fade-up sticky top-8" style="animation-delay: 0.1s;">
                        <div class="w-[320px] h-[640px] bg-slate-900 rounded-[3rem] p-4 relative border-[8px] border-slate-800 shadow-2xl overflow-hidden">
                            <!-- Notch -->
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-2xl z-20"></div>
                            
                            <!-- Screen Content -->
                            <div class="h-full w-full bg-[#F4F7FA] rounded-[2rem] p-4 pt-10 relative overflow-hidden">
                                <!-- Status Icons -->
                                <div class="flex justify-between items-center mb-8 px-2 opacity-30">
                                    <span class="text-[10px] font-bold">9:41</span>
                                    <div class="flex gap-1.5 items-center">
                                        <i class="fas fa-signal text-[8px]"></i>
                                        <i class="fas fa-wifi text-[8px]"></i>
                                        <i class="fas fa-battery-full text-[10px]"></i>
                                    </div>
                                </div>

                                <!-- Notification Bubble -->
                                <div class="bg-white/90 backdrop-blur-md border border-white rounded-2xl p-4 shadow-sm animate-fade-down">
                                    <div class="flex justify-between items-center mb-2">
                                        <div class="flex items-center gap-2">
                                            <div class="w-5 h-5 bg-[#003366] rounded-md flex items-center justify-center">
                                                <img src="/images/ESCUDO.png" class="w-3.5 h-3.5 object-contain" alt="">
                                            </div>
                                            <span class="text-[10px] font-black text-[#003366] uppercase tracking-tighter">DIBA FBC</span>
                                        </div>
                                        <span class="text-[8px] text-slate-400 font-bold">ahora</span>
                                    </div>
                                    <h3 id="preview-title" class="text-xs font-black text-slate-800 uppercase italic leading-tight">Título de prueba</h3>
                                    <p id="preview-body" class="text-[10px] text-slate-500 mt-1.5 leading-relaxed font-medium">El contenido que escribas aparecerá aquí para los usuarios.</p>
                                </div>

                                <!-- Wallpaper Simulation -->
                                <div class="absolute inset-0 -z-10 bg-gradient-to-tr from-[#003366]/10 to-[#FFD700]/10"></div>
                            </div>
                        </div>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em] mt-10 italic">Previsualización Real</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '/src/components/layout/admin-layout.js';
        import '/src/core/aiWidget.js';
        
        async function init() {
            try {
                await initAdminLayout();
                document.getElementById('admin-body').style.display = 'block';
            } catch (error) {
                console.error(error);
            }
        }
        init();
    </script>
    <script type="module" src="/src/features/push/admin.js"></script>
</body>
</html>
