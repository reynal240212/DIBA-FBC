<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Generador de Rifas — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="/scripts/theme-switcher.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* workbench style preview */
        #contenedor {
            background: rgba(0, 0, 0, 0.4);
            padding: 3rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 4rem;
            border-radius: 32px;
            border: 1px border-white/5;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            align-items: center;
        }

        /* Printable Ticket Design (Kept and Refined) */
        .page-rifa {
            width: 210mm;
            min-height: 297mm;
            padding: 10mm;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            transform: scale(0.95);
            transition: transform 0.3s;
        }
        
        #contenedor .page-rifa:hover {
            transform: scale(1);
        }

        .boleta-container {
            height: 55.4mm;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            border-bottom: 2px dashed #e2e8f0;
            color: #1e293b;
        }

        .boleta {
            width: 100%;
            height: 48mm;
            background: linear-gradient(135deg, #FFD700 0%, #ffec8b 50%, #e6b800 100%);
            border: 3px solid #004d98;
            border-radius: 16px;
            padding: 15px 25px;
            color: #004d98;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .boleta-left { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .boleta-logo { width: 55px; height: 55px; object-fit: contain; }
        .boleta-main { flex: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
        .boleta-titulo { font-size: 1.4rem; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .boleta-number-id { font-size: 0.9rem; font-weight: 900; background: #004d98; color: #FFD700; padding: 4px 12px; border-radius: 6px; }
        
        .boleta-grid { display: grid; grid-template-columns: 1fr 220px; gap: 20px; flex: 1; align-items: center; }
        .boleta-info-list { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.05em; }
        .boleta-info-list strong { color: #000; font-weight: 950; }
        
        .boleta-nums-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .num-box { background: white; color: #004d98; height: 36px; border: 2px solid #004d98; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 950; font-size: 1.1rem; box-shadow: 0 3px 0 #004d98; }

        .boleta-footer { margin-top: 10px; padding: 6px 12px; background: rgba(255, 255, 255, 0.4); border: 1.5px solid #004d98; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }

        @media print {
            body { background: white !important; }
            #admin-nav, .no-print, header, aside { display: none !important; }
            main { margin-left: 0 !important; padding: 0 !important; }
            #contenedor { padding: 0 !important; gap: 0 !important; background: transparent !important; box-shadow: none !important; border: none !important; }
            .page-rifa { margin: 0 !important; padding: 10mm !important; box-shadow: none !important; transform: none !important; page-break-after: always; }
        }

        /* mobile optimization */
        @media (max-width: 1024px) {
            #contenedor { padding: 1rem; }
            .page-rifa { transform: scale(0.4); transform-origin: top center; width: auto; min-height: auto; }
        }
    </style>
</head>

<body class="bg-gray-100 text-slate-800 font-['Outfit']">

    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] pt-[80px] min-h-screen transition-all duration-300">
        <div class="p-6 lg:p-10 max-w-[1600px] mx-auto">
            
            <!-- Page Header -->
            <div class="mb-12 animate-fade-up no-print">
                <div class="flex items-center justify-between flex-wrap gap-8">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span class="w-8 h-1 bg-gold rounded-full"></span>
                            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[0.65rem]">Generador de Activos de Marketing</p>
                        </div>
                        <h2 class="text-4xl lg:text-5xl font-black italic text-slate-800 uppercase tracking-tighter">Gestión de <span class="text-gold">Rifas</span></h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="window.print()" class="px-8 py-4 bg-white/5 border border-white/10 rounded-2xl text-slate-800 font-black uppercase tracking-widest text-[0.7rem] hover:bg-white/10 transition-all flex items-center gap-3">
                            <i class="fas fa-print text-gold"></i> IMPRIMIR REPORTE
                        </button>
                    </div>
                </div>
            </div>

            <!-- Configuration Toolbar -->
            <div class="panel p-8 mb-10 animate-fade-up no-print" style="animation-delay: 0.1s">
                <div class="premium-p-header mb-8">
                    <span class="premium-p-title"><i class="fas fa-sliders text-gold"></i>Parámetros de Generación</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
                    <div class="premium-form-group">
                        <label class="premium-label">Cant. Boletas</label>
                        <input type="number" id="cfg-total" min="1" max="1000" step="5" value="45" class="premium-input text-center">
                    </div>

                    <div class="premium-form-group">
                        <label class="premium-label">Números x Boleta</label>
                        <select id="cfg-numeros" class="premium-input">
                            <option value="4">4 NÚMEROS</option>
                            <option value="5">5 NÚMEROS</option>
                            <option value="6" selected>6 NÚMEROS</option>
                            <option value="8">8 NÚMEROS</option>
                            <option value="10">10 NÚMEROS</option>
                        </select>
                    </div>

                    <div class="premium-form-group">
                        <label class="premium-label">Fecha Sorteo</label>
                        <input type="date" id="cfg-fecha-picker" class="premium-input uppercase tracking-wider">
                        <input type="hidden" id="cfg-fecha">
                    </div>

                    <div class="premium-form-group">
                        <label class="premium-label">Modalidad / Lotería</label>
                        <input type="text" id="cfg-loteria" list="loterias-list" value="Sinuano Noche — Últimas 2 cifras" class="premium-input uppercase">
                        <datalist id="loterias-list">
                            <option value="Sinuano Noche / Últimas 2 cifras">
                            <option value="Sinuano Día / Últimas 2 cifras">
                            <option value="Caribeña Noche / Últimas 2 cifras">
                            <option value="Caribeña Día / Últimas 2 cifras">
                            <option value="Lotería de Medellín">
                            <option value="Lotería de Bogotá">
                        </datalist>
                    </div>

                    <div class="premium-form-group">
                        <label class="premium-label">Premio Mayor</label>
                        <input type="text" id="cfg-premio" placeholder="EJ: TABLET 10 PULG." value="Perfume Importado" class="premium-input uppercase">
                    </div>

                    <div class="premium-form-group">
                        <label class="premium-label">Valor Boleta ($)</label>
                        <input type="number" id="cfg-valor-num" step="500" value="3000" class="premium-input">
                        <input type="hidden" id="cfg-valor">
                    </div>
                </div>

                <div class="mt-10 pt-8 border-t border-white/5 flex flex-wrap gap-4">
                    <button id="btn-generar" class="px-10 py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase tracking-widest text-[0.75rem] shadow-xl shadow-gold/10 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3 min-w-[280px]">
                        <i class="fas fa-ticket-alt"></i> GENERAR BOLETAS AHORA
                    </button>
                    
                    <div id="status-bar" class="hidden flex-1 items-center gap-4 px-6 bg-white/5 rounded-2xl border border-white/5 animate-fade-in">
                        <div class="w-2 h-2 rounded-full bg-gold animate-pulse"></div>
                        <span id="status-text" class="text-[0.65rem] font-black uppercase tracking-widest text-slate-500 italic">Esperando generación...</span>
                    </div>
                </div>
            </div>

            <!-- Workbench Preview -->
            <div id="contenedor" class="animate-fade-up" style="animation-delay: 0.2s">
                <div class="text-center py-20 opacity-20">
                    <i class="fas fa-print fa-bounce text-6xl mb-6 text-gold"></i>
                    <p class="text-[0.8rem] font-black uppercase tracking-[0.4em]">Configure los parámetros y genere la vista previa...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';

        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
        }
        init();

        // UI Interactions
        const fechaPicker = document.getElementById('cfg-fecha-picker');
        const fechaText = document.getElementById('cfg-fecha');
        const valorNum = document.getElementById('cfg-valor-num');
        const valorText = document.getElementById('cfg-valor');

        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 14);
        if(fechaPicker) {
            fechaPicker.value = defaultDate.toISOString().split('T')[0];
            const updateFecha = () => {
                const d = new Date(fechaPicker.value + 'T00:00:00');
                fechaText.value = d.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            };
            fechaPicker.addEventListener('change', updateFecha);
            updateFecha();
        }

        if(valorNum) {
            const updateVal = () => valorText.value = '$' + (parseFloat(valorNum.value) || 0).toLocaleString('es-CO');
            valorNum.addEventListener('input', updateVal);
            updateVal();
        }

        // Raffle Logic
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        window.generarBoletas = function () {
            const contenedor = document.getElementById('contenedor');
            const totalBoletas = parseInt(document.getElementById('cfg-total').value) || 1;
            const numPorBoleta = parseInt(document.getElementById('cfg-numeros').value) || 6;
            const fecha = document.getElementById('cfg-fecha').value;
            const loteria = document.getElementById('cfg-loteria').value;
            const premio = document.getElementById('cfg-premio').value;
            const valor = document.getElementById('cfg-valor').value;

            const totalNums = totalBoletas * numPorBoleta;
            let masterPool = [];
            for (let c = 0; c < Math.ceil(totalNums / 100); c++) {
                let ciclo = Array.from({length: 100}, (_, i) => String(i).padStart(2, '0'));
                shuffleArray(ciclo);
                masterPool = [...masterPool, ...ciclo];
            }

            contenedor.innerHTML = '';
            const BOLETAS_POR_PAG = 5;
            let currentIdx = 0;

            for (let p = 0; p < Math.ceil(totalBoletas / BOLETAS_POR_PAG); p++) {
                const page = document.createElement('div');
                page.className = 'page-rifa scale-x-[-1]'; // Fix mirror effect if scale used or just normal
                page.classList.remove('scale-x-[-1]'); 
                page.className = 'page-rifa';

                for (let b = 0; b < BOLETAS_POR_PAG && currentIdx < totalBoletas; b++) {
                    currentIdx++;
                    const nums = masterPool.slice((currentIdx - 1) * numPorBoleta, currentIdx * numPorBoleta).sort();
                    const numsHtml = nums.map(n => `<div class="num-box">${n}</div>`).join('');

                    const boleta = document.createElement('div');
                    boleta.className = 'boleta-container';
                    boleta.innerHTML = `
                        <div class="boleta">
                            <div class="boleta-left">
                                <img src="/images/ESCUDO.png" class="boleta-logo">
                            </div>
                            <div class="boleta-main">
                                <div class="flex justify-between items-start">
                                    <div class="boleta-titulo font-outfit uppercase">Rifa Oficial <span style="color:#000">DIBA FBC</span></div>
                                    <div class="boleta-number-id">BOLETA #${String(currentIdx).padStart(3, '0')}</div>
                                </div>
                                <div class="boleta-grid">
                                    <div class="boleta-info-list italic">
                                        📅 JUEGA: <strong>${fecha}</strong><br>
                                        🎰 LOTERÍA: <strong>${loteria}</strong><br>
                                        🏆 PREMIO: <strong>${premio}</strong><br>
                                        💰 VALOR: <strong>${valor}</strong>
                                    </div>
                                    <div class="boleta-nums-grid">${numsHtml}</div>
                                </div>
                                <div class="boleta-footer italic uppercase flex justify-between">
                                    <span>👤 RESPONSABLE: ____________________________</span>
                                    <span class="opacity-30">DIBA FBC © 2025</span>
                                </div>
                            </div>
                        </div>
                    `;
                    page.appendChild(boleta);
                }
                contenedor.appendChild(page);
            }

            const bar = document.getElementById('status-bar');
            bar.classList.remove('hidden');
            bar.classList.add('flex');
            document.getElementById('status-text').textContent = `${totalBoletas} BOLETAS GENERADAS CON ÉXITO`;
        };

        document.getElementById('btn-generar').addEventListener('click', window.generarBoletas);
    </script>
</body>

</html>
