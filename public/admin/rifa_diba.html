<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Generador de Boletas — DIBA FBC</title>
  <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ── Dashboard Base Styles ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #002a40;
      --blue2: #003d5c;
      --gold: #ffcc00;
      --gold2: #e6b800;
      --dark: #0a0e14;
      --dark2: #111823;
      --dark3: #1a2332;
      --slate: #8b9ab0;
      --text: #e2e8f0;
      --border: rgba(255, 255, 255, 0.07);
      --sidebar-w: 270px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--dark2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .sidebar-logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .sidebar-logo-text {
      font-size: 1.05rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--gold);
    }

    .sidebar-logo-sub {
      font-size: .55rem;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-weight: 700;
      margin-top: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .35rem;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: .55rem;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--slate);
      padding: .8rem .6rem .4rem;
      margin-top: .5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      font-size: .78rem;
      font-weight: 700;
      color: var(--slate);
      transition: all .2s ease;
      position: relative;
    }

    .nav-link i {
      width: 18px;
      text-align: center;
      font-size: .85rem;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, .05);
      color: var(--text);
    }

    .nav-link.active {
      background: rgba(255, 204, 0, .1);
      color: var(--gold);
    }

    .sidebar-footer {
      padding: 1.2rem 1rem;
      border-top: 1px solid var(--border);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      margin-bottom: .6rem;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: .8rem;
    }

    .user-name {
      font-size: .75rem;
      font-weight: 800;
      color: var(--text);
    }

    .user-role {
      font-size: .6rem;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .btn-logout {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .7rem;
      border-radius: 12px;
      border: none;
      background: rgba(239, 68, 68, .1);
      color: #ef4444;
      font-family: 'Montserrat', sans-serif;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-logout:hover {
      background: #ef4444;
      color: #fff;
    }

    /* ── MAIN & TOPBAR ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--dark2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .page-title span {
      color: var(--gold);
    }

    .page-subtitle {
      font-size: .7rem;
      color: var(--slate);
      font-weight: 600;
      margin-top: 2px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .topbar-time {
      font-size: .72rem;
      font-weight: 700;
      color: var(--slate);
      background: var(--dark3);
      padding: .45rem .9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .mobile-menu-btn {
      display: none;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--gold);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .content {
      padding: 2rem;
      flex: 1;
    }

    /* ── Raffle Content Specific ── */
    .btn-container {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--dark2);
      padding: 1.5rem;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .btn-container label {
      font-size: .75rem;
      font-weight: 800;
      color: var(--slate);
      text-transform: uppercase;
    }

    input[type="number"] {
      background: var(--dark);
      border: 1px solid var(--border);
      color: #fff;
      padding: .6rem;
      border-radius: 10px;
      width: 80px;
      font-weight: 700;
      outline: none;
    }

    button.btn-action {
      background: var(--gold);
      color: var(--blue);
      padding: .7rem 1.5rem;
      border: none;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      font-size: .75rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
    }

    button.btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 204, 0, 0.3);
    }

    .page {
      width: 210mm;
      margin: 10mm auto;
      padding: 10mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      page-break-after: always;
      background: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }

    .boleta {
      width: 95%;
      min-height: 240px;
      background: #FFD700;
      border: 2px solid #002a40;
      border-radius: 10px;
      padding: 1.5rem;
      position: relative;
      margin: 15px 0;
      color: #002a40;
    }

    .titulo-boleta {
      text-align: center;
      font-weight: 900;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .logo {
      width: 70px;
      position: absolute;
      top: 15px;
      right: 15px;
    }

    .info {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 1rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .numeros {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 1rem;
    }

    .fila-numero-nombre {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .numero {
      background: #fff;
      color: #002a40;
      width: 45px;
      height: 45px;
      border: 2px solid #002a40;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 900;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .nombre-numero {
      flex: 1;
      font-size: .8rem;
      padding: 6px 10px;
      border: 1.5px solid #002a40;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-weight: 700;
    }

    .footer-boleta {
      position: absolute;
      bottom: 10px;
      left: 1.5rem;
      font-weight: 900;
      font-size: .9rem;
      opacity: 0.7;
    }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .page {
        width: 100%;
        margin: 0;
        padding: 5mm;
      }
    }
  </style>
</head>

      <div class="topbar-right">

      <div class="btn-container" style="flex-wrap:wrap;gap:1rem;">

          <label>Premio</label>
          <input type="text" id="cfg-premio" value="2 Perfumes para Caballeros"

        </div>

          <label>Loteria</label>
          <input type="text" id="cfg-loteria" value="Sinuano Noche - Ultimas 2 cifras"
            style="background:var(--dark);border:1px solid var(--border);color:#fff;padding:.5rem .7rem;border-radius:10px;font-size:.73rem;font-family:'Montserrat',sans-serif;outline:none;width:210px;">

          <label>Valor por numero</label>
          <input type="text" id="cfg-valor" value="$3.000"
            style="background:var(--dark);border:1px solid var(--border);color:#fff;padding:.5rem .7rem;border-radius:10px;font-size:.73rem;font-family:'Montserrat',sans-serif;outline:none;width:100px;">

        <button onclick="generarBoletas()" class="btn-action">Generar Boletas</button>

  <!-- Librerías necesarias -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

  <script>
    const contenedor = document.getElementById('contenedor');
    const numerosUsadosGlobal = new Set();
    const MAX_NUMEROS_UNICOS = 100;
    const NUMEROS_POR_BOLETA = 6;

    function generarNumerosParaBoleta() {
      const numerosBoleta = new Set();
      while (numerosBoleta.size < NUMEROS_POR_BOLETA) {
        const numero = Math.floor(Math.random() * 100);
        const numeroFormateado = numero.toString().padStart(2, '0');
        const sePermitenRepetidos = numerosUsadosGlobal.size >= MAX_NUMEROS_UNICOS;
        if (sePermitenRepetidos || !numerosUsadosGlobal.has(numeroFormateado)) {
          numerosBoleta.add(numeroFormateado);
          numerosUsadosGlobal.add(numeroFormateado);
        }
      }
      return [...numerosBoleta].sort((a, b) => parseInt(a) - parseInt(b));
    }

    function generarBoletas() {
      contenedor.innerHTML = "";
      numerosUsadosGlobal.clear();

      const total    = parseInt(document.getElementById('cantidad').value) || 40;
      const fecha    = document.getElementById('cfg-fecha')?.value   || 'Por definir';
      const premio   = document.getElementById('cfg-premio')?.value  || 'Por definir';
      const loteria  = document.getElementById('cfg-loteria')?.value || 'Por definir';
      const valor    = document.getElementById('cfg-valor')?.value   || '.000';
      let paginaActual;
      for (let i = 1; i <= total; i++) {
        if ((i - 1) % 4 === 0) {
          paginaActual = document.createElement('div');
          paginaActual.className = 'page';
          contenedor.appendChild(paginaActual);
        }
        const numeros = generarNumerosParaBoleta();
        const numerosHTML = numeros.map(n => `
          <div class="fila-numero-nombre">
            <div class="numero">${n}</div>
            <input type="text" class="nombre-numero" placeholder="Nombre del comprador" />
          </div>
        `).join('');

        const boleta = document.createElement('div');
        boleta.className = 'boleta';
        boleta.innerHTML = `
          <img src="/images/ESCUDO.png" class="logo" alt="Logo" />
          <div>
            <div class="titulo-boleta">RESPONSABLE DIBA FBC</div>
            <div class="info">
              Juega el ${fecha}<br>
              ${loteria}<br>
              Premio: ${premio}<br>
              Valor: ${valor} por numero
            </div>
            <div class="numeros">${numerosHTML}</div>
            <div class="footer-boleta">Boleta #${String(i).padStart(3,"0")}</div>
          </div>
        `;
        paginaActual.appendChild(boleta);
      }
      console.log("Boletas generadas correctamente.");
    }

    async function descargarZip() {
      const zip = new JSZip();
      const boletas = document.querySelectorAll('.boleta');

      if (boletas.length === 0) {
        alert("Primero genera las boletas.");
        return;
      }

      console.log(`Procesando ${boletas.length} boleta(s)...`);
      // Mensaje informativo
      alert("Generando imágenes y creando el ZIP, puede tardar unos segundos...");

      const promises = Array.from(boletas).map(async (boleta, index) => {
        try {
          const canvas = await html2canvas(boleta, { scale: 2 });
          const imgData = canvas.toDataURL("image/jpeg", 1.0);
          zip.file(`boleta_${index + 1}.jpg`, imgData.split(',')[1], { base64: true });
          console.log(`Boleta ${index + 1} procesada.`);
        } catch (error) {
          console.error(`Error procesando la boleta ${index + 1}: `, error);
        }
      });

      await Promise.all(promises);

      try {
        const contenidoZip = await zip.generateAsync({ type: "blob" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(contenidoZip);
        link.download = "boletas.zip";
        link.click();
        console.log("ZIP descargado con éxito.");
      } catch (error) {
        console.error("Error al generar el ZIP: ", error);
        alert("Ocurrió un error al generar el ZIP. Revisa la consola para más detalles.");
      }
    }
  </script>
  <script src="/scripts/config.js"></script>
  <script type="module">
    import { supabase, requireAdmin } from "../scripts/supabaseClient.js";

    // Protection & Unified UI
    requireAdmin().then(session => {
      if (session) {
        document.getElementById('admin-body').style.display = 'flex';
        const user = session.user;
        if (user) {
          document.getElementById('sb-name').textContent = user.email.split('@')[0];
          document.getElementById('sb-avatar').textContent = user.email[0].toUpperCase();
        }
      }
    });

    // Clock
    const clockEl = document.getElementById('clock');
    function updateClock() {
      const now = new Date();
      if (clockEl) clockEl.textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Mobile Menu
    const menuBtn = document.getElementById('menu-btn');
    const menuIcon = document.getElementById('menu-icon');
    const sidebar = document.getElementById('sidebar');
    menuBtn?.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      if (menuIcon) menuIcon.className = sidebar.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
    });

    // Logout
    document.getElementById('logout-btn')?.addEventListener('click', async () => {
      if (confirm('¿Cerrar sesión?')) {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      }
    });
  </script>
