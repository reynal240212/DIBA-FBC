<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap 5.3.3 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dibaGold: '#FFD700',
                        dibaBlue: '#0A0F1E',
                        dibaDark: '#05080F',
                        dibaDark2: '#0A0F1E'
                    }
                },
            },
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        .update-card {
            max-width: 440px;
            width: 100%;
            padding: 3rem;
            margin: 2rem;
        }

        .logo-box {
            padding: 1.5rem;
            background: rgba(var(--gold-rgb), 0.1);
            border-radius: 2rem;
            border: 1px solid rgba(var(--gold-rgb), 0.2);
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="flex items-center justify-center p-6 min-h-screen">
    <div class="glass-premium update-card animate-fade-up">
        <div class="text-center mb-10">
            <div class="logo-box">
                <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-16 drop-shadow-glow">
            </div>
            <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter leading-none mb-2">
                Nueva <span class="text-gold">Clave</span>
            </h2>
            <p class="text-[10px] font-bold text-dibaMuted uppercase tracking-widest">Recuperación de Acceso Oficial</p>
        </div>

        <div id="alert-container" class="mb-8"></div>

        <form id="reset-form">
            <div class="premium-form-group">
                <label class="premium-label">Nueva Contraseña</label>
                <div class="relative">
                    <input type="password" id="new-password" required placeholder="Mínimo 6 caracteres" minlength="6" class="premium-input">
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-gold" id="pw-toggle">
                        <i class="fas fa-eye-slash" id="pw-icon"></i>
                    </button>
                </div>
            </div>

            <div class="premium-form-group">
                <label class="premium-label">Confirmar Contraseña</label>
                <div class="relative">
                    <input type="password" id="confirm-password" required placeholder="Repite la clave" minlength="6" class="premium-input">
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-gold" id="pw-confirm-toggle">
                        <i class="fas fa-eye-slash" id="pw-confirm-icon"></i>
                    </button>
                </div>
            </div>

            <div class="mt-10">
                <button type="submit" id="reset-button" class="btn btn-primary w-full" style="padding: 1rem;">
                    <span class="button-text">Guardar Cambios</span>
                    <i class="fas fa-circle-notch fa-spin hidden spinner ms-2"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-10">
            <a href="/admin/login.html" class="text-[10px] font-black uppercase tracking-widest text-dibaMuted hover:text-white transition-all flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i> Volver al Acceso
            </a>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "/scripts/auth.js";
        import { supabase } from "/scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = resetBtn.querySelector('.spinner');
        const btnText = resetBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            const isError = type === 'error';
            alertContainer.innerHTML = `
                <div class="glass animate-fade-up p-4 rounded-xl border ${isError ? 'border-red-500/30' : 'border-green-500/30'} flex items-center gap-3">
                    <i class="fas ${isError ? 'fa-exclamation-triangle text-red-500' : 'fa-check-circle text-green-500'}"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest ${isError ? 'text-red-400' : 'text-green-400'}">${message}</p>
                </div>
            `;
        };

        if (supabase) {
            supabase.auth.onAuthStateChange((event) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showAlert('Sesión de recuperación activa. Ingrese su nueva clave.', 'success');
                }
            });
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            alertContainer.innerHTML = '';

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Guardando...';

            try {
                await actualizarPassword(newPassword);
                btnText.textContent = '¡Actualizado!';
                showAlert('Clave actualizada. Redirigiendo...', 'success');
                setTimeout(() => window.location.replace('/admin/login.html'), 2000);
            } catch (error) {
                showAlert(error.message);
                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Guardar Cambios';
            }
        });

        const setupToggle = (btnId, inputId, iconId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            btn.addEventListener('click', () => {
                const shown = input.type === 'text';
                input.type = shown ? 'password' : 'text';
                icon.className = shown ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        };

        setupToggle('pw-toggle', 'new-password', 'pw-icon');
        setupToggle('pw-confirm-toggle', 'confirm-password', 'pw-confirm-icon');
    </script>
</body>

</html>
