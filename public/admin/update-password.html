<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dibaGold: '#ffcc00',
                        dibaBlue: '#002a40',
                        dibaDark: '#0a0e14',
                        dibaDark2: '#111823'
                    }
                },
            },
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        .bg-soccer {
            background: linear-gradient(rgba(10, 14, 20, 0.8), rgba(10, 14, 20, 0.9)),
                url('https://cdn.britannica.com/51/190751-050-147B93F7/soccer-ball-goal.jpg');
            background-size: cover;
            background-position: center;
        }

        .glass {
            background: rgba(17, 24, 35, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .particles-wrap {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 204, 0, .2);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) translateX(0) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: .6;
            }

            100% {
                transform: translateY(-10vh) translateX(40px) scale(0.5);
                opacity: 0;
            }
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: #ffcc00;
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.1);
        }

        .pw-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.2s;
        }

        .pw-toggle:hover {
            color: #ffcc00;
        }
    </style>
</head>

<body class="bg-soccer min-h-screen flex items-center justify-center p-6 font-sans relative overflow-hidden">

    <div class="particles-wrap" id="particles"></div>

    <div class="w-full max-w-[440px] z-10 animate__animated animate__fadeIn">
        <div class="glass rounded-[40px] shadow-2xl overflow-hidden p-8 md:p-12">

            <div class="text-center mb-10">
                <div
                    class="inline-block p-4 bg-dibaGold/10 rounded-3xl mb-6 border border-dibaGold/20 animate__animated animate__zoomIn">
                    <img src="/images/ESCUDO.png" alt="DIBA FBC"
                        class="w-20 drop-shadow-[0_0_15px_rgba(255,204,0,0.3)]">
                </div>
                <h2 class="text-3xl font-black text-white uppercase italic tracking-tighter leading-none mb-2">Nueva
                    <span class="text-dibaGold">Clave</span></h2>
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.4em]">Recuperación de Acceso</p>
            </div>

            <div id="alert-container" class="mb-8"></div>

            <form id="reset-form" class="space-y-6">
                <div class="space-y-2">
                    <label for="new-password"
                        class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Nueva
                        Contraseña</label>
                    <div class="relative group">
                        <span
                            class="absolute inset-y-0 left-5 flex items-center text-slate-500 group-focus-within:text-dibaGold transition-colors">
                            <i class="fas fa-lock-open text-sm"></i>
                        </span>
                        <input type="password" id="new-password" required placeholder="Mínimo 6 caracteres"
                            minlength="6"
                            class="input-field w-full pl-14 pr-14 py-4 rounded-2xl text-white font-semibold placeholder:text-slate-600 outline-none">
                        <button type="button" class="pw-toggle" id="pw-toggle">
                            <i class="fas fa-eye-slash" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="confirm-password"
                        class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Confirmar
                        Contraseña</label>
                    <div class="relative group">
                        <span
                            class="absolute inset-y-0 left-5 flex items-center text-slate-500 group-focus-within:text-dibaGold transition-colors">
                            <i class="fas fa-shield-halved text-sm"></i>
                        </span>
                        <input type="password" id="confirm-password" required placeholder="Repite la clave"
                            minlength="6"
                            class="input-field w-full pl-14 pr-14 py-4 rounded-2xl text-white font-semibold placeholder:text-slate-600 outline-none">
                        <button type="button" class="pw-toggle" id="pw-confirm-toggle">
                            <i class="fas fa-eye-slash" id="pw-confirm-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="reset-button"
                    class="w-full bg-dibaGold hover:bg-yellow-400 text-dibaBlue font-black py-4 rounded-2xl shadow-[0_8px_30px_rgb(255,204,0,0.2)] hover:shadow-[0_8px_40px_rgb(255,204,0,0.4)] transform hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3 uppercase italic tracking-widest text-sm">
                    <span class="button-text">Guardar Cambios</span>
                    <i class="fas fa-check-circle text-xs"></i>
                    <i class="fas fa-circle-notch fa-spin hidden spinner text-sm"></i>
                </button>
            </form>
        </div>

        <div class="flex flex-col items-center gap-4 mt-8">
            <a href="/admin/login.html"
                class="text-slate-500 hover:text-white text-[10px] font-black uppercase tracking-[0.3em] transition-all flex items-center gap-2 group">
                <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Ir al Acceso
            </a>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "/scripts/auth.js";
        import { supabase } from "/scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = resetBtn.querySelector('.spinner');
        const btnText = resetBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            const bgColor = type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-500' : 'bg-green-500/10 border-green-500/20 text-green-500';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-3 p-4 rounded-2xl border ${bgColor} animate__animated animate__shakeX">
                    <i class="fas ${icon}"></i>
                    <p class="text-[11px] font-bold uppercase tracking-wider">${message}</p>
                </div>
            `;
        };

        // Verificar si existe el session o token de recuperación
        if (supabase) {
            supabase.auth.onAuthStateChange((event, session) => {
                if (event == 'PASSWORD_RECOVERY') {
                    showAlert('Sesión de recuperación activa. Ingrese su nueva clave.', 'success');
                }
            });
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            alertContainer.innerHTML = '';

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Guardando...';

            try {
                await actualizarPassword(newPassword);
                btnText.textContent = '¡Actualizado!';
                showAlert('Clave actualizada. Redirigiendo...', 'success');

                setTimeout(() => {
                    window.location.replace('/admin/login.html');
                }, 2000);

            } catch (error) {
                console.error("Reset error:", error);
                showAlert(error.message);
                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Guardar Cambios';
            }
        });

        // Partículas
        const wrap = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            wrap.appendChild(p);
        }

        // Toggle contraseñas
        const setupToggle = (btnId, inputId, iconId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            btn.addEventListener('click', () => {
                const shown = input.type === 'text';
                input.type = shown ? 'password' : 'text';
                icon.className = shown ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        };

        setupToggle('pw-toggle', 'new-password', 'pw-icon');
        setupToggle('pw-confirm-toggle', 'confirm-password', 'pw-confirm-icon');
    </script>
</body>

</html>
