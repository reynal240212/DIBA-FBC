<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="../styles/admin-common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 font-['Inter'] min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-diba-blue/5 via-white to-diba-red/5">

    <div class="w-full max-w-[440px] animate-fade-up">
        
        <!-- Logo -->
        <div class="flex justify-center mb-10">
            <div class="w-24 h-24 bg-white rounded-[2.5rem] shadow-premium flex items-center justify-center border border-slate-50 relative group transition-all hover:scale-110">
                <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-16 h-16 object-contain">
                <div class="absolute -bottom-2 -right-2 w-8 h-8 bg-diba-gold rounded-xl flex items-center justify-center text-diba-blue shadow-lg border-2 border-white">
                    <i class="fas fa-shield-alt text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-[3rem] shadow-premium border border-slate-50 p-10 md:p-12">
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase leading-none">Nueva <span class="text-diba-red">Clave</span></h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-3 italic">Protocolo de Restablecimiento</p>
            </div>

            <div id="alert-container" class="mb-8 hidden"></div>

            <form id="reset-form" class="space-y-8">
                
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Nueva Contraseña</label>
                    <div class="relative group">
                        <i class="fas fa-lock-open absolute left-6 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                        <input type="password" id="new-password" required placeholder="Mínimo 6 caracteres" minlength="6"
                               class="w-full pl-14 pr-14 py-4 bg-slate-50 border border-slate-50 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all italic">
                        <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-diba-blue transition-colors" onclick="togglePassword('new-password', this)">
                            <i class="fas fa-eye-slash text-xs"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Confirmar Nueva Clave</label>
                    <div class="relative group">
                        <i class="fas fa-shield-halved absolute left-6 top-1/2 -translate-y-1/2 text-diba-gold group-focus-within:text-diba-red transition-colors"></i>
                        <input type="password" id="confirm-password" required placeholder="Repite la clave" minlength="6"
                               class="w-full pl-14 pr-14 py-4 bg-slate-50 border border-slate-50 rounded-2xl text-diba-blue text-sm font-extrabold outline-none focus:ring-4 focus:ring-diba-blue/5 focus:bg-white focus:border-diba-blue transition-all italic">
                         <button type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-diba-blue transition-colors" onclick="togglePassword('confirm-password', this)">
                            <i class="fas fa-eye-slash text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="reset-button" class="w-full py-4 bg-diba-blue text-diba-gold text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-blue-900/20 italic flex items-center justify-center gap-3">
                    <span class="button-text">Guardar Cambios</span>
                    <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                </button>
            </form>
        </div>

        <div class="mt-8 flex justify-center">
            <a href="login.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-diba-blue text-[10px] font-black uppercase tracking-widest transition-all group">
                <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Ir al Acceso
            </a>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "../scripts/auth.js";
        import { supabase } from "../scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('spinner');
        const btnText = resetBtn.querySelector('.button-text');

        window.togglePassword = (id, btn) => {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye text-xs';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye-slash text-xs';
            }
        };

        const showAlert = (message, type = 'error') => {
            alertContainer.className = `p-5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg mb-8 ${
                type === 'success' 
                ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' 
                : 'bg-rose-50 text-rose-600 border border-rose-100'
            }`;
            alertContainer.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'} mr-2 text-lg"></i> ${message}`;
            alertContainer.classList.remove('hidden');
        };

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'PROCESANDO...';

            try {
                await actualizarPassword(newPassword);
                showAlert('Clave actualizada. Redirigiendo...', 'success');
                setTimeout(() => window.location.replace('login.html'), 2000);
            } catch (error) {
                showAlert(error.message, 'error');
                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'GUARDAR CAMBIOS';
            }
        });
    </script>
</body>

</html>
