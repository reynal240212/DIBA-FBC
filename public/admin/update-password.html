<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/admin-common.css">
    <style>
        body {
            background: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            background: var(--dark3);
            border-bottom: 1px solid var(--border);
        }

        .login-logo {
            width: 80px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.2));
        }

        .login-body {
            padding: 2.5rem 2rem;
        }
    </style>
</head>

<body class="animate-fade-up">

    <div class="login-card">
        <div class="login-header">
            <img src="/images/ESCUDO.png" alt="DIBA FBC" class="login-logo">
            <h1 class="page-title" style="font-size:1.2rem">Nueva <span>Contraseña</span></h1>
            <p class="page-subtitle">Actualiza tu acceso de seguridad</p>
        </div>

        <div class="login-body">
            <div id="alert-container" style="margin-bottom: 1.5rem;"></div>

            <form id="reset-form">
                <div style="margin-bottom: 1.5rem;">
                    <label class="page-subtitle"
                        style="text-transform:uppercase; margin-bottom:.5rem; display:block">Nueva Contraseña</label>
                    <div style="position:relative">
                        <i class="fas fa-lock"
                            style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--slate); font-size:.8rem"></i>
                        <input type="password" id="new-password" class="form-control" style="padding-left:2.8rem"
                            placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <label class="page-subtitle"
                        style="text-transform:uppercase; margin-bottom:.5rem; display:block">Confirmar
                        Contraseña</label>
                    <div style="position:relative">
                        <i class="fas fa-shield-alt"
                            style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--slate); font-size:.8rem"></i>
                        <input type="password" id="confirm-password" class="form-control" style="padding-left:2.8rem"
                            placeholder="Repite la contraseña" required minlength="6">
                    </div>
                </div>

                <button type="submit" id="reset-button" class="btn btn-primary"
                    style="width:100%; padding:1rem; font-size:.75rem">
                    <span class="button-text">GUARDAR CONTRASEÑA</span>
                </button>
            </form>

            <div style="text-align:center; margin-top:2rem">
                <a href="/admin/login.html" class="page-subtitle" style="text-decoration:none; transition:color .2s"
                    onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--slate)'">
                    <i class="fas fa-arrow-left"></i> VOLVER AL ACCESO
                </a>
            </div>
        </div>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "/scripts/auth.js";
        import { supabase } from "/scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const btnText = resetBtn.querySelector('.button-text');

        const showAlert = (message, isSuccess = false) => {
            alertContainer.innerHTML = `
                <div class="panel animate-fade-up" style="padding:1rem; font-size:.7rem; font-weight:700; border-color:${isSuccess ? '#4ade80' : '#fb7185'}; color:${isSuccess ? '#4ade80' : '#fb7185'}; background:${isSuccess ? 'rgba(34,197,94,.05)' : 'rgba(244,63,94,.05)'}">
                    <i class="fas fa-${isSuccess ? 'check-circle' : 'exclamation-circle'}"></i> ${message}
                </div>
            `;
        };

        supabase.auth.onAuthStateChange((event) => {
            if (event == 'PASSWORD_RECOVERY') {
                showAlert('Recuperación verificada. Ingresa tu nueva contraseña.', true);
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.');
                return;
            }

            resetBtn.disabled = true;
            btnText.textContent = 'GUARDANDO...';
            alertContainer.innerHTML = '';

            try {
                await actualizarPassword(newPassword);
                btnText.textContent = '¡ACTUALIZADO!';
                showAlert('Contraseña actualizada. Redirigiendo...', true);

                setTimeout(() => {
                    window.location.replace('/admin/login.html');
                }, 2000);

            } catch (error) {
                showAlert(error.message);
                resetBtn.disabled = false;
                btnText.textContent = 'GUARDAR CONTRASEÑA';
            }
        });
    </script>
</body>

</html>
