<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Actualizar Contraseña — DIBA FBC Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #020617;
            overflow: hidden;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 100% 0%, #004d98 0%, transparent 40%),
                        radial-gradient(circle at 0% 100%, #a50044 0%, transparent 40%);
            opacity: 0.6;
        }

        .login-glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }

        .floating-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(60px);
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 10s infinite linear;
        }

        @keyframes rise {
            from { transform: translateY(100vh) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            to { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }

        .pw-toggle-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .pw-toggle-btn:hover {
            color: var(--gold);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 font-['Outfit']">
    <div class="login-bg"></div>
    <div class="floating-orb" style="top: 10%; right: 20%"></div>
    <div class="floating-orb" style="bottom: 10%; left: 20%; animation-delay: -10s"></div>
    
    <!-- Particles -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="w-full max-w-[480px] z-10 animate-fade-up">
        <div class="login-glass rounded-[48px] p-10 lg:p-14 relative overflow-hidden">
            
            <!-- Logo & Title -->
            <div class="text-center mb-12">
                <div class="inline-flex relative mb-8 group">
                    <div class="absolute -inset-4 bg-gold/20 rounded-full blur-2xl group-hover:blur-3xl transition-all duration-700"></div>
                    <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-24 h-24 object-contain relative drop-shadow-[0_0_20px_rgba(255,215,0,0.3)]">
                </div>
                
                <div class="flex flex-col items-center">
                    <h1 class="text-4xl font-black italic text-white uppercase tracking-tighter leading-none mb-3">
                        Nueva <span class="text-gold">Clave</span>
                    </h1>
                    <div class="flex items-center gap-3">
                        <span class="w-4 h-[1px] bg-white/20"></span>
                        <p class="text-[0.65rem] font-black text-white/40 uppercase tracking-[0.4em] italic">Seguridad de la Cuenta</p>
                        <span class="w-4 h-[1px] bg-white/20"></span>
                    </div>
                </div>
            </div>

            <div id="alert-container" class="mb-10"></div>

            <form id="reset-form" class="space-y-8">
                <!-- New Password -->
                <div class="premium-form-group">
                    <label class="premium-label ml-2">Nueva Contraseña</label>
                    <div class="relative group">
                        <i class="fas fa-lock-open absolute left-6 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                        <input type="password" id="new-password" required placeholder="MÍNIMO 6 CARACTERES" minlength="6"
                            class="premium-input pl-16 pr-16 font-black text-[0.85rem]">
                        <button type="button" class="pw-toggle-btn" id="pw-toggle">
                            <i class="fas fa-eye-slash" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="premium-form-group">
                    <label class="premium-label ml-2">Confirmar Contraseña</label>
                    <div class="relative group">
                        <i class="fas fa-shield-halved absolute left-6 top-1/2 -translate-y-1/2 text-gold/30 group-focus-within:text-gold transition-colors"></i>
                        <input type="password" id="confirm-password" required placeholder="REPITA LA CLAVE" minlength="6"
                            class="premium-input pl-16 pr-16 font-black text-[0.85rem]">
                        <button type="button" class="pw-toggle-btn" id="pw-confirm-toggle">
                            <i class="fas fa-eye-slash" id="pw-confirm-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="reset-button" 
                    class="w-full py-5 bg-gold text-[#004d98] rounded-2xl font-black uppercase text-[0.85rem] tracking-[0.2em] shadow-2xl shadow-gold/20 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-4 group">
                    <span class="button-text">Actualizar Credenciales</span>
                    <i class="fas fa-check-circle group-hover:scale-110"></i>
                    <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                </button>
            </form>

            <div class="mt-12 text-center">
                <a href="/admin/login.html" class="text-[0.6rem] font-black text-white/20 uppercase tracking-[0.4em] hover:text-gold transition-all flex items-center justify-center gap-3 italic">
                    <i class="fas fa-arrow-left text-[0.5rem]"></i> Cancelar e Ir al Login
                </a>
            </div>
        </div>

        <p class="mt-8 text-center text-[0.6rem] font-bold text-white/20 uppercase tracking-[0.5em] italic">
            DIBA FBC — CRYPTO CORE v2.0
        </p>
    </div>

    <!-- Scripts -->
    <script src="/scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "/scripts/auth.js";
        import { supabase } from "/scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('spinner');
        const btnText = resetBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            const isError = type === 'error';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-4 p-5 rounded-2xl border ${isError ? 'bg-red-500/10 border-red-500/20 text-red-500' : 'bg-green-500/10 border-green-500/20 text-green-500'} animate-fade-in shadow-xl">
                    <i class="fas ${isError ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i>
                    <p class="text-[0.65rem] font-black uppercase tracking-widest leading-relaxed">${message}</p>
                </div>
            `;
        };

        // Recovery session check
        if (supabase) {
            supabase.auth.onAuthStateChange((event, session) => {
                if (event == 'PASSWORD_RECOVERY') {
                    showAlert('Sesión de recuperación activa. Ingrese su nueva clave.', 'success');
                }
            });
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            alertContainer.innerHTML = '';

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Procesando...';

            try {
                await actualizarPassword(newPassword);
                btnText.textContent = '¡Clave Actualizada!';
                showAlert('Seguridad actualizada con éxito. Redirigiendo...', 'success');
                setTimeout(() => window.location.replace('/admin/login.html'), 2000);
            } catch (error) {
                console.error("Reset error:", error);
                showAlert(error.message.toUpperCase());
                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Actualizar Credenciales';
            }
        });

        // Toggle visibility
        const setupToggle = (btnId, inputId, iconId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            btn.addEventListener('click', () => {
                const isShown = input.type === 'text';
                input.type = isShown ? 'password' : 'text';
                icon.className = isShown ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        };

        setupToggle('pw-toggle', 'new-password', 'pw-icon');
        setupToggle('pw-confirm-toggle', 'confirm-password', 'pw-confirm-icon');

        // Particles
        const container = document.getElementById('particles-container');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (5 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            p.style.opacity = Math.random() * 0.3;
            container.appendChild(p);
        }
    </script>
</body>

</html>
