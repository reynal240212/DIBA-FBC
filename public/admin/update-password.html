<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad de Cuenta - DIBA FBC</title>
    <link rel="icon" href="../images/ESCUDO.ico" type="image/x-icon">
    
    <!-- Core & Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
</head>
<body class="bg-slate-50 font-['Montserrat'] min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-md w-full animate-fade-up">
        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-premium p-10 relative overflow-hidden text-center">
            <!-- Decorative BG -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#003366]/5 rounded-bl-[5rem] -mr-10 -mt-10"></div>
            
            <div class="relative mb-8">
                <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100 ring-4 ring-white">
                    <img src="../images/ESCUDO.png" alt="Logo" class="w-12">
                </div>
                <h2 class="text-2xl font-black uppercase italic text-[#003366] tracking-tight">Nueva <span class="text-[#FFD700]">Clave</span></h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Protección de Cuenta DIBA FBC</p>
            </div>

            <form id="reset-form" class="space-y-6 text-left">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Nueva Contraseña</label>
                    <div class="relative">
                        <input type="password" id="new-password" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm" placeholder="Mínimo 6 caracteres" required minlength="6">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-[#003366] transition-colors" id="pw-toggle">
                            <i class="fas fa-eye-slash" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1 italic">Confirmar Contraseña</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" class="w-full bg-slate-50 border-transparent rounded-2xl p-4 pl-12 text-xs font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm" placeholder="Repite la contraseña" required minlength="6">
                        <i class="fas fa-shield-check absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    </div>
                </div>

                <div id="alert-container" class="hidden animate-fade-up"></div>

                <button type="submit" id="reset-button" class="w-full bg-[#003366] text-white rounded-2xl py-4 px-8 text-[11px] font-black uppercase tracking-[0.2em] italic hover:bg-[#002244] transition-all flex items-center justify-center gap-3 group shadow-lg shadow-[#003366]/20 mt-8">
                    <i class="fas fa-check-circle group-hover:scale-110 transition-transform text-[#FFD700]"></i>
                    <span id="button-text">Actualizar Clave</span>
                    <div id="button-spinner" class="hidden w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-50">
                <a href="login.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-[#003366] transition-all flex items-center justify-center gap-2 italic">
                    <i class="fas fa-arrow-left"></i> Volver al Acceso
                </a>
            </div>
        </div>
        
        <p class="text-center mt-8 text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">Built by DIBA AI — 2024</p>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { supabase } from "../scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = document.getElementById('button-spinner');
        const btnText = document.getElementById('button-text');

        const showAlert = (message, isError = true) => {
            alertContainer.className = `p-4 rounded-xl border flex items-center gap-3 ${isError ? 'bg-rose-50 border-rose-100 text-rose-500' : 'bg-emerald-50 border-emerald-100 text-emerald-500'}`;
            alertContainer.innerHTML = `
                <i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
                <p class="text-[9px] font-black uppercase tracking-widest">${message}</p>
            `;
            alertContainer.classList.remove('hidden');
        };

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.classList.add('opacity-50');
            alertContainer.classList.add('hidden');

            try {
                const { error } = await supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;

                showAlert('¡Contraseña actualizada con éxito!', false);
                btnText.textContent = 'Correcto';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (error) {
                showAlert(error.message || 'Error al actualizar contraseña');
                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.classList.remove('opacity-50');
            }
        });

        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('new-password');
        const confirmInput = document.getElementById('confirm-password');
        const pwIcon = document.getElementById('pw-icon');

        pwToggle.addEventListener('click', () => {
            const isText = pwInput.type === 'text';
            pwInput.type = isText ? 'password' : 'text';
            confirmInput.type = isText ? 'password' : 'text';
            pwIcon.className = isText ? 'fas fa-eye-slash' : 'fas fa-eye';
        });
    </script>
</body>
</html>
