<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña - DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { dibaGold: '#ffcc00', dibaBlue: '#002a40' }
                },
            },
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        .bg-soccer {
            background: linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.72)),
                url('https://cdn.britannica.com/51/190751-050-147B93F7/soccer-ball-goal.jpg');
            background-size: cover;
            background-position: center;
        }

        .particles-wrap {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 204, 0, .35);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: .6;
            }

            100% {
                transform: translateY(-10vh) translateX(60px) scale(0.5);
                opacity: 0;
            }
        }

        .pw-wrap {
            position: relative;
        }

        .pw-toggle {
            position: absolute;
            right: .9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: .9rem;
            padding: 0;
            transition: color .2s;
        }

        .pw-toggle:hover {
            color: #002a40;
        }
    </style>
</head>

<body class="bg-soccer min-h-screen flex items-center justify-center p-4 font-sans relative">

    <div class="particles-wrap" id="particles"></div>

    <div class="w-full max-w-md animate__animated animate__fadeInUp">
        <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/20">

            <div class="bg-slate-900 p-8 text-center">
                <img src="/images/ESCUDO.png" alt="DIBA FBC" class="w-20 mx-auto mb-4 drop-shadow-lg">
                <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter">Nueva Contraseña</h2>
                <p class="text-dibaGold text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Recuperación de Acceso
                </p>
            </div>

            <div class="p-8">
                <div id="alert-container" class="mb-6"></div>

                <form id="reset-form" class="space-y-6">
                    <div>
                        <label for="new-password"
                            class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Nueva
                            Contraseña</label>
                        <div class="relative pw-wrap">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-lock text-sm"></i>
                            </span>
                            <input type="password" id="new-password" required placeholder="Mínimo 6 caracteres"
                                minlength="6"
                                class="w-full pl-11 pr-12 py-4 rounded-2xl bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white focus:outline-none transition-all font-bold text-slate-700 placeholder:font-normal placeholder:text-slate-400">
                            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye" id="pw-icon"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label for="confirm-password"
                            class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Confirmar
                            Contraseña</label>
                        <div class="relative pw-wrap">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-shield-alt text-sm"></i>
                            </span>
                            <input type="password" id="confirm-password" required placeholder="Repite la contraseña"
                                minlength="6"
                                class="w-full pl-11 pr-12 py-4 rounded-2xl bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white focus:outline-none transition-all font-bold text-slate-700 placeholder:font-normal placeholder:text-slate-400">
                            <button type="button" class="pw-toggle" id="pw-confirm-toggle"
                                aria-label="Mostrar contraseña">
                                <i class="fas fa-eye" id="pw-confirm-icon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="reset-button"
                        class="group w-full bg-dibaGold hover:bg-yellow-400 text-slate-900 font-black py-4 rounded-2xl shadow-lg shadow-yellow-500/20 hover:shadow-yellow-500/40 transform hover:-translate-y-1 transition-all flex items-center justify-center gap-3 uppercase italic tracking-widest">
                        <span class="button-text">Guardar Contraseña</span>
                        <i class="fas fa-check group-hover:translate-x-1 transition-transform"></i>
                        <i class="fas fa-circle-notch fa-spin hidden spinner"></i>
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center mt-6">
            <a href="/admin/login.html"
                class="text-white/60 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Volver al Login
            </a>
        </p>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { actualizarPassword } from "/scripts/auth.js";
        import { supabase } from "/scripts/supabaseClient.js";

        const resetForm = document.getElementById('reset-form');
        const resetBtn = document.getElementById('reset-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = resetBtn.querySelector('.spinner');
        const btnText = resetBtn.querySelector('.button-text');

        const showAlert = (message, type = 'error') => {
            const bgColor = type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700';
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            alertContainer.innerHTML = `
        <div class="flex items-center gap-3 p-4 rounded-2xl border ${bgColor} animate__animated animate__shakeX">
          <i class="fas ${icon}"></i>
          <p class="text-xs font-bold">${message}</p>
        </div>
      `;
        };

        // Verificar si existe el session o token de recuperación
        supabase.auth.onAuthStateChange((event, session) => {
            if (event == 'PASSWORD_RECOVERY') {
                showAlert('Sesión de recuperación verificada. Ingrese su nueva contraseña.', 'success');
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            alertContainer.innerHTML = '';

            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden. Inténtalo de nuevo.', 'error');
                return;
            }

            resetBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Guardando...';

            try {
                await actualizarPassword(newPassword);
                btnText.textContent = '¡Actualizado!';
                showAlert('Contraseña actualizada con éxito. Ya puedes iniciar sesión...', 'success');

                setTimeout(() => {
                    window.location.replace('/admin/login.html');
                }, 2000);

            } catch (error) {
                console.error("Reset error:", error);
                showAlert(error.message);

                resetBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Guardar Contraseña';
            }
        });

        // Partículas
        const wrap = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (6 + Math.random() * 8) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            p.style.width = p.style.height = (3 + Math.random() * 4) + 'px';
            wrap.appendChild(p);
        }

        // Toggle contraseñas
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('new-password');
        const pwIcon = document.getElementById('pw-icon');

        const pwConfirmToggle = document.getElementById('pw-confirm-toggle');
        const pwConfirmInput = document.getElementById('confirm-password');
        const pwConfirmIcon = document.getElementById('pw-confirm-icon');

        pwToggle.addEventListener('click', () => {
            const shown = pwInput.type === 'text';
            pwInput.type = shown ? 'password' : 'text';
            pwIcon.className = shown ? 'fas fa-eye' : 'fas fa-eye-slash';
        });

        pwConfirmToggle.addEventListener('click', () => {
            const shown = pwConfirmInput.type === 'text';
            pwConfirmInput.type = shown ? 'password' : 'text';
            pwConfirmIcon.className = shown ? 'fas fa-eye' : 'fas fa-eye-slash';
        });
    </script>
</body>

</html>
