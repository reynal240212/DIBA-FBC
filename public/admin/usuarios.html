<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — DIBA FBC Admin</title>
    <link rel="icon" href="/images/ESCUDO.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin-common.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        dibaGold: 'var(--gold)',
                        dibaBlue: 'var(--blue)',
                        dibaDark: 'var(--bg-main)',
                        dibaDark2: 'var(--bg-panel)',
                        dibaDark3: 'var(--bg-input)',
                        dibaText: 'var(--text-main)',
                        dibaMuted: 'var(--text-muted)'
                    }
                },
            },
        }
    </script>
    <style>
        /* DASHBOARD SPECIFIC OR OVERRIDES */
        .sidebar.open {
            transform: translateX(0);
        }
        
        #admin-body {
            background: var(--bg-main);
            color: var(--text-main);
        }
        
        .main-content {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: var(--bg-panel);
            margin: 10% auto;
            padding: 2rem;
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            color: var(--text-main);
        }
    </style>
</head>
    <body class="bg-white font-['Inter']">
        <!-- Loader -->
        <div id="app-loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-[#06090e]">
            <div class="text-center animate-fade-up">
                <div class="relative w-16 h-16 mx-auto mb-6">
                    <div class="absolute inset-0 border-4 border-gold/10 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-t-gold rounded-full animate-spin"></div>
                </div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gold italic opacity-80">Sincronizando Usuarios...</p>
            </div>
        </div>

    <div id="admin-nav"></div>
    <main class="lg:ml-[280px] min-h-screen">
            <div id="alert-bar"
                class="hidden mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold uppercase tracking-wider items-center gap-3">
            </div>

            <div class="panel glass animate-fade-up" style="border-radius: 32px; overflow: hidden;">
                <div class="px-6 py-5 border-b border-white/5 flex items-center justify-between bg-white/[0.02]">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-dibaGold/10 text-dibaGold flex items-center justify-center">
                            <i class="fas fa-users-cog"></i>
                        </div>
                        <span class="text-xs font-black uppercase tracking-widest">Lista de Usuarios</span>
                    </div>
                    <span
                        class="px-4 py-1.5 rounded-full bg-dibaGold/10 text-dibaGold text-[10px] font-black uppercase tracking-widest"
                        id="count-badge">cargando...</span>
                </div>

                <div class="overflow-x-auto">
                    <div id="loading-state" class="flex flex-col items-center justify-center py-20 gap-4 opacity-50">
                        <i class="fas fa-circle-notch fa-spin text-3xl text-dibaGold"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Sincronizando base de datos...</span>
                    </div>

                    <table id="usersTable" class="hidden w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200 text-[10px] uppercase font-black tracking-[0.2em] text-slate-500">
                            <tr>
                                <th class="px-6 py-4">Ref ID</th>
                                <th class="px-6 py-4">Usuario</th>
                                <th class="px-6 py-4">Nombre Completo</th>
                                <th class="px-6 py-4">Rol</th>
                                <th class="px-6 py-4">Registro</th>
                                <th class="px-6 py-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody" class="divide-y divide-slate-100 italic"></tbody>
                    </table>

                    <div id="empty-state" class="hidden flex-col items-center justify-center py-20 gap-4 opacity-50">
                        <i class="fas fa-user-slash text-4xl"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">No se encontraron
                            registros</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        initAdminLayout();
    </script>
    <script type="module" src="/src/features/users/admin.js"></script>

    <!-- Modal de Activación -->
    <div id="activation-modal" class="modal">
        <div class="modal-content animate__animated animate__zoomIn animate__faster">
            <h3 class="text-xl font-black italic uppercase text-dibaGold mb-4">Activar <span id="modal-username" class="text-dibaText"></span></h3>
            <p class="text-xs font-bold text-dibaMuted uppercase tracking-widest mb-6">Selecciona hasta cuándo estará activo este usuario:</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-dibaMuted mb-2 block">Fecha de Vencimiento</label>
                    <input type="date" id="expiration-date" class="form-control w-full bg-slate-100/10 border-white/10 text-dibaText p-3 rounded-xl outline-none focus:ring-2 focus:ring-dibaGold">
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button id="cancel-activation" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest text-dibaMuted hover:bg-white/5 rounded-xl transition-all">Cancelar</button>
                    <button id="confirm-activation" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest bg-dibaGold text-dibaBlue rounded-xl hover:scale-[1.02] transition-all">Activar Usuario</button>
                </div>
            </div>
        </div>
</body>

</html>
