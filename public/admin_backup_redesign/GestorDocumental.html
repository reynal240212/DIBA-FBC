<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Documental — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Gestor <span class="text-diba-red">Documental</span></h2>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-1">Administración de archivos y certificados</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="upload-btn" class="bg-diba-gold text-diba-blue px-6 py-3 rounded-xl font-black italic uppercase text-xs shadow-lg shadow-yellow-500/20 hover:scale-105 transition-all">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> Subir Documento
                    </button>
                </div>
            </div>

            <!-- Dashboard Filters -->
            <div class="flex flex-wrap gap-4">
                <button class="px-6 py-2.5 rounded-full bg-diba-blue text-white text-[10px] font-black uppercase tracking-widest italic shadow-lg shadow-blue-900/10">Todos</button>
                <button class="px-6 py-2.5 rounded-full bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest italic hover:bg-slate-100 transition-all">Certificados</button>
                <button class="px-6 py-2.5 rounded-full bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest italic hover:bg-slate-100 transition-all">Contratos</button>
                <button class="px-6 py-2.5 rounded-full bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest italic hover:bg-slate-100 transition-all">Identificaciones</button>
            </div>

            <!-- Documents Grid -->
            <div id="docs-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Skeleton Loader -->
                <div class="bg-slate-50 animate-pulse h-48 rounded-[2rem] border border-slate-100"></div>
                <div class="bg-slate-50 animate-pulse h-48 rounded-[2rem] border border-slate-100"></div>
                <div class="bg-slate-50 animate-pulse h-48 rounded-[2rem] border border-slate-100"></div>
                <div class="bg-slate-50 animate-pulse h-48 rounded-[2rem] border border-slate-100"></div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            fetchDocuments();
        }

        async function fetchDocuments() {
            try {
                const { data: files, error } = await supabase.storage.from('jugadores').list('documentos');
                if (error) throw error;
                renderDocuments(files || []);
            } catch (error) {
                console.error("Fetch Docs Error:", error);
            }
        }

        function renderDocuments(files) {
            const grid = document.getElementById('docs-grid');
            if (files.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-xs font-bold text-slate-400 italic bg-slate-50 rounded-[2.5rem] border border-slate-100 border-dashed">No se encontraron documentos almacenados</div>';
                return;
            }

            grid.innerHTML = files.map(f => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-50 shadow-premium group hover:border-diba-blue/20 transition-all flex flex-col items-center text-center cursor-pointer">
                    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-diba-blue mb-4 group-hover:bg-diba-blue group-hover:text-white transition-all shadow-inner">
                        <i class="fas fa-file-pdf text-2xl"></i>
                    </div>
                    <div class="text-[10px] font-black text-diba-blue uppercase tracking-tighter italic truncate w-full mb-1">${f.name}</div>
                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${(f.metadata?.size / 1024 / 1024).toFixed(2)} MB</div>
                    <div class="mt-4 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                        <button class="w-8 h-8 rounded-lg bg-diba-gold text-diba-blue flex items-center justify-center shadow-sm"><i class="fas fa-eye text-xs"></i></button>
                        <button class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 flex items-center justify-center border border-slate-100"><i class="fas fa-download text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        init();
    </script>
</body>
</html>
