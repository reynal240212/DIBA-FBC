<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Admin — DIBA FBC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="../images/ESCUDO.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Core & Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">

    <style>
        body {
            background-color: #F4F7FA;
            background-image: radial-gradient(at 0% 0%, rgba(255, 215, 0, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(0, 51, 102, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .login-card {
            background: white;
            border-radius: 3rem;
            border: 1px solid rgba(0, 51, 102, 0.05);
            box-shadow: 0 40px 100px -20px rgba(0, 51, 102, 0.1);
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            transition: color 0.3s ease;
        }

        .input-group-custom input:focus + i {
            color: #FFD700;
        }

        .pw-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .pw-toggle:hover {
            background: #F1F5F9;
            color: #003366;
        }

        /* Float Particles */
        .particle {
            position: absolute;
            background: #FFD700;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 0.2; }
            80% { opacity: 0.1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>

<body class="selection:bg-dibaGold/30">

    <div id="particles" class="fixed inset-0 z-0"></div>

    <div class="w-full max-w-[480px] z-10 p-6 animate__animated animate__fadeIn">
        <div class="login-card p-10 md:p-14 relative overflow-hidden group">
            <!-- Decorative Accent -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#003366] via-[#FFD700] to-[#003366]"></div>

            <div class="text-center mb-12">
                <div class="inline-block p-5 bg-slate-50 rounded-3xl mb-6 border border-slate-100 shadow-sm animate__animated animate__zoomIn">
                    <img src="../images/ESCUDO.png" alt="DIBA FBC" class="w-20 drop-shadow-md">
                </div>
                <h2 class="text-3xl font-black text-[#003366] uppercase italic tracking-tighter leading-none mb-3">
                    Panel <span class="text-[#FFD700]">Admin</span>
                </h2>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Gestión Deportiva Integral</p>
            </div>

            <div id="alert-container" class="mb-8 empty:hidden animate__animated animate__fadeIn"></div>

            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 italic">Credencial de Acceso</label>
                    <div class="input-group-custom group">
                        <i class="fas fa-at"></i>
                        <input type="text" id="login-username" required placeholder="Usuario o Correo"
                               class="w-full pl-12 pr-6 py-4 bg-slate-50 border-transparent rounded-2xl text-sm font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm placeholder:text-slate-300">
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between px-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Contraseña</label>
                        <a href="#" id="forgot-link" class="text-[9px] text-slate-400 hover:text-[#003366] font-black uppercase tracking-wider transition-colors italic">¿Olvidaste la clave?</a>
                    </div>
                    <div class="input-group-custom group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="login-password" required placeholder="••••••••"
                               class="w-full pl-12 pr-14 py-4 bg-slate-50 border-transparent rounded-2xl text-sm font-bold text-[#003366] outline-none focus:ring-2 focus:ring-[#FFD700]/20 transition-all shadow-sm placeholder:text-slate-300">
                        <button type="button" class="pw-toggle" id="pw-toggle">
                            <i class="fas fa-eye-slash" id="pw-icon" style="position:static; transform:none; color:inherit;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-button"
                        class="w-full bg-[#003366] text-white font-black py-4 rounded-2xl shadow-lg shadow-[#003366]/20 hover:bg-[#002244] transform hover:-translate-y-1 transition-all flex items-center justify-center gap-3 uppercase italic tracking-[0.2em] text-[11px] group relative overflow-hidden mt-8">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                    <span class="button-text relative z-10">Acceder al Sistema</span>
                    <i class="fas fa-arrow-right text-[10px] text-[#FFD700] group-hover:translate-x-1 transition-transform relative z-10"></i>
                    <i class="fas fa-circle-notch fa-spin hidden spinner text-xs relative z-10"></i>
                </button>
            </form>
        </div>

        <div class="flex flex-col items-center gap-6 mt-10">
            <a href="/" class="text-slate-400 hover:text-[#003366] text-[10px] font-black uppercase tracking-[0.3em] transition-all flex items-center gap-3 group italic">
                <i class="fas fa-home transition-transform group-hover:-translate-x-1 text-[#FFD700]"></i> 
                <span>Regresar al Sitio Público</span>
            </a>
            
            <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest text-center">
                © 2024 DIBA FBC — SISTEMA DE GESTIÓN INTERNA
            </p>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script type="module">
        import { iniciarSesion, enviarCorreoRecuperacion } from "../scripts/auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-button');
        const alertContainer = document.getElementById('alert-container');
        const spinner = loginBtn.querySelector('.spinner');
        const btnText = loginBtn.querySelector('.button-text');
        const btnIcon = loginBtn.querySelector('.fa-arrow-right');

        const showAlert = (message, type = 'error') => {
            const statusColor = type === 'error' ? 'bg-rose-50 text-rose-500 border-rose-100' : 'bg-emerald-50 text-emerald-500 border-emerald-100';
            const icon = type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle';
            alertContainer.innerHTML = `
                <div class="flex items-center gap-4 p-5 rounded-2xl border ${statusColor} animate__animated animate__headShake shadow-sm">
                    <i class="fas ${icon} text-lg"></i>
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-wider leading-none mb-1">${type === 'error' ? 'Error de Acceso' : 'Éxito'}</p>
                        <p class="text-[11px] font-bold">${message}</p>
                    </div>
                </div>
            `;
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnIcon.classList.add('hidden');
            btnText.textContent = 'Verificando...';
            alertContainer.innerHTML = '';

            try {
                await iniciarSesion(username, password);
                btnText.textContent = '¡Bienvenido!';
                showAlert('Credenciales validadas. Iniciando sesión...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error("Login error:", error);
                const msg = error.message === 'Invalid login credentials' ? 'Las credenciales no coinciden con nuestros registros.' : error.message;
                showAlert(msg);
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnIcon.classList.remove('hidden');
                btnText.textContent = 'Acceder al Sistema';
            }
        });

        // Enlace de "¿Olvidaste tu contraseña?"
        const forgotLink = document.getElementById('forgot-link');
        forgotLink.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-username').value.trim();

            if (!email) {
                showAlert('Por favor ingresa tu correo electrónico en el campo superior.', 'error');
                return;
            }

            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnIcon.classList.add('hidden');
            btnText.textContent = 'Enviando...';
            alertContainer.innerHTML = '';

            try {
                await enviarCorreoRecuperacion(email);
                showAlert('Se ha enviado un correo con instrucciones para restablecer tu contraseña.', 'success');
            } catch (error) {
                showAlert('Error al procesar solicitud: ' + error.message, 'error');
            } finally {
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnIcon.classList.remove('hidden');
                btnText.textContent = 'Acceder al Sistema';
            }
        });

        // Partículas
        const wrap = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            wrap.appendChild(p);
        }

        // Toggle contraseña
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('login-password');
        const pwIcon = document.getElementById('pw-icon');
        pwToggle.addEventListener('click', () => {
            const shown = pwInput.type === 'text';
            pwInput.type = shown ? 'password' : 'text';
            pwIcon.className = shown ? 'fas fa-eye-slash' : 'fas fa-eye';
        });
    </script>
</body>
</html>
