<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-4xl mx-auto">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                <!-- Profile Side -->
                <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium p-8 text-center flex flex-col items-center">
                    <div class="w-32 h-32 rounded-3xl bg-gradient-to-br from-diba-blue to-diba-red p-1 mb-6 shadow-xl relative group">
                        <div class="w-full h-full rounded-[1.4rem] bg-white flex items-center justify-center text-4xl font-black text-diba-blue italic overflow-hidden">
                            <span id="user-initial">A</span>
                        </div>
                        <button class="absolute -right-2 -bottom-2 w-10 h-10 rounded-xl bg-diba-gold text-diba-blue flex items-center justify-center shadow-lg border-2 border-white hover:scale-110 transition-all opacity-0 group-hover:opacity-100"><i class="fas fa-camera"></i></button>
                    </div>
                    <h3 class="text-xl font-black text-diba-blue italic tracking-tighter uppercase mb-1" id="user-display-name">Cargando...</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-6" id="user-role-name">Rol del Usuario</p>
                    
                    <div class="w-full space-y-3">
                        <a href="update-password.html" class="w-full block py-4 rounded-2xl bg-slate-50 text-diba-blue text-[10px] font-black uppercase tracking-widest italic hover:bg-slate-100 transition-all border border-slate-100 shadow-sm">
                            <i class="fas fa-key mr-2 text-diba-red"></i> Seguridad
                        </a>
                        <button class="w-full py-4 rounded-2xl bg-rose-50 text-rose-500 text-[10px] font-black uppercase tracking-widest italic hover:bg-rose-500 hover:text-white transition-all border border-rose-100 shadow-sm">
                            <i class="fas fa-power-off mr-2"></i> Salir
                        </button>
                    </div>
                </div>

                <!-- Profile Info -->
                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium p-10">
                        <h4 class="text-xs font-black text-diba-blue italic uppercase tracking-tighter mb-8 flex items-center gap-3">
                            <i class="fas fa-id-card-clip text-diba-red"></i> Información de Cuenta
                        </h4>
                        
                        <div class="space-y-6">
                            <div class="grid grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest ml-1">Username</label>
                                    <div class="bg-slate-50 p-4 rounded-2xl text-[11px] font-black text-diba-blue border border-slate-100" id="profile-username">---</div>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest ml-1">Registro</label>
                                    <div class="bg-slate-50 p-4 rounded-2xl text-[11px] font-black text-diba-blue border border-slate-100" id="profile-created">---</div>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest ml-1">Permissions</label>
                                <div class="bg-slate-50 p-4 rounded-2xl text-[10px] font-bold text-slate-500 border border-slate-100 flex items-center gap-3">
                                    <i class="fas fa-check-circle text-emerald-500"></i> Acceso total a base de datos de jugadores
                                </div>
                                <div class="bg-slate-50 p-4 rounded-2xl text-[10px] font-bold text-slate-500 border border-slate-100 flex items-center gap-3">
                                    <i class="fas fa-check-circle text-emerald-500"></i> Gestión de planillas y asistencia
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            loadProfile(session.user);
        }

        async function loadProfile(user) {
            const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
            if (profile) {
                document.getElementById('user-display-name').textContent = profile.username || profile.full_name;
                document.getElementById('user-role-name').textContent = profile.role || 'Club Member';
                document.getElementById('profile-username').textContent = profile.username || user.email;
                document.getElementById('profile-created').textContent = new Date(profile.created_at).toLocaleDateString();
                document.getElementById('user-initial').textContent = (profile.username || 'A')[0].toUpperCase();
            }
        }
        init();
    </script>
</body>
</html>
