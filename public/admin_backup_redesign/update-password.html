<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocatorias — DIBA FBC Admin</title>
    <link rel="icon" href="../images/ESCUDO.ico">
    
    <!-- Core & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/admin-common.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'diba-blue': '#004d98',
                        'diba-red': '#a50044',
                        'diba-gold': '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-['Inter']">
    <div id="admin-nav"></div>

    <main class="lg:ml-[280px] min-h-screen transition-all duration-300 bg-white">
        <div class="p-6 lg:p-10 space-y-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h2 class="text-3xl font-black text-diba-blue italic tracking-tighter uppercase">Gestión de <span class="text-diba-red">Convocados</span></h2>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-1">Selección oficial para próximos encuentros</p>
                </div>
                <div class="flex items-center gap-3">
                    <button class="bg-diba-gold text-diba-blue px-6 py-3 rounded-xl font-black italic uppercase text-xs shadow-lg shadow-yellow-500/20 hover:scale-105 transition-all">
                        <i class="fas fa-bullhorn mr-2"></i> Publicar Convocatoria
                    </button>
                    <button class="bg-white border border-slate-100 text-diba-blue px-6 py-3 rounded-xl font-black italic uppercase text-xs shadow-sm hover:bg-slate-50 transition-all">
                        <i class="fas fa-history mr-2 text-diba-red"></i> Historial
                    </button>
                </div>
            </div>

            <!-- Main Layout -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- Filters Side -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium p-8">
                        <h3 class="text-xs font-black text-diba-blue italic uppercase tracking-tighter mb-6">Filtros Activos</h3>
                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest ml-1">Categoría</label>
                                <select class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 shadow-sm cursor-pointer appearance-none">
                                    <option>Sub-17 Elite</option>
                                    <option>Sub-15 Inf.</option>
                                    <option>Categoría Libre</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest ml-1">Posición</label>
                                <select class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-xs font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/20 shadow-sm cursor-pointer appearance-none">
                                    <option>Todos</option>
                                    <option>Porteros</option>
                                    <option>Defensas</option>
                                    <option>Volantes</option>
                                    <option>Delanteros</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Selection Area -->
                <div class="lg:col-span-3 space-y-6">
                    <div class="bg-white rounded-[2.5rem] border border-slate-50 shadow-premium overflow-hidden">
                        <div class="p-8 border-b border-slate-50 bg-slate-50/20 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="text-xs font-black text-diba-blue italic uppercase tracking-tighter">Listado de Jugadores <span class="text-diba-red">(0 seleccionados)</span></div>
                            <div class="relative w-full md:w-64">
                                <input type="text" placeholder="Filtrar por nombre..." class="w-full bg-white border border-slate-100 rounded-xl px-5 py-2 pl-12 text-[10px] font-bold text-diba-blue outline-none focus:ring-2 focus:ring-diba-gold/10 shadow-sm">
                                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-200"></i>
                            </div>
                        </div>
                        <div class="p-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="selection-grid">
                                <!-- Skeleton -->
                                <div class="bg-slate-50 animate-pulse h-20 rounded-2xl"></div>
                                <div class="bg-slate-50 animate-pulse h-20 rounded-2xl"></div>
                                <div class="bg-slate-50 animate-pulse h-20 rounded-2xl"></div>
                                <div class="bg-slate-50 animate-pulse h-20 rounded-2xl"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script type="module">
        import { initAdminLayout } from '../src/components/layout/admin-layout.js';
        import { requireAdmin } from '../scripts/supabaseClient.js';
        
        async function init() {
            const session = await requireAdmin();
            if (!session) return;
            initAdminLayout();
            fetchPlayers();
        }

        async function fetchPlayers() {
            const { data: players } = await supabase.from('jugadores').select('*').order('nombre', { ascending: true });
            renderPlayers(players || []);
        }

        function renderPlayers(players) {
            const grid = document.getElementById('selection-grid');
            if (players.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-10 text-center text-[10px] font-bold text-slate-300 italic">No hay jugadores para mostrar</div>';
                return;
            }

            grid.innerHTML = players.map(p => `
                <div class="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl hover:border-diba-blue/20 transition-all group cursor-pointer shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-diba-blue text-xs font-black italic border border-slate-50 group-hover:bg-diba-blue group-hover:text-white transition-colors">
                            ${(p.nombre || 'J')[0]}
                        </div>
                        <div>
                            <div class="text-[10px] font-black text-diba-blue italic uppercase tracking-tighter">${p.nombre}</div>
                            <div class="text-[8px] font-bold text-slate-300 uppercase tracking-widest">${p.posicion || 'Posición' }</div>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-8 h-4 bg-slate-100 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-diba-red"></div>
                    </label>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
