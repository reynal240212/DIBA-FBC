<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat DIBA - Comunidad FBC</title>

    <!-- Tailwind CSS (via CDN for simplicity, but using the project's vibe) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            /* slate-900 */
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-height {
            height: calc(100vh - 180px);
        }

        .message-bubble {
            max-width: 80%;
            transition: all 0.2s ease;
        }

        #messages-container::-webkit-scrollbar {
            width: 6px;
        }

        #messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages-container::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.3);
            border-radius: 10px;
        }

        #messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.5);
        }

        .typing-indicator span {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #f59e0b;
            border-radius: 50%;
            margin-right: 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body class="text-slate-200">
    <div id="navbar-container"></div>

    <div class="pt-24 pb-8 px-4 overflow-hidden">
        <div class="max-w-4xl mx-auto">

            <!-- Header do Chat -->
            <div class="glass rounded-t-2xl p-4 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div
                            class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-slate-900 font-bold shadow-lg shadow-amber-500/20">
                            <i class="fas fa-users"></i>
                        </div>
                        <div
                            class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-slate-900 rounded-full">
                        </div>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg text-white leading-tight">Chat General DIBA</h1>
                        <p class="text-xs text-slate-400 flex items-center gap-1">
                            <i class="fas fa-circle text-[6px] text-green-500"></i>
                            Comunidad activa
                        </p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button
                        class="w-10 h-10 rounded-full hover:bg-white/5 flex items-center justify-center transition-colors">
                        <i class="fas fa-ellipsis-v text-slate-400"></i>
                    </button>
                </div>
            </div>

            <!-- Messages List -->
            <div id="messages-container" class="glass h-[60vh] md:h-[65vh] overflow-y-auto p-6 flex flex-col gap-4">
                <!-- Los mensajes se cargarán aquí -->
                <div class="flex flex-col items-center justify-center h-full opacity-40 italic text-sm">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2 text-amber-500"></i>
                    Cargando conversación...
                </div>
            </div>

            <!-- Input Area -->
            <div class="glass rounded-b-2xl p-4 border-t border-white/5">
                <form id="chat-form" class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <input type="text" id="message-input" placeholder="Escribe un mensaje..."
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-sm"
                            autocomplete="off" />
                        <button type="button"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-amber-400">
                            <i class="far fa-face-smile"></i>
                        </button>
                    </div>
                    <button type="submit" id="send-btn"
                        class="w-12 h-12 bg-amber-500 text-slate-900 rounded-xl flex items-center justify-center hover:bg-amber-400 hover:scale-105 active:scale-95 transition-all shadow-lg shadow-amber-500/20">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
                <p id="error-msg" class="text-[10px] text-rose-500 mt-2 hidden"></p>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/loadComponents.js"></script>

    <script>
        const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.DIBA_CONFIG;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const errorMsg = document.getElementById('error-msg');

        let currentUser = null;

        // Inicializar
        async function initChat() {
            // Verificar sesión
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center p-8">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                            <i class="fas fa-lock text-slate-600 text-2xl"></i>
                        </div>
                        <h3 class="text-amber-400 font-bold mb-2">Acceso Restringido</h3>
                        <p class="text-xs text-slate-400 max-w-xs">Inicia sesión con Google para participar en el chat de la comunidad.</p>
                        <a href="index.html" class="mt-4 bg-white text-slate-900 px-6 py-2 rounded-full font-bold text-xs hover:bg-amber-400 transition-colors">Volver al Inicio</a>
                    </div>
                `;
                chatForm.classList.add('opacity-50', 'pointer-events-none');
                return;
            }

            currentUser = session.user;

            // Cargar mensajes iniciales
            await fetchMessages();

            // Suscribirse a tiempo real
            subscribeToMessages();
        }

        async function fetchMessages() {
            const { data, error } = await supabaseClient
                .from('mensajes')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            if (error) {
                console.error('Error fetching messages:', error);
                return;
            }

            messagesContainer.innerHTML = '';
            data.forEach(msg => appendMessage(msg));
            scrollToBottom();
        }

        function appendMessage(msg) {
            const isMe = currentUser && msg.user_id === currentUser.id;

            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;

            // Determinar nombre y avatar
            const name = msg.full_name || 'Usuario';
            const avatar = msg.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;

            div.innerHTML = `
                <div class="flex ${isMe ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-[85%]">
                    <img src="${avatar}" class="w-6 h-6 rounded-full border border-white/10" alt="Avatar">
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        ${!isMe ? `<span class="text-[10px] text-slate-500 ml-2 mb-1">${name}</span>` : ''}
                        <div class="message-bubble rounded-2xl px-4 py-2 text-sm ${isMe ? 'bg-amber-500 text-slate-900 font-medium' : 'bg-white/5 text-slate-200'}">
                            ${msg.content}
                        </div>
                        <span class="text-[9px] text-slate-600 mt-1 mx-2">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(div);
        }

        function subscribeToMessages() {
            supabaseClient
                .channel('public:mensajes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensajes' }, payload => {
                    appendMessage(payload.new);
                    scrollToBottom();
                })
                .subscribe();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const content = messageInput.value.trim();
            if (!content) return;

            messageInput.value = '';
            errorMsg.classList.add('hidden');

            const { error } = await supabaseClient
                .from('mensajes')
                .insert([{
                    content,
                    user_id: currentUser.id,
                    full_name: currentUser.user_metadata.full_name || currentUser.email,
                    avatar_url: currentUser.user_metadata.avatar_url
                }]);

            if (error) {
                errorMsg.innerText = "Error al enviar: " + error.message;
                errorMsg.classList.remove('hidden');
                console.error('Error sending message:', error);
            }
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        chatForm.addEventListener('submit', sendMessage);

        document.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>

</html>
