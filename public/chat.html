<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIBA Social - Chat & Comunidad</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .active-channel {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #f59e0b;
            color: #f59e0b;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.2);
            border-radius: 10px;
        }

        /* Animación para estados */
        .story-ring {
            padding: 2px;
            border: 2px solid #f59e0b;
            border-radius: 50%;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #020617;
        }
    </style>
</head>

<body class="text-slate-200 overflow-hidden h-screen">
    <div id="navbar-container"></div>

    <div class="flex h-full pt-20">
        <!-- SIDEBAR IZQUIERDO: CANALES Y AJUSTES -->
        <aside class="hidden md:flex flex-col w-72 glass border-r border-white/5 h-full">
            <div class="p-6">
                <h2 class="text-xs font-black text-amber-500 uppercase tracking-[0.2em] mb-6">Canales</h2>
                <nav class="space-y-1">
                    <button onclick="switchChannel('general')" id="chan-general"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm active-channel">
                        <i class="fas fa-hashtag opacity-50"></i> General
                    </button>
                    <button onclick="switchChannel('padres')" id="chan-padres"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm">
                        <i class="fas fa-users-crown opacity-50"></i> Padres DIBA
                    </button>
                    <button onclick="switchChannel('jugadores')" id="chan-jugadores"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm">
                        <i class="fas fa-futbol opacity-50"></i> Jugadores
                    </button>
                </nav>

                <h2 class="text-xs font-black text-amber-500 uppercase tracking-[0.2em] mt-10 mb-6">Ajustes</h2>
                <div class="space-y-4 px-2">
                    <div class="flex items-center justify-between text-xs">
                        <span>Notificaciones</span>
                        <input type="checkbox" id="sett-notif" checked class="accent-amber-500">
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span>Sonidos</span>
                        <select id="sett-tone"
                            class="bg-transparent border-none outline-none text-amber-400 text-[10px] font-bold">
                            <option value="pop">Pop</option>
                            <option value="whistle">Silbato</option>
                            <option value="bell">Campana</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-auto p-6 border-t border-white/5">
                <div id="self-presence" class="flex items-center gap-3 opacity-60">
                    <img id="self-avatar" src="" class="w-8 h-8 rounded-full border border-white/20" alt="">
                    <div class="text-xs">
                        <p id="self-name" class="font-bold truncate w-32"></p>
                        <span class="text-[10px] text-green-500 flex items-center gap-1">
                            <i class="fas fa-circle text-[6px]"></i> En línea
                        </span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL: CHAT Y ESTADOS -->
        <main class="flex-1 flex flex-col h-full bg-slate-950/20 px-0 md:px-6">

            <!-- BARRA DE ESTADOS (STORIES) -->
            <div class="py-4 flex items-center gap-4 overflow-x-auto no-scrollbar border-b border-white/5">
                <!-- Botón Añadir Estado -->
                <button onclick="openStatusModal()" class="flex-shrink-0 flex flex-col items-center gap-1 ml-4">
                    <div
                        class="w-14 h-14 rounded-full border-2 border-dashed border-slate-700 flex items-center justify-center text-slate-500 hover:border-amber-500 hover:text-amber-500 transition-all">
                        <i class="fas fa-plus"></i>
                    </div>
                    <span class="text-[9px] font-bold uppercase">Mi Estado</span>
                </button>

                <div id="stories-list" class="flex items-center gap-4">
                    <!-- Los estados se cargarán aquí -->
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="flex-1 flex flex-col min-h-0 py-4">
                <div id="chat-header" class="flex items-center justify-between px-4 mb-4">
                    <div>
                        <h3 id="current-channel-name" class="font-black text-white text-xl"># General</h3>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">Chat privado del club</p>
                    </div>
                    <div class="flex -space-x-2">
                        <div id="online-users-avatars" class="flex items-center">
                            <!-- Avatares de gente online -->
                        </div>
                    </div>
                </div>

                <div id="messages-container" class="flex-1 overflow-y-auto px-4 space-y-4">
                    <!-- Mensajes -->
                </div>

                <!-- INPUT AREA -->
                <div class="p-4 bg-slate-900/40 rounded-3xl m-4 border border-white/5">
                    <form id="chat-form" class="flex items-center gap-3">
                        <button type="button" class="text-slate-400 hover:text-amber-500">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <input type="text" id="message-input" placeholder="Mensaje para el club..."
                            class="flex-1 bg-transparent border-none outline-none text-sm placeholder:text-slate-600"
                            autocomplete="off">
                        <button type="submit"
                            class="bg-amber-500 text-slate-950 p-3 rounded-2xl hover:bg-amber-400 shadow-xl shadow-amber-500/20 active:scale-95 transition-all">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE ESTADO -->
    <div id="status-modal"
        class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
        <div class="glass w-full max-w-sm rounded-3xl p-8 animate-in zoom-in-95 duration-300">
            <h2 class="text-xl font-black text-center mb-6 text-white">Publicar Estado</h2>

            <!-- Preview de contenido -->
            <div id="status-preview-container" class="hidden mb-4 relative">
                <img id="status-preview-img" src=""
                    class="w-full h-40 object-cover rounded-2xl border border-white/10 hidden">
                <video id="status-preview-vid" src=""
                    class="w-full h-40 object-cover rounded-2xl border border-white/10 hidden" muted loop
                    autoplay></video>
                <button onclick="clearStatusPreview()"
                    class="absolute top-2 right-2 bg-rose-500 text-white w-6 h-6 rounded-full text-xs">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <textarea id="status-text" placeholder="¿Qué estás pensando?"
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-amber-500 outline-none resize-none h-24 mb-4"></textarea>

            <!-- Botón de Cámara/Video -->
            <label
                class="w-full h-12 dashed-button flex items-center justify-center gap-2 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 hover:border-amber-500 hover:text-amber-500 transition-all cursor-pointer mb-6">
                <i class="fas fa-camera"></i>
                <span class="text-[10px] font-bold uppercase">Subir Foto / Video</span>
                <input type="file" id="status-file" accept="image/*,video/*" class="hidden"
                    onchange="previewStatusMedia(this)">
            </label>

            <div class="flex gap-3">
                <button onclick="closeStatusModal()"
                    class="flex-1 py-3 text-xs font-bold uppercase text-slate-500 hover:text-white transition-colors">Cancelar</button>
                <button id="btn-post-status" onclick="postStatus()"
                    class="flex-1 py-3 bg-amber-500 text-slate-950 rounded-xl text-xs font-black hover:bg-amber-400 active:scale-95 transition-all">PUBLICAR</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/loadComponents.js"></script>

    <script>
        const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.DIBA_CONFIG;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const errorMsg = document.getElementById('error-msg'); // Assuming this element exists or will be added

        let currentChannel = 'general';
        let currentUser = null;
        let userSettings = { notification_tone: 'pop', notifications_enabled: true };
        let msgSubscription = null;
        const msgContainer = document.getElementById('messages-container');
        const input = document.getElementById('message-input');

        // Registro de Service Worker para Notificaciones
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.log('Error SW', err));
        }

        // Inicializar
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = session.user;
            await loadSettings();

            // Perfil UI
            document.getElementById('self-name').innerText = currentUser.user_metadata.full_name || currentUser.email;
            document.getElementById('self-avatar').src = currentUser.user_metadata.avatar_url || `https://ui-avatars.com/api/?name=${currentUser.email}`;

            // Solicitar Permisos si están habilitados en settings
            if (userSettings.notifications_enabled && Notification.permission === 'default') {
                requestNotificationPermission();
            }

            // Suscribir canales
            await fetchMessages();
            await fetchStatuses();
            setupRealtime();
            setupPresence();
        }

        async function loadSettings() {
            const { data } = await supabaseClient
                .from('user_settings')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();

            if (data) {
                userSettings = data;
                document.getElementById('sett-notif').checked = data.notifications_enabled;
                document.getElementById('sett-tone').value = data.notification_tone;
            } else {
                // Crear settings por defecto
                await supabaseClient.from('user_settings').insert([{ user_id: currentUser.id }]);
            }
        }

        async function saveSettings() {
            const notifications_enabled = document.getElementById('sett-notif').checked;
            const notification_tone = document.getElementById('sett-tone').value;

            await supabaseClient.from('user_settings').upsert({
                user_id: currentUser.id,
                notifications_enabled,
                notification_tone,
                updated_at: new Date()
            });

            userSettings.notifications_enabled = notifications_enabled;
            userSettings.notification_tone = notification_tone;

            if (notifications_enabled && Notification.permission === 'default') {
                requestNotificationPermission();
            }
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') console.log('Notificaciones habilitadas');
            });
        }

        async function fetchMessages() {
            try {
                const { data, error } = await supabaseClient
                    .from('mensajes')
                    .select('*')
                    .eq('channel_id', currentChannel)
                    .order('created_at', { ascending: true })
                    .limit(50);

                if (error) throw error;

                msgContainer.innerHTML = '';
                data?.forEach(msg => appendMessage(msg));
                scrollToBottom();
            } catch (err) {
                console.error("Error al cargar mensajes:", err);
            }
        }

        function appendMessage(msg) {
            const isMe = msg.user_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-in slide-in-from-left-2 duration-300`;

            div.innerHTML = `
                <div class="max-w-[75%]">
                    <div class="flex items-center gap-1.5 mb-1 ${isMe ? 'flex-row-reverse' : ''}">
                         <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">${msg.full_name}</span>
                         <span class="text-[8px] text-slate-600">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    <div class="px-4 py-2.5 rounded-2xl text-sm ${isMe ? 'bg-amber-500 text-slate-950 font-medium rounded-tr-none' : 'bg-white/5 text-slate-200 rounded-tl-none'} ">
                        ${msg.content}
                    </div>
                </div>
            `;
            msgContainer.appendChild(div);
        }

        function setupRealtime() {
            if (msgSubscription) {
                supabaseClient.removeChannel(msgSubscription);
            }

            msgSubscription = supabaseClient.channel(`chat_v2_${currentChannel}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensajes', filter: `channel_id=eq.${currentChannel}` }, payload => {
                    const isMe = payload.new.user_id === currentUser.id;
                    appendMessage(payload.new);
                    scrollToBottom();
                    if (!isMe) {
                        playTone();
                        showWebNotification(payload.new);
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'estados' }, payload => {
                    fetchStatuses();
                })
                .subscribe();
        }

        function showWebNotification(msg) {
            if (!userSettings.notifications_enabled || Notification.permission !== 'granted' || document.visibilityState === 'visible') return;

            new Notification(`Nuevo mensaje de ${msg.full_name}`, {
                body: msg.content,
                icon: msg.avatar_url || '/images/ESCUDO.png'
            });
        }

        function setupPresence() {
            const channel = supabaseClient.channel('presence_track', {
                config: { presence: { key: currentUser.id } }
            });

            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    updateOnlineUI(state);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({
                            name: currentUser.user_metadata.full_name,
                            avatar: currentUser.user_metadata.avatar_url,
                            online_at: new Date().toISOString(),
                        });
                    }
                });
        }

        function updateOnlineUI(state) {
            const avatarsDiv = document.getElementById('online-users-avatars');
            avatarsDiv.innerHTML = '';
            Object.values(state).forEach(presences => {
                const presence = presences[0];
                const img = document.createElement('img');
                img.src = presence.avatar || `https://ui-avatars.com/api/?name=${presence.name}`;
                img.className = "w-6 h-6 rounded-full border-2 border-slate-900 ring-1 ring-green-500/50";
                avatarsDiv.appendChild(img);
            });
        }

        async function postStatus() {
            const btn = document.getElementById('btn-post-status');
            const textInput = document.getElementById('status-text');
            const fileInput = document.getElementById('status-file');
            const text = textInput.value;
            const file = fileInput.files[0];

            if (!text && !file) return;

            btn.disabled = true;
            btn.innerText = "SUBIENDO...";

            let contentUrl = text;
            let type = 'text';

            if (file) {
                const isVideo = file.type.startsWith('video/');
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const filePath = `${currentUser.id}/${fileName}`;

                const { error: uploadError } = await supabaseClient.storage
                    .from('statuses')
                    .upload(filePath, file);

                if (uploadError) {
                    alert('Error al subir contenido: ' + uploadError.message);
                    btn.disabled = false;
                    btn.innerText = "PUBLICAR";
                    return;
                }

                const { data: { publicUrl } } = supabaseClient.storage
                    .from('statuses')
                    .getPublicUrl(filePath);

                contentUrl = publicUrl;
                type = isVideo ? 'video' : 'image';
            }

            const { error } = await supabaseClient.from('estados').insert([{
                user_id: currentUser.id,
                content: contentUrl,
                type: type,
                full_name: currentUser.user_metadata.full_name,
                avatar_url: currentUser.user_metadata.avatar_url
            }]);

            btn.disabled = false;
            btn.innerText = "PUBLICAR";

            if (!error) {
                textInput.value = '';
                clearStatusPreview();
                closeStatusModal();
                fetchStatuses();
            }
        }

        function previewStatusMedia(input) {
            const file = input.files[0];
            const imgPreview = document.getElementById('status-preview-img');
            const vidPreview = document.getElementById('status-preview-vid');
            const container = document.getElementById('status-preview-container');

            if (file) {
                const isVideo = file.type.startsWith('video/');
                const reader = new FileReader();

                reader.onload = function (e) {
                    container.classList.remove('hidden');
                    if (isVideo) {
                        vidPreview.src = e.target.result;
                        vidPreview.classList.remove('hidden');
                        imgPreview.classList.add('hidden');
                    } else {
                        imgPreview.src = e.target.result;
                        imgPreview.classList.remove('hidden');
                        vidPreview.classList.add('hidden');
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function clearStatusPreview() {
            document.getElementById('status-file').value = '';
            document.getElementById('status-preview-container').classList.add('hidden');
            document.getElementById('status-preview-img').src = '';
            document.getElementById('status-preview-vid').src = '';
        }

        async function fetchStatuses() {
            const { data } = await supabaseClient
                .from('estados')
                .select('*')
                .gte('expires_at', new Date().toISOString())
                .order('created_at', { ascending: false });

            const list = document.getElementById('stories-list');
            list.innerHTML = '';
            data?.forEach(st => {
                const btn = document.createElement('button');
                btn.className = "flex-shrink-0 flex flex-col items-center gap-1";
                let icon = '';
                if (st.type === 'video') icon = '<i class="fas fa-play absolute text-[10px] text-white bg-amber-500/50 p-1 rounded-full"></i>';

                btn.innerHTML = `
                    <div class="story-ring relative flex items-center justify-center ${st.type !== 'text' ? 'border-amber-500' : 'border-slate-700'}">
                        ${icon}
                        <img src="${st.avatar_url || 'https://ui-avatars.com/api/?name=' + st.full_name}" class="w-12 h-12 rounded-full object-cover">
                    </div>
                    <span class="text-[9px] tracking-tight text-slate-400 font-bold">${st.full_name.split(' ')[0]}</span>
                `;
                btn.onclick = () => showStatusFullScreen(st);
                list.appendChild(btn);
            });
        }

        function showStatusFullScreen(st) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[3000] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center p-4 animate-in fade-in duration-300";

            if (st.type === 'image' || st.type === 'video') {
                const mediaTag = st.type === 'image'
                    ? `<img src="${st.content}" class="w-full h-auto rounded-3xl shadow-2xl border border-white/10">`
                    : `<video src="${st.content}" class="w-full h-auto rounded-3xl shadow-2xl border border-white/10" autoplay controls></video>`;

                modal.innerHTML = `
                    <button class="absolute top-6 right-6 text-white text-3xl hover:text-amber-500 transition-colors" onclick="this.parentElement.remove()">&times;</button>
                    <div class="max-w-md w-full relative">
                        ${mediaTag}
                        <div class="absolute bottom-6 left-6 right-6 p-4 glass rounded-2xl">
                             <p class="text-white font-black text-sm mb-1">${st.full_name}</p>
                             <p class="text-slate-400 text-xs">${new Date(st.created_at).toLocaleTimeString()}</p>
                        </div>
                    </div>
                `;
            } else {
                modal.innerHTML = `
                    <button class="absolute top-6 right-6 text-white text-3xl" onclick="this.parentElement.remove()">&times;</button>
                    <div class="max-w-md w-full glass p-10 rounded-3xl text-center">
                        <p class="text-2xl font-bold text-white mb-6">"${st.content}"</p>
                        <hr class="border-white/10 mb-6">
                        <p class="text-amber-500 font-black uppercase text-xs tracking-widest">${st.full_name}</p>
                    </div>
                `;
            }
            document.body.appendChild(modal);
            // Click fuera para cerrar
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function switchChannel(id) {
            currentChannel = id;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-channel'));
            document.getElementById('chan-' + id).classList.add('active-channel');
            document.getElementById('current-channel-name').innerText = '# ' + id.charAt(0).toUpperCase() + id.slice(1);
            fetchMessages();
            setupRealtime(); // Re-suscribirse al nuevo canal
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const content = input.value.trim();
            if (!content) return;
            input.value = '';

            await supabaseClient.from('mensajes').insert([{
                content,
                user_id: currentUser.id,
                channel_id: currentChannel,
                full_name: currentUser.user_metadata.full_name,
                avatar_url: currentUser.user_metadata.avatar_url
            }]);
        };

        function scrollToBottom() { msgContainer.scrollTop = msgContainer.scrollHeight; }
        function openStatusModal() { document.getElementById('status-modal').classList.remove('hidden'); }
        function closeStatusModal() { document.getElementById('status-modal').classList.add('hidden'); }

        function playTone() {
            if (!userSettings.notifications_enabled) return;

            const tones = {
                pop: 'https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3',
                whistle: 'https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3',
                bell: 'https://assets.mixkit.co/active_storage/sfx/2330/2330-preview.mp3'
            };

            const audio = new Audio(tones[userSettings.notification_tone] || tones.pop);
            audio.play().catch(e => console.log('Error de audio:', e));
        }

        document.getElementById('sett-notif').addEventListener('change', saveSettings);
        document.getElementById('sett-tone').addEventListener('change', saveSettings);

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
