<!-- Contenedor dinámico principal del Match Banner -->
<section id="match-banner"
    class="relative overflow-hidden border-y border-white/10 bg-[radial-gradient(circle_at_50%_-50%,#1e293b_0%,#0f172a_100%)]">

    <!-- Opacidad de escudo de fondo -->
    <div class="absolute inset-0 opacity-[0.03] flex items-center justify-center pointer-events-none">
        <img src="images/ESCUDO.png" alt="" class="w-[300px]" />
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6 relative z-10">
        <!-- Contenedor flex donde se inyectarán las tarjetas generadas y se desplazarán -->
        <div id="dynamic-match-banner-container"
            class="flex gap-6 overflow-x-auto pb-2 snap-x snap-mandatory scrollbar-hide"
            style="scroll-behavior: smooth;">
            <!-- Las tarjetas se inyectarán aquí por LoadComponents.js -->
        </div>

        <!-- Estado de Carga -->
        <div id="banner-loading" class="flex items-center justify-center gap-2 text-amber-500 font-bold py-4">
            <i class="fas fa-circle-notch fa-spin"></i> Cargando partidos del 7 de marzo...
        </div>
    </div>

    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</section>
