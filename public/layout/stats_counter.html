<section
    class="py-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black border-y border-white/5 relative overflow-hidden">
    <!-- Luces de fondo -->
    <div
        class="absolute top-0 left-1/4 w-96 h-96 bg-amber-500/10 blur-[120px] rounded-full pointer-events-none mix-blend-screen">
    </div>
    <div
        class="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full pointer-events-none mix-blend-screen">
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

        <div class="text-center mb-12" data-aos="fade-up">
            <h2 class="text-3xl md:text-4xl font-black text-white uppercase tracking-wider mb-2">Nuestra <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-600">Trayectoria</span>
            </h2>
            <div class="w-24 h-1 bg-amber-500 mx-auto rounded-full mb-4 shadow-[0_0_10px_rgba(245,158,11,0.5)]"></div>
            <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">El orgullo de Barranquilla</p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">

            <!-- Stat 1 -->
            <div class="relative group" data-aos="fade-up" data-aos-delay="0">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-amber-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-2xl blur-xl">
                </div>
                <div
                    class="relative h-full bg-slate-800/40 backdrop-blur-md border border-white/10 group-hover:border-amber-500/30 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-all duration-500 hover:-translate-y-2">
                    <div
                        class="w-16 h-16 rounded-full bg-slate-900/50 flex items-center justify-center mb-4 border border-white/5 group-hover:scale-110 transition-transform duration-500 shadow-inner">
                        <i class="fas fa-calendar-alt text-2xl text-amber-500"></i>
                    </div>
                    <div
                        class="text-4xl md:text-5xl font-black text-white tracking-tighter mb-1 flex items-center justify-center filter drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
                        <span class="stats-number" id="stats-years" data-target="0">0</span>
                        <span class="text-amber-500 ml-1 text-3xl">+</span>
                    </div>
                    <p class="text-white text-xs md:text-sm font-bold uppercase tracking-[0.15em] mb-1">Años de Historia
                    </p>
                    <p class="text-[10px] text-slate-400 uppercase font-medium">Desde 2012</p>
                </div>
            </div>

            <!-- Stat 2 -->
            <div class="relative group" data-aos="fade-up" data-aos-delay="100">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-blue-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-2xl blur-xl">
                </div>
                <div
                    class="relative h-full bg-slate-800/40 backdrop-blur-md border border-white/10 group-hover:border-blue-500/30 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-all duration-500 hover:-translate-y-2">
                    <div
                        class="w-16 h-16 rounded-full bg-slate-900/50 flex items-center justify-center mb-4 border border-white/5 group-hover:scale-110 transition-transform duration-500 shadow-inner">
                        <i class="fas fa-trophy text-2xl text-blue-400"></i>
                    </div>
                    <div
                        class="text-4xl md:text-5xl font-black text-white tracking-tighter mb-1 flex items-center justify-center filter drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
                        <span class="stats-number" id="stats-trophies" data-target="0">0</span>
                    </div>
                    <p class="text-white text-xs md:text-sm font-bold uppercase tracking-[0.15em] mb-1">Trofeos Ganados
                    </p>
                    <div
                        class="flex items-center justify-center gap-2 text-[10px] text-slate-400 uppercase font-medium">
                        <span title="Campeones"><i class="fas fa-medal text-amber-400"></i> 13</span>
                        <span title="Subcampeones"><i class="fas fa-medal text-slate-300"></i> 2</span>
                        <span title="Tercer Puesto"><i class="fas fa-medal text-amber-600"></i> 3</span>
                    </div>
                </div>
            </div>

            <!-- Stat 3 -->
            <div class="relative group" data-aos="fade-up" data-aos-delay="200">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-amber-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-2xl blur-xl">
                </div>
                <div
                    class="relative h-full bg-slate-800/40 backdrop-blur-md border border-white/10 group-hover:border-amber-500/30 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-all duration-500 hover:-translate-y-2">
                    <div
                        class="w-16 h-16 rounded-full bg-slate-900/50 flex items-center justify-center mb-4 border border-white/5 group-hover:scale-110 transition-transform duration-500 shadow-inner">
                        <i class="fas fa-users text-2xl text-amber-500"></i>
                    </div>
                    <div
                        class="text-4xl md:text-5xl font-black text-white tracking-tighter mb-1 flex items-center justify-center filter drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
                        <span class="stats-number" id="stats-players" data-target="0">0</span>
                        <span class="text-amber-500 ml-1 text-3xl">+</span>
                    </div>
                    <p class="text-white text-xs md:text-sm font-bold uppercase tracking-[0.15em] mb-1">Jugadores
                        Activos</p>
                    <p class="text-[10px] text-slate-400 uppercase font-medium">En Formación</p>
                </div>
            </div>

            <!-- Stat 4 -->
            <div class="relative group" data-aos="fade-up" data-aos-delay="300">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-blue-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-2xl blur-xl">
                </div>
                <div
                    class="relative h-full bg-slate-800/40 backdrop-blur-md border border-white/10 group-hover:border-blue-500/30 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-all duration-500 hover:-translate-y-2">
                    <div
                        class="w-16 h-16 rounded-full bg-slate-900/50 flex items-center justify-center mb-4 border border-white/5 group-hover:scale-110 transition-transform duration-500 shadow-inner">
                        <i class="fas fa-heart text-2xl text-blue-400"></i>
                    </div>
                    <div
                        class="text-4xl md:text-5xl font-black text-white tracking-tighter mb-1 flex items-center justify-center filter drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
                        <span class="stats-number" id="stats-commitment" data-target="100">0</span>
                        <span class="text-blue-400 ml-1 text-3xl">%</span>
                    </div>
                    <p class="text-white text-xs md:text-sm font-bold uppercase tracking-[0.15em] mb-1">Compromiso Total
                    </p>
                    <p class="text-[10px] text-slate-400 uppercase font-medium">Fuerza y Lealtad</p>
                </div>
            </div>

        </div>
    </div>
</section>

<script type="module">
    import { supabase } from './scripts/supabaseClient.js';

    async function fetchAndSetValues() {
        // Años de historia:
        const startYear = 2012;
        const currentYear = new Date().getFullYear();
        let currentRealYear = currentYear;
        const yearsOfHistory = currentRealYear - startYear > 0 ? currentRealYear - startYear : 14;

        // Trofeos ganados: 13 campeones + 3 tercer puesto + 2 subcampeones = 18
        const totalTrophies = 13 + 3 + 2;

        // Jugadores activos
        let totalPlayers = 60; // fallback estético
        try {
            const { count, error } = await supabase
                .from('identificacion')
                .select('*', { count: 'exact', head: true });

            if (!error && count !== null && count > 0) {
                totalPlayers = count;
            }
        } catch (e) {
            console.error("Error connecting to supabase for stats:", e);
        }

        // Initialize Animation execution
        animateValue(document.getElementById('stats-years'), 0, yearsOfHistory, 2000);
        animateValue(document.getElementById('stats-trophies'), 0, totalTrophies, 2000);
        animateValue(document.getElementById('stats-players'), 0, totalPlayers, 2000);
        animateValue(document.getElementById('stats-commitment'), 0, 100, 2000);
    }

    function animateValue(obj, start, end, duration) {
        if (!obj) return;
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    // Call only when the stat counter container is actually visible in the viewport
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            fetchAndSetValues();
            observer.disconnect(); // Run once
        }
    }, { threshold: 0.1 });

    observer.observe(document.querySelector('.max-w-7xl'));
</script>
