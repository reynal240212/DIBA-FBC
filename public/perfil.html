<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - DIBA FBC</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #0f172a;
    }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="text-slate-200">
  <div id="navbar-container"></div>

  <div class="pt-32 pb-12 px-4 min-vh-100 flex items-center justify-center">
    <div class="max-w-md w-full animate-in fade-in slide-in-from-bottom-4 duration-700">

      <div class="glass rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Estética de fondo -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-amber-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-8 relative">
          <div class="inline-block relative">
            <img id="profile-preview" src="https://ui-avatars.com/api/?name=User&background=random"
              class="w-24 h-24 rounded-full border-4 border-amber-500 p-1 object-cover mx-auto shadow-xl" alt="Avatar">
            <div
              class="absolute bottom-0 right-0 bg-amber-500 w-8 h-8 rounded-full flex items-center justify-center text-slate-900 shadow-lg border-4 border-slate-900">
              <i class="fas fa-camera text-xs"></i>
            </div>
          </div>
          <h1 class="text-2xl font-black text-white mt-4">Mi Perfil</h1>
          <p class="text-slate-400 text-sm">Personaliza tu estancia en DIBA FBC</p>
        </div>

        <form id="profile-form" class="space-y-5 relative">
          <div>
            <label class="block text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1.5 ml-1">Nombre
              Completo</label>
            <input type="text" id="full_name" placeholder="Ej: Juan Pérez"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-sm"
              required>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1.5 ml-1">Nombre de
              Usuario</label>
            <input type="text" id="username" placeholder="juan_diba"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-sm"
              required>
          </div>

          <div>
            <label
              class="block text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1.5 ml-1">Biografía</label>
            <textarea id="bio" rows="3" placeholder="Apasionado por el fútbol..."
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-sm resize-none"></textarea>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1.5 ml-1">URL de Foto
              (Avatar)</label>
            <input type="url" id="avatar_url" placeholder="https://..."
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all text-sm">
          </div>

          <div class="pt-4 flex gap-3">
            <button type="submit"
              class="flex-1 bg-amber-500 text-slate-900 py-3 rounded-xl font-black text-xs hover:bg-amber-400 transition-all shadow-lg shadow-amber-500/20 active:scale-95">
              GUARDAR CAMBIOS
            </button>
            <button type="button" id="logout-btn"
              class="px-4 bg-rose-500/10 text-rose-500 border border-rose-500/20 rounded-xl hover:bg-rose-500 hover:text-white transition-all active:scale-95">
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </div>
        </form>

        <p id="status-msg" class="text-center text-[10px] mt-4 font-bold uppercase tracking-widest hidden"></p>
      </div>

      <!-- Sección de Documentación (Solo para Jugadores) -->
      <div id="docs-section" class="glass rounded-3xl p-8 shadow-2xl relative overflow-hidden mt-6 hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="absolute -top-12 -right-12 w-24 h-24 bg-amber-500/5 rounded-full blur-2xl"></div>
        <div class="mb-6">
          <h2 class="text-xl font-black text-white">Documentación</h2>
          <p class="text-slate-400 text-[10px] uppercase tracking-wider font-bold">Requisitos de inscripción</p>
        </div>

        <div id="docs-list" class="space-y-4">
          <!-- Item TI -->
          <div class="doc-item bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-500">
                <i class="fas fa-id-card"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Tarjeta de Identidad</p>
                <p id="status-ti" class="text-[9px] text-slate-400 italic">No cargado</p>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="file" id="file-ti" class="hidden" accept="application/pdf,image/*">
              <button onclick="document.getElementById('file-ti').click()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center text-slate-400">
                <i class="fas fa-upload text-xs"></i>
              </button>
              <a id="view-ti" href="#" target="_blank" class="w-8 h-8 rounded-lg bg-amber-500/10 text-amber-500 transition-all flex items-center justify-center hidden">
                <i class="fas fa-eye text-xs"></i>
              </a>
            </div>
          </div>

          <!-- Item Cédula Padre -->
          <div class="doc-item bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-400">
                <i class="fas fa-user-friends"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Cédula del Padre</p>
                <p id="status-cp" class="text-[9px] text-slate-400 italic">No cargado</p>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="file" id="file-cp" class="hidden" accept="application/pdf,image/*">
              <button onclick="document.getElementById('file-cp').click()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center text-slate-400">
                <i class="fas fa-upload text-xs"></i>
              </button>
              <a id="view-cp" href="#" target="_blank" class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-400 transition-all flex items-center justify-center hidden">
                <i class="fas fa-eye text-xs"></i>
              </a>
            </div>
          </div>

          <!-- Item Cédula Madre -->
          <div class="doc-item bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-rose-500/10 rounded-xl flex items-center justify-center text-rose-400">
                <i class="fas fa-user-friends"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Cédula de la Madre</p>
                <p id="status-cm" class="text-[9px] text-slate-400 italic">No cargado</p>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="file" id="file-cm" class="hidden" accept="application/pdf,image/*">
              <button onclick="document.getElementById('file-cm').click()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center text-slate-400">
                <i class="fas fa-upload text-xs"></i>
              </button>
              <a id="view-cm" href="#" target="_blank" class="w-8 h-8 rounded-lg bg-rose-500/10 text-rose-400 transition-all flex items-center justify-center hidden">
                <i class="fas fa-eye text-xs"></i>
              </a>
            </div>
          </div>

          <!-- Item Registro Civil -->
          <div class="doc-item bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500">
                <i class="fas fa-file-invoice"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Registro Civil</p>
                <p id="status-rc" class="text-[9px] text-slate-400 italic">No cargado</p>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="file" id="file-rc" class="hidden" accept="application/pdf,image/*">
              <button onclick="document.getElementById('file-rc').click()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center text-slate-400">
                <i class="fas fa-upload text-xs"></i>
              </button>
              <a id="view-rc" href="#" target="_blank" class="w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-500 transition-all flex items-center justify-center hidden">
                <i class="fas fa-eye text-xs"></i>
              </a>
            </div>
          </div>

          <!-- Item Consentimiento -->
          <div class="doc-item bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-purple-500/10 rounded-xl flex items-center justify-center text-purple-400">
                <i class="fas fa-file-signature"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Consentimiento Padres</p>
                <p id="status-co" class="text-[9px] text-slate-400 italic">No cargado</p>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="file" id="file-co" class="hidden" accept="application/pdf,image/*">
              <button onclick="document.getElementById('file-co').click()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center text-slate-400">
                <i class="fas fa-upload text-xs"></i>
              </button>
              <a id="view-co" href="#" target="_blank" class="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-400 transition-all flex items-center justify-center hidden">
                <i class="fas fa-eye text-xs"></i>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-6">
        <a href="index.html" class="text-amber-500 hover:text-white text-[10px] font-black uppercase tracking-widest transition-colors">
          <i class="fas fa-arrow-left mr-2"></i> Volver al Inicio
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="scripts/config.js"></script>
  <script src="scripts/loadComponents.js"></script>

  <script>
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.DIBA_CONFIG;
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const profileForm = document.getElementById('profile-form');
    const statusMsg = document.getElementById('status-msg');
    const preview = document.getElementById('profile-preview');
    const docsSection = document.getElementById('docs-section');

    const DOC_TYPES = {
      'ti': 'tarjeta_identidad',
      'cp': 'cedula_padre',
      'cm': 'cedula_madre',
      'rc': 'registro_civil',
      'co': 'consentimiento_padres'
    };

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      const userId = session.user.id;
      await checkRoleAndLoadDocs(userId);
      await loadProfile(userId);

      // Live preview of avatar
      document.getElementById('avatar_url').addEventListener('input', (e) => {
        if (e.target.value) preview.src = e.target.value;
      });

      // Configurar eventos de subida
      Object.keys(DOC_TYPES).forEach(key => {
        document.getElementById(`file-${key}`).addEventListener('change', (e) => handleUpload(key, e));
      });
    }

    async function checkRoleAndLoadDocs(userId) {
      const { data: userData } = await supabaseClient
        .from('users')
        .select('role')
        .eq('id', userId)
        .single();

      if (userData && userData.role === 'usuario') {
        docsSection.classList.remove('hidden');
        await loadDocuments(userId);
      }
    }

    async function loadDocuments(userId) {
      const { data: docs } = await supabaseClient
        .from('player_documents')
        .select('*')
        .eq('user_id', userId);

      if (docs) {
        docs.forEach(doc => {
          const key = Object.keys(DOC_TYPES).find(k => DOC_TYPES[k] === doc.doc_type);
          if (key) {
            const statusEl = document.getElementById(`status-${key}`);
            const viewLink = document.getElementById(`view-${key}`);
            
            statusEl.innerText = doc.status.charAt(0).toUpperCase() + doc.status.slice(1);
            statusEl.className = `text-[9px] font-bold uppercase ${doc.status === 'verificado' ? 'text-emerald-500' : 'text-amber-500'}`;
            
            viewLink.href = doc.file_url;
            viewLink.classList.remove('hidden');
          }
        });
      }
    }

    async function handleUpload(key, event) {
      const file = event.target.files[0];
      if (!file) return;

      const { data: { session } } = await supabaseClient.auth.getSession();
      const userId = session.user.id;
      const docType = DOC_TYPES[key];
      const fileName = `${userId}/${docType}_${Date.now()}_${file.name}`;

      const statusEl = document.getElementById(`status-${key}`);
      statusEl.innerText = "Subiendo...";
      statusEl.className = "text-[9px] text-amber-500 animate-pulse";

      // 1. Subir a Storage
      const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from('documents')
        .upload(fileName, file, { upsert: true });

      if (uploadError) {
        alert("Error subiendo el archivo: " + uploadError.message);
        statusEl.innerText = "Error";
        return;
      }

      const { data: { publicUrl } } = supabaseClient.storage
        .from('documents')
        .getPublicUrl(fileName);

      // 2. Guardar en Base de Datos
      const { error: dbError } = await supabaseClient
        .from('player_documents')
        .upsert({
          user_id: userId,
          doc_type: docType,
          file_url: publicUrl,
          status: 'pendiente',
          updated_at: new Date()
        }, { onConflict: ['user_id', 'doc_type'] });

      if (dbError) {
        alert("Error guardando referencia: " + dbError.message);
        statusEl.innerText = "Error DB";
      } else {
        statusEl.innerText = "Pendiente (Subido)";
        statusEl.className = "text-[9px] text-amber-500 font-bold uppercase";
        const viewLink = document.getElementById(`view-${key}`);
        viewLink.href = publicUrl;
        viewLink.classList.remove('hidden');
      }
    }

    async function loadProfile(userId) {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', userId)
        .single();

      if (error) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        document.getElementById('full_name').value = user.user_metadata.full_name || '';
        document.getElementById('username').value = user.email.split('@')[0];
        if (user.user_metadata.avatar_url) {
          document.getElementById('avatar_url').value = user.user_metadata.avatar_url;
          preview.src = user.user_metadata.avatar_url;
        }
        return;
      }

      document.getElementById('full_name').value = data.full_name || '';
      document.getElementById('username').value = data.username || '';
      document.getElementById('bio').value = data.bio || '';
      document.getElementById('avatar_url').value = data.avatar_url || '';
      if (data.avatar_url) preview.src = data.avatar_url;
    }

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const { data: { session } } = await supabaseClient.auth.getSession();

      const profile = {
        id: session.user.id,
        full_name: document.getElementById('full_name').value,
        username: document.getElementById('username').value,
        bio: document.getElementById('bio').value,
        avatar_url: document.getElementById('avatar_url').value,
        updated_at: new Date()
      };

      const { error } = await supabaseClient.from('profiles').upsert(profile);

      statusMsg.classList.remove('hidden');
      if (error) {
        statusMsg.innerText = "Error: " + error.message;
        statusMsg.className = "text-center text-[10px] mt-4 font-bold uppercase tracking-widest text-rose-500";
      } else {
        statusMsg.innerText = "¡Perfil actualizado!";
        statusMsg.className = "text-center text-[10px] mt-4 font-bold uppercase tracking-widest text-emerald-500";
        setTimeout(() => statusMsg.classList.add('hidden'), 3000);
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      if (confirm('¿Cerrar sesión?')) {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
      }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
